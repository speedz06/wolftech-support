<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbinde</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121213;
            color: #d7dadc;
            font-family: 'nyt-karnakcondensed', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            margin-bottom: 4px;
            border-bottom: 1px solid #3a3a3c;
            padding-bottom: 12px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .subtitle {
            color: #818384;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-top: 12px;
            margin-bottom: 20px;
        }

        .selection-count {
            color: #818384;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 10px;
            min-height: 1.2em;
        }

        .solved-area {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 6px;
        }

        .solved-group {
            border-radius: 10px;
            padding: 14px 12px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .solved-group .group-name {
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
            color: #121213;
        }

        .solved-group .group-words {
            font-size: 0.9rem;
            font-weight: 600;
            color: #121213;
        }

        .difficulty-0 { background-color: #b5e352; }
        .difficulty-1 { background-color: #f9df6d; }
        .difficulty-2 { background-color: #6aace0; }
        .difficulty-3 { background-color: #ba81c5; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 16px;
        }

        .tile {
            background-color: #3a3a3c;
            border: 2px solid transparent;
            border-radius: 6px;
            color: #d7dadc;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 18px 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            transition: background-color 0.12s, border-color 0.12s, transform 0.1s;
            text-align: center;
            word-break: break-word;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
        }

        .tile:hover:not(.selected) {
            background-color: #48484a;
            border-color: #565658;
        }

        .tile:active:not(.selected) {
            background-color: #525254;
            transform: scale(0.97);
        }

        .tile.selected {
            background-color: #538d4e;
            border-color: #6aba64;
            color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(83, 141, 78, 0.35);
        }

        .tile.selected:hover {
            background-color: #4a7f46;
            border-color: #5eaa58;
        }

        .tile.selected:active {
            background-color: #3f6e3b;
            transform: scale(0.98);
        }

        .tile.bounce {
            animation: bounce 0.2s ease;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.02); }
        }

        .tile.shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button.action {
            background-color: transparent;
            color: #d7dadc;
            border: 1px solid #565658;
            border-radius: 24px;
            padding: 10px 24px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background-color 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
            outline: none;
        }

        button.action:hover {
            background-color: #2a2a2c;
            border-color: #818384;
        }

        button.action:active {
            background-color: #3a3a3c;
            transform: scale(0.96);
        }

        button.action.submit {
            background-color: #d7dadc;
            border-color: #d7dadc;
            color: #121213;
        }

        button.action.submit:hover {
            background-color: #ffffff;
            border-color: #ffffff;
        }

        button.action.submit:active {
            background-color: #b8bbbe;
            border-color: #b8bbbe;
            transform: scale(0.96);
        }

        button.action:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        button.action:disabled:hover {
            background-color: transparent;
            border-color: #565658;
        }

        .message {
            font-size: 0.85rem;
            font-weight: 600;
            min-height: 1.4em;
            margin-bottom: 14px;
            text-align: center;
        }

        .message.error { color: #e35b5b; }
        .message.success { color: #6aba64; }
    </style>
</head>
<body>
    <h1>VERBINDE</h1>
    <p class="subtitle">Finde die 4 Gruppen mit je 4 zusammengehörenden Begriffen</p>

    <p class="selection-count" id="selectionCount"></p>

    <div class="solved-area" id="solvedArea"></div>
    <div class="grid" id="grid"></div>

    <p class="message" id="message"></p>

    <div class="controls">
        <button class="action" id="deselectBtn" onclick="deselectAll()" disabled>Abwählen</button>
        <button class="action submit" id="submitBtn" onclick="submitGuess()">Prüfen</button>
    </div>

    <script>
        const puzzleData = {
            groups: [
                {
                    name: "Obst",
                    words: ["Apfel", "Birne", "Kirsche", "Traube"],
                    difficulty: 0
                },
                {
                    name: "Farben",
                    words: ["Rot", "Blau", "Grün", "Gelb"],
                    difficulty: 1
                },
                {
                    name: "Planeten",
                    words: ["Mars", "Venus", "Saturn", "Jupiter"],
                    difficulty: 2
                },
                {
                    name: "Musikinstrumente",
                    words: ["Gitarre", "Klavier", "Geige", "Flöte"],
                    difficulty: 3
                }
            ]
        };

        let selected = [];
        let solvedGroups = [];
        let remainingWords = [];
        function init() {
            remainingWords = puzzleData.groups.flatMap(g => g.words);
            shuffle(remainingWords);
            solvedGroups = [];
            selected = [];
            document.getElementById('solvedArea').innerHTML = '';
            renderGrid();
            updateUI();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            remainingWords.forEach(word => {
                const tile = document.createElement('button');
                tile.className = 'tile';
                if (selected.includes(word)) tile.classList.add('selected');
                tile.textContent = word;
                tile.onclick = () => toggleSelect(word, tile);
                grid.appendChild(tile);
            });
        }

        function toggleSelect(word, tileEl) {
            if (selected.includes(word)) {
                selected = selected.filter(w => w !== word);
                tileEl.classList.remove('selected', 'bounce');
            } else if (selected.length < 4) {
                selected.push(word);
                tileEl.classList.add('selected', 'bounce');
                tileEl.addEventListener('animationend', () => {
                    tileEl.classList.remove('bounce');
                }, { once: true });
            }
            updateUI();
        }

        function deselectAll() {
            selected = [];
            renderGrid();
            updateUI();
        }

        function updateUI() {
            const count = selected.length;
            document.getElementById('selectionCount').textContent =
                count > 0 ? `${count} / 4 ausgewählt` : '';
            document.getElementById('deselectBtn').disabled = count === 0;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => { msg.textContent = ''; msg.className = 'message'; }, 2000);
        }

        function submitGuess() {
            if (selected.length !== 4) {
                showMessage('Wähle genau 4 Wörter aus', 'error');
                return;
            }

            console.log('Submitted words:', selected.slice());
            showMessage('Gruppe eingereicht!', 'success');
        }

        init();
    </script>
</body>
</html>
