<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wolfle – Verbinde</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; }
        html {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* ── HEADER ── */
        #vb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 16px 8px;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(12px);
        }

        /* ── GAME TABS ── */
        #game-tabs {
            display: flex;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            padding: 0 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #game-tabs::-webkit-scrollbar { display: none; }
        .tab-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-link.active { color: #eab308; border-bottom-color: #eab308; }
        .tab-link:hover:not(.active) { color: #94a3b8; }

        /* ── GAME CENTER ── */
        #vb-game-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            min-width: 0;
            padding: 16px 16px max(16px, env(safe-area-inset-bottom));
            gap: 10px;
        }

        /* ── GAME TITLE ── */
        .vb-title {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #eab308, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .vb-subtitle {
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
        .vb-selection-count {
            font-size: 0.75rem;
            color: #94a3b8;
            min-height: 1.2em;
            text-align: center;
        }

        /* ── SOLVED GROUPS ── */
        .vb-solved-area {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .vb-solved-group {
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            animation: vbFadeIn 0.4s ease;
        }
        .vb-solved-group .group-name {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
            color: #0f172a;
        }
        .vb-solved-group .group-words {
            font-size: 0.85rem;
            font-weight: 600;
            color: #0f172a;
        }
        .difficulty-0 { background-color: #84cc16; }
        .difficulty-1 { background-color: #eab308; }
        .difficulty-2 { background-color: #38bdf8; }
        .difficulty-3 { background-color: #c084fc; }

        @keyframes vbFadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── GRID ── */
        .vb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 480px;
        }
        .vb-tile {
            background: rgba(30,41,59,0.6);
            border: 2px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            font-weight: 700;
            padding: 16px 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            transition: background-color 0.12s, border-color 0.12s, transform 0.1s, box-shadow 0.12s;
            text-align: center;
            word-break: break-word;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .vb-tile:hover:not(.selected) {
            background: rgba(51,65,85,0.8);
            border-color: #475569;
        }
        .vb-tile:active:not(.selected) {
            background: rgba(71,85,105,0.8);
            transform: scale(0.97);
        }
        .vb-tile.selected {
            background: rgba(234,179,8,0.2);
            border-color: #eab308;
            color: #fef08a;
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(234,179,8,0.25);
        }
        .vb-tile.selected:hover {
            background: rgba(234,179,8,0.3);
            border-color: #facc15;
        }
        .vb-tile.selected:active {
            background: rgba(234,179,8,0.15);
            transform: scale(0.98);
        }
        .vb-tile.bounce { animation: vbBounce 0.2s ease; }
        @keyframes vbBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.02); }
        }
        .vb-tile.shake { animation: vbShake 0.4s ease; }
        @keyframes vbShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* ── MISTAKES ── */
        .vb-mistakes {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            min-height: 1.2em;
        }
        .vb-dot.filled { color: #eab308; }
        .vb-dot.empty { color: #334155; }

        /* ── MESSAGE ── */
        .vb-message {
            font-size: 0.8rem;
            font-weight: 600;
            min-height: 1.4em;
            text-align: center;
        }
        .vb-message.error { color: #f87171; }
        .vb-message.success { color: #4ade80; }

        /* ── CONTROLS ── */
        .vb-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .vb-btn {
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            background: rgba(30,41,59,0.5);
            color: #94a3b8;
        }
        .vb-btn:hover {
            background: rgba(51,65,85,0.6);
            border-color: #475569;
            color: #e2e8f0;
        }
        .vb-btn:active {
            transform: scale(0.96);
        }
        .vb-btn.submit {
            background: linear-gradient(135deg, #ca8a04, #eab308);
            border-color: transparent;
            color: #0f172a;
        }
        .vb-btn.submit:hover {
            background: linear-gradient(135deg, #eab308, #facc15);
        }
        .vb-btn.submit:active {
            background: linear-gradient(135deg, #a16207, #ca8a04);
            transform: scale(0.96);
        }
        .vb-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .vb-btn:disabled:hover {
            background: rgba(30,41,59,0.5);
            border-color: #334155;
            color: #94a3b8;
        }

        /* ── MODE SELECT ── */
        .mode-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
            width: 100%;
            max-width: 400px;
        }
        .mode-card {
            width: 100%;
            background: rgba(30,41,59,0.6);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-card:hover {
            border-color: #eab308;
            background: rgba(30,41,59,0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(234,179,8,0.15);
        }
        .mode-card:active { transform: scale(0.98); }
        .mode-card h3 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mode-card p {
            font-size: 0.75rem;
            color: #94a3b8;
            line-height: 1.4;
        }
        .mode-card .mode-icon { font-size: 1.3rem; }

        /* ── DUELL ── */
        .vb-timer {
            font-size: 1.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            text-align: center;
            min-width: 80px;
        }
        .vb-timer.urgent { color: #f87171; animation: vbPulse 0.5s infinite; }
        @keyframes vbPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .vb-player-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 480px;
            gap: 12px;
        }
        .vb-player-chip {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: rgba(30,41,59,0.5);
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .vb-player-chip.active {
            border-color: #eab308;
            background: rgba(234,179,8,0.15);
            color: #fef08a;
            box-shadow: 0 0 12px rgba(234,179,8,0.2);
        }
        .vb-player-chip .score {
            font-size: 1.2rem;
            font-weight: 900;
            display: block;
        }
        .vb-vs { font-weight: 800; color: #64748b; font-size: 0.7rem; }

        /* ── MEMORY ── */
        .mem-grid {
            display: grid;
            gap: 6px;
            width: 100%;
            max-width: 520px;
        }
        .mem-grid.size-6x4 { grid-template-columns: repeat(6, 1fr); }
        .mem-grid.size-4x4 { grid-template-columns: repeat(4, 1fr); }
        .mem-card {
            aspect-ratio: 1;
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mem-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s;
            transform-style: preserve-3d;
        }
        .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
        .mem-card.matched .mem-card-inner { transform: rotateY(180deg); }
        .mem-card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(0.55rem, 2vw, 0.75rem);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            word-break: break-word;
            text-align: center;
            padding: 4px;
        }
        .mem-card-back {
            background: rgba(30,41,59,0.6);
            border: 2px solid #334155;
            color: #475569;
            font-size: 1.2rem;
        }
        .mem-card-back::after { content: '?'; }
        .mem-card-front {
            background: rgba(234,179,8,0.15);
            border: 2px solid #eab308;
            color: #fef08a;
            transform: rotateY(180deg);
        }
        .mem-card.matched .mem-card-front {
            background: rgba(132,204,22,0.2);
            border-color: #84cc16;
            color: #a3e635;
        }
        .mem-stats {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .mem-stats span { font-weight: 700; color: #e2e8f0; }

        /* ── THEME OVERRIDES ── */
        html.light body { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #1e293b; }
        html.light #vb-header { background: rgba(241,245,249,0.95); border-color: #cbd5e1; }
        html.light #game-tabs { background: #f1f5f9; border-color: #cbd5e1; }
        html.light .tab-link { color: #94a3b8; }
        html.light .tab-link.active { color: #a16207; border-bottom-color: #a16207; }
        html.light .vb-tile { background: rgba(255,255,255,0.8); border-color: #cbd5e1; color: #1e293b; }
        html.light .vb-tile:hover:not(.selected) { background: rgba(255,255,255,1); border-color: #94a3b8; }
        html.light .vb-tile.selected { background: rgba(234,179,8,0.15); border-color: #ca8a04; color: #92400e; box-shadow: 0 0 12px rgba(234,179,8,0.2); }
        html.light .vb-btn { background: rgba(255,255,255,0.8); border-color: #cbd5e1; color: #475569; }
        html.light .vb-btn:hover { background: white; border-color: #94a3b8; color: #1e293b; }
        html.light .vb-btn.submit { background: linear-gradient(135deg, #ca8a04, #eab308); border-color: transparent; color: white; }
        html.light .vb-message.error { color: #dc2626; }
        html.light .vb-message.success { color: #16a34a; }
        html.light .vb-subtitle { color: #64748b; }
        html.light .vb-selection-count { color: #64748b; }

        html.retro body { background: #000 !important; color: #00ff41; font-family: 'Courier New', monospace !important; }
        html.retro * { font-family: 'Courier New', monospace !important; }
        html.retro #vb-header { background: #000 !important; border-color: #00ff41 !important; }
        html.retro #game-tabs { background: #000 !important; border-color: #00ff41 !important; }
        html.retro .tab-link { color: #007a1f; }
        html.retro .tab-link.active { color: #00ff41; border-bottom-color: #00ff41; }
        html.retro .vb-title { background: none; -webkit-text-fill-color: #00ff41; }
        html.retro .vb-subtitle, html.retro .vb-selection-count { color: #007a1f; }
        html.retro .vb-tile { background: #001a00 !important; border-color: #00ff41 !important; color: #00ff41 !important; }
        html.retro .vb-tile.selected { background: #003300 !important; box-shadow: 0 0 8px rgba(0,255,65,0.3); color: #00ff41 !important; }
        html.retro .vb-btn { background: #001a00; border-color: #00ff41; color: #00ff41; }
        html.retro .vb-btn.submit { background: #00ff41; color: #000; border-color: #00ff41; }
        html.retro .vb-message.error { color: #ff4141; }
        html.retro .vb-message.success { color: #00ff41; }

        html.ocean body { background: linear-gradient(180deg, #0a1628, #0c1e3a) !important; }
        html.ocean #vb-header { background: rgba(5,16,31,0.85) !important; border-color: #1d4e6e !important; }
        html.ocean #game-tabs { background: #05101f !important; border-color: #1d4e6e !important; }
        html.ocean .tab-link { color: #4d89ac; }
        html.ocean .tab-link.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        html.ocean .vb-tile { background: rgba(5,16,31,0.6); border-color: #1d4e6e; }
        html.ocean .vb-tile.selected { background: rgba(56,189,248,0.15); border-color: #38bdf8; color: #7dd3fc; box-shadow: 0 0 12px rgba(56,189,248,0.2); }
        html.ocean .vb-btn { background: rgba(5,16,31,0.5); border-color: #1d4e6e; }
        html.ocean .vb-btn.submit { background: linear-gradient(135deg, #0369a1, #0ea5e9); border-color: transparent; color: white; }

        html.pastel body { background: linear-gradient(135deg, #fce7f3, #ede9fe) !important; color: #581c87; }
        html.pastel #vb-header { background: rgba(255,240,250,0.97) !important; border-color: #f0abdb !important; }
        html.pastel #game-tabs { background: #fce7f3 !important; border-color: #f0abdb !important; }
        html.pastel .tab-link { color: #c084db; }
        html.pastel .tab-link.active { color: #9333ea; border-bottom-color: #9333ea; }
        html.pastel .vb-title { background: linear-gradient(135deg, #9333ea, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        html.pastel .vb-subtitle, html.pastel .vb-selection-count { color: #a855f7; }
        html.pastel .vb-tile { background: rgba(255,255,255,0.7); border-color: #f0abdb; color: #581c87; }
        html.pastel .vb-tile.selected { background: rgba(147,51,234,0.15); border-color: #9333ea; color: #581c87; box-shadow: 0 0 12px rgba(147,51,234,0.2); }
        html.pastel .vb-btn { background: rgba(255,255,255,0.6); border-color: #f0abdb; color: #9333ea; }
        html.pastel .vb-btn.submit { background: linear-gradient(135deg, #9333ea, #a855f7); border-color: transparent; color: white; }
        html.pastel .vb-message.error { color: #e11d48; }
        html.pastel .vb-message.success { color: #059669; }

        .mobile-only { display: none; }
        @media (pointer: coarse) { .mobile-only { display: inline-flex; } }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div id="vb-header">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-1.5">
            <i data-lucide="paw-print" class="w-5 h-5 text-indigo-400"></i> Wolfle
        </h1>
        <div class="flex items-center gap-1.5">
            <button id="theme-btn" onclick="toggleTheme()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Design wechseln">
                <i data-lucide="sun" class="w-4 h-4"></i>
            </button>
            <button id="sound-btn" onclick="toggleSound()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Ton">
                <i data-lucide="volume-2" class="w-4 h-4"></i>
            </button>
            <button id="haptic-btn" onclick="toggleHaptic()" class="mobile-only text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Vibration">
                <i data-lucide="smartphone" class="w-4 h-4"></i>
            </button>
            <button id="login-header-btn" onclick="window.openLoginModal && window.openLoginModal()" title="Anmelden" class="flex items-center gap-1 text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white px-2 py-1.5 rounded-lg border border-slate-600 transition-all">
                <span id="login-header-avatar">🐺</span>
                <span id="login-header-label">Anmelden</span>
            </button>
        </div>
    </div>

    <!-- GAME TABS -->
    <div id="game-tabs">
        <a href="index.html" class="tab-link">
            <i data-lucide="home" class="w-4 h-4"></i> Home
        </a>
        <a href="wordle.html" class="tab-link">
            <i data-lucide="grid-2x2" class="w-4 h-4"></i> Wordle
        </a>
        <a href="hangman.html" class="tab-link">
            <i data-lucide="skull" class="w-4 h-4"></i> Hangman
        </a>
        <a href="verbinde.html" class="tab-link active">
            <i data-lucide="link" class="w-4 h-4"></i> Verbinde
        </a>
        <a href="stadtlandfuss.html" class="tab-link">
            <i data-lucide="globe" class="w-4 h-4"></i> SLF
        </a>
        <a href="tipprennen.html" class="tab-link">
            <i data-lucide="keyboard" class="w-4 h-4"></i> Tippen
        </a>
        <a href="anagramm.html" class="tab-link">
            <i data-lucide="shuffle" class="w-4 h-4"></i> Anagramm
        </a>
        <a href="quiz.html" class="tab-link">
            <i data-lucide="help-circle" class="w-4 h-4"></i> Quiz
        </a>
    </div>

    <!-- GAME CENTER -->
    <div id="vb-game-center">
        <div class="vb-title">Verbinde</div>
        <div class="vb-subtitle" id="subtitleText">Wähle einen Spielmodus</div>

        <!-- MODE SELECT -->
        <div class="mode-select" id="modeSelect">
            <button class="mode-card" onclick="startClassic()">
                <h3><span class="mode-icon">🧩</span> Klassisch</h3>
                <p>Finde die 4 Gruppen aus 16 Wörtern. 4 Versuche.</p>
            </button>
            <button class="mode-card" onclick="showDuellSetup()">
                <h3><span class="mode-icon">⚔️</span> Duell</h3>
                <p>Spiele gegen einen Freund! Wer findet die Gruppen schneller?</p>
            </button>
            <button class="mode-card" onclick="startMemory()">
                <h3><span class="mode-icon">🃏</span> Memory</h3>
                <p>Finde Wort-Paare die zusammengehören. Drehe je 2 Karten um!</p>
            </button>
        </div>

        <!-- DUELL SETUP -->
        <div id="duellSetup" style="display:none" class="mode-select">
            <div style="font-size:0.85rem;color:#94a3b8;text-align:center">Namen eingeben</div>
            <input id="duellP1Name" type="text" placeholder="Spieler 1" maxlength="12" class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2.5 text-center text-white focus:border-yellow-500 transition-colors outline-none" style="max-width:280px">
            <input id="duellP2Name" type="text" placeholder="Spieler 2" maxlength="12" class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2.5 text-center text-white focus:border-yellow-500 transition-colors outline-none" style="max-width:280px">

    // ── THEMES ──
    const THEMES = ['dark','light','retro','ocean','pastel'];

    function applyTheme(theme) {
        THEMES.forEach(t => document.documentElement.classList.remove(t));
        if (theme && theme !== 'dark') document.documentElement.classList.add(theme);
        const icon = (theme === 'light' || theme === 'pastel') ? 'moon' : 'sun';
        const btn = document.getElementById('theme-btn');
        if (btn) btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        lucide.createIcons();
    }
    function toggleTheme() {
        const current = localStorage.getItem('wolfle_theme') || 'dark';
        const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
        localStorage.setItem('wolfle_theme', next);
        applyTheme(next);
    }

    // ── SOUND ──
    let soundEnabled = localStorage.getItem('wolfle_sound') !== 'false';
    let audioCtx = null;

    function initAudioCtx() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
    ['pointerdown', 'keydown'].forEach(evt =>
        document.addEventListener(evt, initAudioCtx, { once: true })
    );
    function playTone(freq, type, duration, volume = 0.25) {
        if (!soundEnabled) return;
        requestAnimationFrame(() => {
            try {
                initAudioCtx();
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        });
    }
    function updateSoundBtn() {
        const icon = soundEnabled ? 'volume-2' : 'volume-x';
        const btn = document.getElementById('sound-btn');
        if (btn) btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        lucide.createIcons();
    }
    function toggleSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem('wolfle_sound', soundEnabled);
        updateSoundBtn();
        if (soundEnabled) playTone(523, 'sine', 0.15);
    }

    // ── HAPTIC ──

        if (!hapticEnabled) return;
        const patterns = { type: 10, correct: [20, 30, 20], wrong: 25 };
        try { navigator.vibrate(patterns[style] || 10); } catch(e) {}
    }
    function updateHapticBtn() {
        const icon = hapticEnabled ? 'vibrate' : 'smartphone';
        const btn = document.getElementById('haptic-btn');
        if (btn) btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        lucide.createIcons();

        hapticEnabled = !hapticEnabled;
        localStorage.setItem('wolfle_haptic', hapticEnabled);

    // ── HELPERS ──
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    function pickRandom() { return allPuzzles[Math.floor(Math.random() * allPuzzles.length)]; }
    function fmtTime(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

    // ── VIEW MANAGEMENT ──
    const VIEWS = ['modeSelect','classicView','duellSetup','duellView','duellResult','memoryView'];
    function showView(id) {
        VIEWS.forEach(v => {
            const el = document.getElementById(v);
            if (el) el.style.display = v === id ? 'flex' : 'none';
        });
    }
    function showModeSelect() {

    // ══════════════════════════════════
    // ══  CLASSIC MODE
    // ══════════════════════════════════
    let cPuzzle, cSelected = [], cSolved = [], cRemaining = [], cMistakes = 4, cGameOver = false;

    function startClassic() {
        document.getElementById('subtitleText').textContent = 'Finde die 4 Gruppen mit je 4 zusammengehörenden Begriffen';
        showView('classicView');
        cPuzzle = pickRandom();
        cRemaining = cPuzzle.groups.flatMap(g => g.words);
        shuffle(cRemaining);
        cSelected = []; cSolved = []; cMistakes = 4; cGameOver = false;
        document.getElementById('solvedArea').innerHTML = '';
        cRenderGrid(); cUpdateUI(); cUpdateMistakes();
        cShowMsg('', '');
    }
    function init() { startClassic(); }

    function cRenderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        cRemaining.forEach(word => {
            const t = document.createElement('button');
            t.className = 'vb-tile';
            if (cSelected.includes(word)) t.classList.add('selected');
            t.textContent = word;
            t.onclick = () => cToggle(word, t);
            grid.appendChild(t);
        });
    }
    function cToggle(word, el) {
        if (cGameOver) return;
        if (cSelected.includes(word)) {
            cSelected = cSelected.filter(w => w !== word);
            el.classList.remove('selected','bounce');
        } else if (cSelected.length < 4) {
            cSelected.push(word);
            el.classList.add('selected','bounce');
            el.addEventListener('animationend', () => el.classList.remove('bounce'), {once:true});
            triggerHaptic('type');
        }
        cUpdateUI();
    }
    function deselectAll() { cSelected = []; cRenderGrid(); cUpdateUI(); }
    function cUpdateUI() {
        const c = cSelected.length;
        document.getElementById('selectionCount').textContent = c > 0 ? `${c} / 4 ausgewählt` : '';
        document.getElementById('deselectBtn').disabled = c === 0;
    }
    function cUpdateMistakes() {
        const el = document.getElementById('mistakesDisplay');
        if (!el) return;
        el.innerHTML = 'Versuche übrig: ' + '<span class="vb-dot filled">●</span> '.repeat(cMistakes) + '<span class="vb-dot empty">●</span> '.repeat(4 - cMistakes);
    }
    function cShowMsg(text, type) {
        const m = document.getElementById('message');
        m.textContent = text; m.className = 'vb-message ' + type;
        if (text) setTimeout(() => { m.textContent = ''; m.className = 'vb-message'; }, 2500);
    }
    function cShake() {
        document.querySelectorAll('#grid .vb-tile.selected').forEach(t => {
            t.classList.add('shake');
            setTimeout(() => t.classList.remove('shake'), 500);
        });
    }
    function cRevealAll() {
        cGameOver = true;
        document.getElementById('grid').innerHTML = '';
        const area = document.getElementById('solvedArea');
        cPuzzle.groups.filter(g => !cSolved.includes(g)).sort((a,b) => a.difficulty - b.difficulty).forEach(g => {
            const d = document.createElement('div');
            d.className = `vb-solved-group difficulty-${g.difficulty}`;
            d.innerHTML = `<div class="group-name">${g.name}</div><div class="group-words">${g.words.join(', ')}</div>`;
            area.appendChild(d);
        });
        cRemaining = []; cSelected = []; cUpdateUI();
    }
    function submitGuess() {
        if (cGameOver) return;
        if (cSelected.length !== 4) { cShowMsg('Wähle genau 4 Wörter aus', 'error'); return; }
        const match = cPuzzle.groups.find(g =>
            !cSolved.includes(g) && g.words.every(w => cSelected.includes(w)) && cSelected.every(w => g.words.includes(w))
        );
        if (match) {
            cSolved.push(match);
            cRemaining = cRemaining.filter(w => !match.words.includes(w));
            cSelected = [];
            const area = document.getElementById('solvedArea');
            const d = document.createElement('div');
            d.className = `vb-solved-group difficulty-${match.difficulty}`;
            d.innerHTML = `<div class="group-name">${match.name}</div><div class="group-words">${match.words.join(', ')}</div>`;
            area.appendChild(d);
            cRenderGrid(); cUpdateUI();
            triggerHaptic('correct'); playTone(523,'sine',0.2);
            if (cSolved.length === 4) {
                cGameOver = true; cShowMsg('Gelöst! Gut gemacht!', 'success');
                playTone(659,'sine',0.15); setTimeout(()=>playTone(784,'sine',0.15),120); setTimeout(()=>playTone(1047,'sine',0.3),240);
            } else cShowMsg('Richtig!', 'success');
        } else {
            cMistakes--; cUpdateMistakes(); triggerHaptic('wrong'); playTone(220,'sawtooth',0.2,0.15);
            const oneAway = cPuzzle.groups.some(g => !cSolved.includes(g) && cSelected.filter(w => g.words.includes(w)).length === 3);
            if (cMistakes <= 0) { cShowMsg('Leider verloren!','error'); cShake(); setTimeout(cRevealAll, 600); }
            else if (oneAway) { cShowMsg('Knapp daneben! Nur 1 falsch.','error'); cShake(); }
            else { cShowMsg('Falsch! Versuch es nochmal.','error'); cShake(); }
        }
    }

    let dPuzzle, dSelected = [], dSolved = [], dRemaining = [];
    let dScores = [0, 0], dCurrentPlayer = 0, dNames = ['Spieler 1', 'Spieler 2'];
    let dTimer = 0, duellTimerInterval = null, dGameOver = false;

    function startDuell() {
        dNames[0] = document.getElementById('duellP1Name').value.trim() || 'Spieler 1';
        dNames[1] = document.getElementById('duellP2Name').value.trim() || 'Spieler 2';
        dPuzzle = pickRandom();
        dRemaining = dPuzzle.groups.flatMap(g => g.words);
        shuffle(dRemaining);
        dSelected = []; dSolved = []; dScores = [0, 0]; dCurrentPlayer = 0; dGameOver = false;
        document.getElementById('subtitleText').textContent = 'Duell – Wer ist schneller?';
        showView('duellView');
        document.getElementById('duellSolvedArea').innerHTML = '';
        dUpdatePlayerBar(); dRenderGrid(); dUpdateUI(); dShowMsg('','');
        dStartTimer();
    }
    function dStartTimer() {
        clearInterval(duellTimerInterval);
        dTimer = DUELL_TIME;
        dUpdateTimerDisplay();
        duellTimerInterval = setInterval(() => {
            dTimer--;
            dUpdateTimerDisplay();
            if (dTimer <= 0) {
                clearInterval(duellTimerInterval);
                // Time's up for current player, switch
                dShowMsg(`Zeit abgelaufen für ${dNames[dCurrentPlayer]}!`, 'error');
                setTimeout(() => dSwitchPlayer(), 1000);
            }
        }, 1000);
    }
    function dUpdateTimerDisplay() {
        const el = document.getElementById('duellTimer');
        el.textContent = fmtTime(dTimer);
        el.classList.toggle('urgent', dTimer <= 10);
    }
    function dUpdatePlayerBar() {
        document.getElementById('duellName1').textContent = dNames[0];
        document.getElementById('duellName2').textContent = dNames[1];
        document.getElementById('duellScore1').textContent = dScores[0];
        document.getElementById('duellScore2').textContent = dScores[1];
        document.getElementById('duellChip1').classList.toggle('active', dCurrentPlayer === 0);
        document.getElementById('duellChip2').classList.toggle('active', dCurrentPlayer === 1);
    }
    function dRenderGrid() {
        const grid = document.getElementById('duellGrid');
        grid.innerHTML = '';
        dRemaining.forEach(word => {
            const t = document.createElement('button');
            t.className = 'vb-tile';
            if (dSelected.includes(word)) t.classList.add('selected');
            t.textContent = word;
            t.onclick = () => dToggle(word, t);
            grid.appendChild(t);
        });
    }
    function dToggle(word, el) {
        if (dGameOver) return;
        if (dSelected.includes(word)) {
            dSelected = dSelected.filter(w => w !== word);
            el.classList.remove('selected','bounce');
        } else if (dSelected.length < 4) {
            dSelected.push(word);
            el.classList.add('selected','bounce');
            el.addEventListener('animationend', () => el.classList.remove('bounce'), {once:true});
            triggerHaptic('type');
        }
        dUpdateUI();
    }
    function duellDeselectAll() { dSelected = []; dRenderGrid(); dUpdateUI(); }
    function dUpdateUI() {
        const c = dSelected.length;
        document.getElementById('duellSelCount').textContent = c > 0 ? `${c} / 4 ausgewählt` : '';
        document.getElementById('duellDeselectBtn').disabled = c === 0;
    }
    function dShowMsg(text, type) {
        const m = document.getElementById('duellMessage');
        m.textContent = text; m.className = 'vb-message ' + type;
        if (text) setTimeout(() => { m.textContent = ''; m.className = 'vb-message'; }, 2000);
    }
    function dSwitchPlayer() {
        if (dGameOver) return;
        if (dSolved.length >= 4) { dEndGame(); return; }
        dCurrentPlayer = 1 - dCurrentPlayer;
        dSelected = [];
        dUpdatePlayerBar(); dRenderGrid(); dUpdateUI();
        dShowMsg(`${dNames[dCurrentPlayer]} ist dran!`, 'success');
        dStartTimer();
    }
    function dEndGame() {
        dGameOver = true;
        clearInterval(duellTimerInterval);
        showView('duellResult');
        document.getElementById('subtitleText').textContent = 'Duell – Ergebnis';
        const res = document.getElementById('duellResult');
        let winner;
        if (dScores[0] > dScores[1]) winner = dNames[0];
        else if (dScores[1] > dScores[0]) winner = dNames[1];
        else winner = null;
        res.innerHTML = `
            <div style="font-size:3rem;margin-bottom:4px">${winner ? '🏆' : '🤝'}</div>
            <div style="font-size:1.3rem;font-weight:800">${winner ? winner + ' gewinnt!' : 'Unentschieden!'}</div>
            <div class="vb-player-bar" style="max-width:320px">
                <div class="vb-player-chip ${dScores[0] >= dScores[1] ? 'active' : ''}">
                    <div>${dNames[0]}</div><span class="score">${dScores[0]}</span>
                </div>
                <div class="vb-vs">VS</div>
                <div class="vb-player-chip ${dScores[1] >= dScores[0] ? 'active' : ''}">
                    <div>${dNames[1]}</div><span class="score">${dScores[1]}</span>
                </div>
            </div>
            <div class="vb-controls" style="margin-top:8px">
                <button class="vb-btn submit" onclick="startDuell()">Nochmal!</button>
                <button class="vb-btn" onclick="showModeSelect()">Modi</button>
            </div>
        `;
    }
    function duellSubmitGuess() {
        if (dGameOver) return;
        if (dSelected.length !== 4) { dShowMsg('Wähle genau 4 Wörter aus','error'); return; }
        const match = dPuzzle.groups.find(g =>
            !dSolved.includes(g) && g.words.every(w => dSelected.includes(w)) && dSelected.every(w => g.words.includes(w))
        );
        if (match) {
            dSolved.push(match);
            dRemaining = dRemaining.filter(w => !match.words.includes(w));
            dScores[dCurrentPlayer] += (1 + match.difficulty); // harder groups = more points
            dSelected = [];
            const area = document.getElementById('duellSolvedArea');
            const d = document.createElement('div');
            d.className = `vb-solved-group difficulty-${match.difficulty}`;
            d.innerHTML = `<div class="group-name">${match.name}</div><div class="group-words">${match.words.join(', ')}</div>`;
            area.appendChild(d);
            dUpdatePlayerBar(); dRenderGrid(); dUpdateUI();
            triggerHaptic('correct'); playTone(523,'sine',0.2);
            if (dSolved.length >= 4) { dShowMsg('Alle Gruppen gefunden!','success'); setTimeout(dEndGame, 800); }
            else { dShowMsg('Richtig! +' + (1 + match.difficulty) + ' Punkte','success'); setTimeout(dSwitchPlayer, 1200); }
        } else {
            triggerHaptic('wrong'); playTone(220,'sawtooth',0.2,0.15);
            const oneAway = dPuzzle.groups.some(g => !dSolved.includes(g) && dSelected.filter(w => g.words.includes(w)).length === 3);
            if (oneAway) dShowMsg('Knapp daneben! Spieler wechselt...','error');
            else dShowMsg('Falsch! Spieler wechselt...','error');
            document.querySelectorAll('#duellGrid .vb-tile.selected').forEach(t => {
                t.classList.add('shake'); setTimeout(() => t.classList.remove('shake'), 500);
            });
            setTimeout(dSwitchPlayer, 1200);
        }
    }

    // ══════════════════════════════════
    // ══  MEMORY MODE
    // ══════════════════════════════════
    let memCards = [], memFlipped = [], memMatched = 0, memTotalPairs = 0;
    let memMoves = 0, memLocked = false, memTimer = 0, memTimerInterval = null, memStarted = false;

    function startMemory() {
        document.getElementById('subtitleText').textContent = 'Memory – Finde die Paare!';
        showView('memoryView');
        clearInterval(memTimerInterval);
        // Pick 2 random puzzles to get 8 groups = 12 pairs (word→group name)
        const p1 = pickRandom();
        let p2 = pickRandom();
        while (p2 === p1) p2 = pickRandom();
        // Take 3 groups from each = 6 groups, use 2 words per group = 12 pairs
        const groups = [...p1.groups.slice(0, 3), ...p2.groups.slice(0, 3)];
        memCards = [];
        groups.forEach(g => {
            // Pick 2 words from each group, create pairs: word <-> group name
            const words = g.words.slice(0, 2);
            words.forEach(w => {
                memCards.push({ id: memCards.length, text: w, pairKey: g.name, type: 'word' });
                memCards.push({ id: memCards.length, text: g.name, pairKey: g.name, type: 'group' });
            });
        });
        shuffle(memCards);
        memFlipped = []; memMatched = 0; memMoves = 0; memLocked = false; memStarted = false;
        memTimer = 0; memTotalPairs = memCards.length / 2;
        document.getElementById('memPairsFound').textContent = '0';
        document.getElementById('memPairsTotal').textContent = memTotalPairs;
        document.getElementById('memMoves').textContent = '0';
        document.getElementById('memTimer').textContent = '0:00';
        memRenderGrid();
        memShowMsg('', '');
    }
    function memStartTimerIfNeeded() {
        if (memStarted) return;
        memStarted = true;
        clearInterval(memTimerInterval);
        memTimerInterval = setInterval(() => {
            memTimer++;
            document.getElementById('memTimer').textContent = fmtTime(memTimer);
        }, 1000);
    }
    function memRenderGrid() {
        const grid = document.getElementById('memGrid');
        grid.innerHTML = '';
        // 24 cards => 6x4 grid
        const cols = memCards.length <= 16 ? 4 : 6;
        grid.className = `mem-grid size-${cols}x4`;
        memCards.forEach((card, i) => {
            const el = document.createElement('div');
            el.className = 'mem-card';
            el.dataset.idx = i;
            if (card.matched) el.classList.add('matched');
            el.innerHTML = `
                <div class="mem-card-inner">
                    <div class="mem-card-face mem-card-back"></div>
                    <div class="mem-card-face mem-card-front">${card.text}</div>
                </div>`;
            el.onclick = () => memFlip(i, el);
            grid.appendChild(el);
        });
    }
    function memFlip(idx, el) {
        if (memLocked) return;
        const card = memCards[idx];
        if (card.matched || memFlipped.find(f => f.idx === idx)) return;
        memStartTimerIfNeeded();
        el.classList.add('flipped');
        triggerHaptic('type');
        memFlipped.push({ idx, el, card });
        if (memFlipped.length === 2) {
            memMoves++;
            document.getElementById('memMoves').textContent = memMoves;
            const [a, b] = memFlipped;
            if (a.card.pairKey === b.card.pairKey && a.card.type !== b.card.type) {
                // Match!
                memCards[a.idx].matched = true;
                memCards[b.idx].matched = true;
                a.el.classList.add('matched');
                b.el.classList.add('matched');
                memMatched++;
                document.getElementById('memPairsFound').textContent = memMatched;
                playTone(523,'sine',0.15);
                triggerHaptic('correct');
                memFlipped = [];
                if (memMatched >= memTotalPairs) {
                    clearInterval(memTimerInterval);
                    memShowMsg(`Geschafft in ${memMoves} Zügen und ${fmtTime(memTimer)}!`, 'success');
                    playTone(659,'sine',0.15); setTimeout(()=>playTone(784,'sine',0.15),120); setTimeout(()=>playTone(1047,'sine',0.3),240);
                }
            } else {
                // No match
                memLocked = true;
                playTone(220,'sawtooth',0.15,0.1);
                setTimeout(() => {
                    a.el.classList.remove('flipped');
                    b.el.classList.remove('flipped');
                    memFlipped = [];
                    memLocked = false;
                }, 800);
            }
        }
    }
    function memShowMsg(text, type) {
        const m = document.getElementById('memMessage');
        m.textContent = text; m.className = 'vb-message ' + type;
    }

    // ── INIT ──
    applyTheme(localStorage.getItem('wolfle_theme') || 'dark');
    updateSoundBtn();
    updateHapticBtn();
    updateLoginHeader();
    lucide.createIcons();
    showModeSelect();
    </script>
</body>
