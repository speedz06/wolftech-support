<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wolfle – Stadt Land Fluss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; }
        html { touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* Tabs */
        #game-tabs {
            display: flex;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            padding: 0 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #game-tabs::-webkit-scrollbar { display: none; }
        .tab-link {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 18px; font-size: 13px; font-weight: 600;
            color: #64748b; text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.15s; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-link.active { color: #4ade80; border-bottom-color: #4ade80; }
        .tab-link:hover:not(.active) { color: #94a3b8; }

        /* Header */
        #slf-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 16px 8px;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(12px);
        }

        /* App layout */
        #slf-app {
            display: flex; flex-direction: row;
            flex: 1; min-height: 0; overflow: hidden;
        }
        #slf-sidebar {
            width: 280px; min-width: 280px;
            background: rgba(15,23,42,0.6);
            border-right: 1px solid #1e293b;
            padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            overflow-y: auto;
        }
        #slf-game-center {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; overflow: hidden; min-width: 0;
            padding: 16px;
        }

        /* Drawer (mobile) */
        #slf-drawer-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(2,6,23,0.75); z-index: 40;
            backdrop-filter: blur(4px);
        }
        #slf-drawer-overlay.open { display: block; }
        #slf-sidebar.open-drawer { transform: translateY(0) !important; }

        @media (max-width: 900px) {
            #slf-app { flex-direction: column; }
            #slf-sidebar {
                position: fixed; bottom: 0; left: 0; right: 0;
                width: auto; min-width: unset;
                border-right: none; border-top: 1px solid #1e293b;
                border-radius: 20px 20px 0 0;
                max-height: 78dvh; z-index: 50;
                transform: translateY(105%);
                transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            }
        }

        /* Panels & buttons */
        .slf-panel {
            background: rgba(30,41,59,0.6);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 14px;
        }
        .slf-label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: 600; color: #94a3b8; }
        .slf-input {
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 10px 12px; color: white; font-size: 14px; width: 100%;
        }
        .slf-input:focus { border-color: #4ade80; outline: none; }
        .slf-btn {
            padding: 10px 16px; border-radius: 12px; font-weight: 700;
            font-size: 14px; border: none; cursor: pointer;
            transition: all 0.15s; -webkit-tap-highlight-color: transparent;
        }
        .slf-btn-primary { background: #16a34a; color: white; }
        .slf-btn-primary:hover { background: #15803d; }
        .slf-btn-secondary { background: #334155; color: #e2e8f0; }
        .slf-btn-secondary:hover { background: #475569; }
        .slf-btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .slf-muted { color: #64748b; font-size: 0.8rem; }

        /* Player chips */
        .slf-player-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 10px; padding: 6px 10px; font-size: 13px;
        }
        .slf-player-chip.host { border-color: #4ade80; }

        /* Category tags */
        .slf-category-tag {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25);
            border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #4ade80;
        }
        .slf-category-tag button {
            background: none; border: none; color: #ef4444; cursor: pointer;
            font-size: 14px; line-height: 1; padding: 0 0 0 4px;
        }

        /* Swipe hints */
        .swipe-hint {
            display: none; position: fixed; top: 50%; transform: translateY(-50%);
            width: 4px; height: 48px; border-radius: 4px;
            opacity: 0.25; z-index: 30; pointer-events: none;
        }
        .swipe-hint-left { left: 2px; background: #4ade80; }
        @media (max-width: 900px) { .swipe-hint { display: block; } }

        /* Game view */
        #slf-letter-display {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900;
            color: #4ade80;
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 32px rgba(74,222,128,0.3);
        }
        #slf-timer {
            font-size: 1.1rem; font-weight: 700; color: #94a3b8;
            text-align: center;
        }
        #slf-timer.urgent { color: #ef4444; animation: pulse-urgent 0.5s ease-in-out infinite; }
        @keyframes pulse-urgent { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .slf-input-grid {
            display: flex; flex-direction: column; gap: 8px;
            width: 100%; max-width: 500px;
        }
        .slf-input-row {
            display: flex; align-items: center; gap: 8px;
        }
        .slf-input-row label {
            width: 80px; font-size: 13px; font-weight: 600; color: #94a3b8;
            flex-shrink: 0; text-align: right;
        }
        .slf-input-row input {
            flex: 1; background: #1e293b; border: 1px solid #334155;
            border-radius: 10px; padding: 10px 12px; color: white; font-size: 14px;
        }
        .slf-input-row input:focus { border-color: #4ade80; outline: none; }
        .slf-input-row input:disabled { opacity: 0.5; }
        #slf-stop-btn {
            padding: 14px 48px; border-radius: 16px;
            background: #ef4444; color: white;
            font-size: 18px; font-weight: 900;
            border: none; cursor: pointer;
            transition: transform 0.1s, background 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #slf-stop-btn:active { transform: scale(0.95); }
        #slf-stop-btn:disabled { background: #334155; color: #64748b; cursor: default; }
        #slf-start-btn {
            padding: 14px 48px; border-radius: 16px;
            background: #16a34a; color: white;
            font-size: 16px; font-weight: 800;
            border: none; cursor: pointer;
        }
        #slf-start-btn:disabled { background: #334155; color: #64748b; cursor: default; }

        /* Results table */
        .slf-results-table {
            width: 100%; max-width: 600px;
            border-collapse: collapse; font-size: 13px;
        }
        .slf-results-table th {
            background: #1e293b; color: #94a3b8;
            padding: 8px 10px; text-align: left;
            font-weight: 600; position: sticky; top: 0;
        }
        .slf-results-table td {
            padding: 6px 10px; border-bottom: 1px solid #1e293b;
        }
        .slf-results-table tr:nth-child(even) { background: rgba(30,41,59,0.3); }
        .slf-score-unique { color: #4ade80; font-weight: 700; }
        .slf-score-duplicate { color: #fbbf24; font-weight: 700; }
        .slf-score-empty { color: #64748b; }
        .slf-round-scores {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .slf-score-card {
            background: rgba(30,41,59,0.6); border: 1px solid #334155;
            border-radius: 12px; padding: 10px 16px; text-align: center;
            min-width: 80px;
        }
        .slf-score-card .name { font-size: 12px; color: #94a3b8; }
        .slf-score-card .pts { font-size: 20px; font-weight: 800; color: #4ade80; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
        button:focus, input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(74,222,128,0.35); }

        /* Theme overrides */
        html.light body { background: linear-gradient(135deg, #dde3ed, #f0f4f8); color: #1e293b; }
        html.light #slf-header, html.light #game-tabs { background: #f1f5f9; border-color: #cbd5e1; }
        html.light .tab-link { color: #94a3b8; }
        html.light .tab-link.active { color: #16a34a; border-bottom-color: #16a34a; }
        html.light .slf-panel { background: rgba(255,255,255,0.7); border-color: #cbd5e1; }
        html.light .slf-input { background: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
        html.retro body { background: #000 !important; color: #00ff41; font-family: 'Courier New', monospace !important; }
        html.retro * { font-family: 'Courier New', monospace !important; }
        html.retro #slf-header, html.retro #game-tabs, html.retro .slf-panel { background: #000 !important; border-color: #00ff41 !important; }
        html.retro .tab-link { color: #007a1f; }
        html.retro .tab-link.active { color: #00ff41; border-bottom-color: #00ff41; }
        html.ocean body { background: radial-gradient(circle at top, #0c2340, #020d1a) !important; color: #e0f4ff; }
        html.ocean #slf-header, html.ocean #game-tabs, html.ocean .slf-panel { background: rgba(5,16,31,0.85) !important; border-color: #1d4e6e !important; }
        html.ocean .tab-link { color: #4d89ac; }
        html.ocean .tab-link.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        html.pastel body { background: linear-gradient(135deg, #fce7f3, #ede9fe) !important; color: #4a1d52; }
        html.pastel #slf-header, html.pastel #game-tabs, html.pastel .slf-panel { background: rgba(255,255,255,0.82) !important; border-color: #f0abdb !important; }
        html.pastel .tab-link { color: #c084db; }
        html.pastel .tab-link.active { color: #9333ea; border-bottom-color: #9333ea; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="slf-header">
        <h1 class="text-xl font-bold flex items-center gap-1.5" style="color:#4ade80;">
            <i data-lucide="globe" class="w-5 h-5"></i> Stadt Land Fluss
        </h1>
        <div class="flex items-center gap-1.5">
            <button id="slf-login-btn" onclick="slfOpenLogin()" class="flex items-center gap-1 text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white px-2 py-1.5 rounded-lg border border-slate-600 transition-all">
                <span id="slf-avatar">🐺</span>
                <span id="slf-name-label">Anmelden</span>
            </button>
        </div>
    </div>

    <!-- TABS -->
    <div id="game-tabs">
        <a href="index.html" class="tab-link">
            <i data-lucide="home" class="w-4 h-4"></i> Home
        </a>
        <a href="wordle.html" class="tab-link">
            <i data-lucide="grid-2x2" class="w-4 h-4"></i> Wordle
        </a>
        <a href="hangman.html" class="tab-link">
            <i data-lucide="skull" class="w-4 h-4"></i> Hangman
        </a>
        <a href="verbinde.html" class="tab-link">
            <i data-lucide="link" class="w-4 h-4"></i> Verbinde
        </a>
        <a href="stadtlandfluss.html" class="tab-link active">
            <i data-lucide="globe" class="w-4 h-4"></i> SLF
        </a>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="slf-drawer-overlay" onclick="slfCloseDrawer()"></div>

    <!-- MAIN APP -->
    <div id="slf-app">

        <!-- SIDEBAR / DRAWER -->
        <div id="slf-sidebar">
            <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-2" style="display:none" id="slf-drawer-handle"></div>

            <!-- Name input -->
            <label class="slf-label">Dein Name
                <input class="slf-input" id="slf-name-input" type="text" maxlength="16" placeholder="Name eingeben...">
            </label>

            <!-- Room controls -->
            <div class="flex flex-col gap-2">
                <label class="slf-label">Raumcode
                    <input class="slf-input" id="slf-room-input" type="text" maxlength="5" placeholder="ABCDE" style="text-transform:uppercase;">
                </label>
                <div class="flex gap-2">
                    <button class="slf-btn slf-btn-primary flex-1" onclick="slfCreateRoom()">Erstellen</button>
                    <button class="slf-btn slf-btn-secondary flex-1" onclick="slfJoinRoom()">Beitreten</button>
                </div>
            </div>

            <!-- Room status -->
            <div class="slf-panel">
                <div style="font-size:0.85rem;font-weight:600;">Aktueller Raum</div>
                <div class="slf-muted" id="slf-room-status">Noch nicht verbunden.</div>
                <code id="slf-room-code-display" style="font-size:0.8rem;color:#4ade80;">-----</code>
            </div>
            <div class="flex gap-2">
                <button class="slf-btn slf-btn-ghost flex-1" onclick="slfLeaveRoom()">Verlassen</button>
                <button class="slf-btn slf-btn-secondary flex-1" onclick="slfShareRoom()">Link kopieren</button>
            </div>

            <!-- Players -->
            <div>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Spieler</div>
                <div id="slf-player-list" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Categories (host only) -->
            <div id="slf-categories-section" style="display:none;">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategorien</div>
                <div id="slf-category-list" class="flex flex-wrap gap-2 mb-2"></div>
                <div class="flex gap-2">
                    <input class="slf-input" id="slf-new-category" type="text" maxlength="20" placeholder="Neue Kategorie..." style="flex:1;">
                    <button class="slf-btn slf-btn-secondary" onclick="slfAddCategory()">+</button>
                </div>
            </div>
        </div>

        <!-- GAME CENTER -->
        <div id="slf-game-center">
            <div id="slf-lobby-view" style="text-align:center;margin-top:48px;">
                <i data-lucide="globe" style="width:48px;height:48px;color:#4ade80;margin:0 auto 16px;display:block;"></i>
                <h2 style="font-size:1.3rem;font-weight:800;margin:0 0 8px;">Stadt Land Fluss</h2>
                <p class="slf-muted" style="max-width:320px;margin:0 auto;">
                    Erstelle einen Raum oder tritt einem bei, um zu spielen.
                </p>
            </div>
            <div id="slf-game-view" style="display:none;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;overflow-y:auto;padding-bottom:16px;">
                <!-- Start button (host, lobby) -->
                <button id="slf-start-btn" onclick="slfStartRound()" style="display:none;">Runde starten</button>

                <!-- Active round -->
                <div id="slf-round-area" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;">
                    <div id="slf-letter-display"></div>
                    <div id="slf-timer"></div>
                    <div id="slf-inputs" class="slf-input-grid"></div>
                    <button id="slf-stop-btn" onclick="slfStop()">STOPP!</button>
                </div>

                <!-- Results -->
                <div id="slf-results-area" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;overflow-y:auto;">
                    <h3 style="font-size:1.1rem;font-weight:800;">Ergebnisse</h3>
                    <div id="slf-round-scores" class="slf-round-scores"></div>
                    <div style="overflow-x:auto;width:100%;max-width:600px;">
                        <table class="slf-results-table" id="slf-results-table"></table>
                    </div>
                    <button id="slf-next-btn" onclick="slfStartRound()" style="display:none;" class="slf-btn slf-btn-primary">Nächste Runde</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SWIPE HINT -->
    <div class="swipe-hint swipe-hint-left"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTPO-01gusabZGy-TthEWZWntwct6LrEQ",
        authDomain: "wolfle.firebaseapp.com",
        projectId: "wolfle",
        storageBucket: "wolfle.firebasestorage.app",
        messagingSenderId: "286289741614",
        appId: "1:286289741614:web:14e5faad1616fe75755cbf"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DEFAULT_CATEGORIES = ['Stadt', 'Land', 'Fluss', 'Name', 'Tier', 'Beruf'];
    const LETTERS = 'ABCDEFGHIJKLMNOPRSTUVW'.split('');

    let roomCode = null;
    let roomUnsub = null;
    let roomData = null;

    // ── Helpers ──
    function getPlayerName() {
        return (document.getElementById('slf-name-input').value || '').trim();
    }
    function generateRoomCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }
    function roomDocRef(code) {
        return doc(db, 'artifacts', 'wolfle-v1', 'public', 'data', 'slf-rooms', code);
    }
    function showToast(msg) {
        // Simple alert for now, will be replaced with a toast UI later
        alert(msg);
    }

    // ── Room management ──
    window.slfCreateRoom = async () => {
        const name = getPlayerName();
        if (!name) return showToast('Bitte zuerst einen Namen eingeben.');
        const code = generateRoomCode();
        const payload = {
            hostName: name,
            players: { [name]: { score: 0 } },
            categories: [...DEFAULT_CATEGORIES],
            currentLetter: '',
            roundNumber: 0,
            status: 'lobby', // lobby | playing | scoring | results
            answers: {},
            usedLetters: [],
            stoppedBy: null,
            createdAt: Date.now()
        };
        await setDoc(roomDocRef(code), payload);
        document.getElementById('slf-room-input').value = code;
        listenToRoom(code);
    };

    window.slfJoinRoom = async () => {
        const name = getPlayerName();
        if (!name) return showToast('Bitte zuerst einen Namen eingeben.');
        const code = (document.getElementById('slf-room-input').value || '').toUpperCase().trim();
        if (!code) return showToast('Bitte einen Raumcode eingeben.');
        const snap = await getDoc(roomDocRef(code));
        if (!snap.exists()) return showToast('Raum nicht gefunden.');
        const data = snap.data();
        const players = { ...(data.players || {}) };
        players[name] = players[name] || { score: 0 };
        await updateDoc(roomDocRef(code), { players });
        listenToRoom(code);
    };

    window.slfLeaveRoom = async () => {
        if (!roomCode) return;
        const name = getPlayerName();
        if (roomUnsub) { roomUnsub(); roomUnsub = null; }
        try {
            await updateDoc(roomDocRef(roomCode), { [`players.${name}`]: deleteField() });
        } catch (e) {}
        roomCode = null;
        roomData = null;
        renderRoom();
    };

    window.slfShareRoom = () => {
        if (!roomCode) return;
        navigator.clipboard?.writeText(roomCode);
        showToast('Raumcode kopiert!');
    };

    function listenToRoom(code) {
        if (roomUnsub) roomUnsub();
        roomCode = code;
        roomUnsub = onSnapshot(roomDocRef(code), (snap) => {
            if (!snap.exists()) {
                roomCode = null;
                roomData = null;
                if (roomUnsub) { roomUnsub(); roomUnsub = null; }
            } else {
                roomData = snap.data();
            }
            renderRoom();
        });
    }

    // ── Categories (host only) ──
    window.slfAddCategory = async () => {
        if (!roomCode || !roomData) return;
        const name = getPlayerName();
        if (name !== roomData.hostName) return;
        const input = document.getElementById('slf-new-category');
        const cat = (input.value || '').trim();
        if (!cat) return;
        if (roomData.categories.includes(cat)) return showToast('Kategorie existiert bereits.');
        await updateDoc(roomDocRef(roomCode), { categories: [...roomData.categories, cat] });
        input.value = '';
    };

    window.slfRemoveCategory = async (cat) => {
        if (!roomCode || !roomData) return;
        const name = getPlayerName();
        if (name !== roomData.hostName) return;
        if (roomData.categories.length <= 2) return showToast('Mindestens 2 Kategorien.');
        await updateDoc(roomDocRef(roomCode), {
            categories: roomData.categories.filter(c => c !== cat)
        });
    };

    // ── Game logic ──
    let timerInterval = null;
    let timeLeft = 0;
    let localAnswers = {};
    let answersSubmitted = false;

    window.slfStartRound = async () => {
        if (!roomCode || !roomData) return;
        const name = getPlayerName();
        if (name !== roomData.hostName) return;

        // Pick a letter not yet used
        const used = roomData.usedLetters || [];
        const available = LETTERS.filter(l => !used.includes(l));
        if (available.length === 0) {
            return showToast('Alle Buchstaben wurden bereits verwendet!');
        }
        const letter = available[Math.floor(Math.random() * available.length)];

        await updateDoc(roomDocRef(roomCode), {
            status: 'playing',
            currentLetter: letter,
            roundNumber: (roomData.roundNumber || 0) + 1,
            answers: {},
            stoppedBy: null,
            usedLetters: [...used, letter],
            _scoresUpdated: false
        });
    };

    window.slfStop = async () => {
        if (!roomCode || !roomData || roomData.status !== 'playing') return;
        const name = getPlayerName();
        // Submit own answers first
        await slfSubmitAnswers();
        await updateDoc(roomDocRef(roomCode), {
            status: 'scoring',
            stoppedBy: name
        });
    };

    async function slfSubmitAnswers() {
        if (!roomCode || answersSubmitted) return;
        const name = getPlayerName();
        const answers = {};
        (roomData.categories || []).forEach(cat => {
            const input = document.getElementById('slf-answer-' + cat);
            answers[cat] = (input?.value || '').trim();
        });
        answersSubmitted = true;
        await updateDoc(roomDocRef(roomCode), { [`answers.${name}`]: answers });
    }

    function scoreRound(data) {
        const players = Object.keys(data.players || {});
        const categories = data.categories || [];
        const answers = data.answers || {};
        const roundScores = {};

        players.forEach(p => { roundScores[p] = 0; });

        categories.forEach(cat => {
            // Collect all answers for this category, normalized
            const catAnswers = {};
            players.forEach(p => {
                const raw = (answers[p] && answers[p][cat]) || '';
                catAnswers[p] = raw.trim().toLowerCase();
            });

            // Check if answer starts with the correct letter
            const letter = (data.currentLetter || '').toLowerCase();

            players.forEach(p => {
                const ans = catAnswers[p];
                if (!ans || !ans.startsWith(letter)) {
                    // 0 points - empty or wrong letter
                    return;
                }
                // Check if unique among all players
                const same = players.filter(q => q !== p && catAnswers[q] === ans);
                if (same.length === 0) {
                    roundScores[p] += 10; // unique
                } else {
                    roundScores[p] += 5; // duplicate
                }
            });
        });

        return roundScores;
    }

    // ── Rendering ──
    function renderRoom() {
        const statusEl = document.getElementById('slf-room-status');
        const codeEl = document.getElementById('slf-room-code-display');
        const playerList = document.getElementById('slf-player-list');
        const catSection = document.getElementById('slf-categories-section');
        const catList = document.getElementById('slf-category-list');
        const lobbyView = document.getElementById('slf-lobby-view');
        const gameView = document.getElementById('slf-game-view');

        if (!roomCode || !roomData) {
            statusEl.textContent = 'Noch nicht verbunden.';
            codeEl.textContent = '-----';
            playerList.innerHTML = '';
            catSection.style.display = 'none';
            lobbyView.style.display = '';
            gameView.style.display = 'none';
            lobbyView.querySelector('p').textContent = 'Erstelle einen Raum oder tritt einem bei, um zu spielen.';
            return;
        }

        statusEl.textContent = roomData.status === 'lobby' ? 'Warte auf Spieler...' :
            roomData.status === 'playing' ? 'Runde ' + roomData.roundNumber + ' läuft...' :
            'Runde ' + roomData.roundNumber + ' — Auswertung';
        codeEl.textContent = roomCode;

        // Players
        const players = Object.keys(roomData.players || {});
        playerList.innerHTML = players.map(p =>
            `<div class="slf-player-chip ${p === roomData.hostName ? 'host' : ''}">
                ${p === roomData.hostName ? '👑 ' : ''}${p}
                <span class="slf-muted">${roomData.players[p].score} Pkt</span>
            </div>`
        ).join('');

        // Categories
        const isHost = getPlayerName() === roomData.hostName;
        catSection.style.display = roomCode ? '' : 'none';
        catList.innerHTML = (roomData.categories || []).map(c =>
            `<span class="slf-category-tag">${c}${isHost && roomData.status === 'lobby' ? `<button onclick="slfRemoveCategory('${c}')">&times;</button>` : ''}</span>`
        ).join('');

        // Show game view when in room
        const status = roomData.status || 'lobby';

        if (status === 'lobby') {
            lobbyView.style.display = '';
            gameView.style.display = 'none';
            lobbyView.querySelector('p').textContent = `Raum ${roomCode} — ${players.length} Spieler`;

            // Show start button for host
            gameView.style.display = 'flex';
            lobbyView.style.display = 'none';
            const startBtn = document.getElementById('slf-start-btn');
            const roundArea = document.getElementById('slf-round-area');
            const resultsArea = document.getElementById('slf-results-area');
            startBtn.style.display = isHost ? '' : 'none';
            startBtn.disabled = players.length < 1;
            roundArea.style.display = 'none';
            resultsArea.style.display = 'none';

            if (!isHost) {
                // Show waiting message for non-host
                startBtn.style.display = 'none';
            }
        } else if (status === 'playing') {
            lobbyView.style.display = 'none';
            gameView.style.display = 'flex';
            answersSubmitted = false;

            const startBtn = document.getElementById('slf-start-btn');
            const roundArea = document.getElementById('slf-round-area');
            const resultsArea = document.getElementById('slf-results-area');
            startBtn.style.display = 'none';
            roundArea.style.display = 'flex';
            resultsArea.style.display = 'none';

            // Show letter
            document.getElementById('slf-letter-display').textContent = roomData.currentLetter;

            // Build input fields (only if not already built for this round)
            const inputsEl = document.getElementById('slf-inputs');
            const existingRound = inputsEl.dataset.round;
            if (existingRound !== String(roomData.roundNumber)) {
                inputsEl.dataset.round = roomData.roundNumber;
                inputsEl.innerHTML = (roomData.categories || []).map(cat =>
                    `<div class="slf-input-row">
                        <label>${cat}</label>
                        <input type="text" id="slf-answer-${cat}" placeholder="${roomData.currentLetter}..." autocomplete="off">
                    </div>`
                ).join('');
                // Focus first input
                inputsEl.querySelector('input')?.focus();
            }

            document.getElementById('slf-stop-btn').disabled = false;
        } else if (status === 'scoring') {
            lobbyView.style.display = 'none';
            gameView.style.display = 'flex';

            const startBtn = document.getElementById('slf-start-btn');
            const roundArea = document.getElementById('slf-round-area');
            const resultsArea = document.getElementById('slf-results-area');
            startBtn.style.display = 'none';
            roundArea.style.display = 'none';
            resultsArea.style.display = 'flex';

            // Auto-submit if we haven't yet
            if (!answersSubmitted) slfSubmitAnswers();

            // Disable inputs
            document.querySelectorAll('#slf-inputs input').forEach(i => i.disabled = true);
            document.getElementById('slf-stop-btn').disabled = true;

            // Score and render results
            const roundScores = scoreRound(roomData);
            const categories = roomData.categories || [];
            const answers = roomData.answers || {};

            // Score cards
            document.getElementById('slf-round-scores').innerHTML = players.map(p =>
                `<div class="slf-score-card">
                    <div class="name">${p}${roomData.stoppedBy === p ? ' 🛑' : ''}</div>
                    <div class="pts">+${roundScores[p] || 0}</div>
                </div>`
            ).join('');

            // Results table
            const letter = (roomData.currentLetter || '').toLowerCase();
            let tableHTML = '<thead><tr><th>Kategorie</th>';
            players.forEach(p => { tableHTML += `<th>${p}</th>`; });
            tableHTML += '</tr></thead><tbody>';

            categories.forEach(cat => {
                tableHTML += '<tr><td style="font-weight:600;">' + cat + '</td>';
                const catAnswers = {};
                players.forEach(p => {
                    catAnswers[p] = ((answers[p] && answers[p][cat]) || '').trim().toLowerCase();
                });
                players.forEach(p => {
                    const raw = (answers[p] && answers[p][cat]) || '';
                    const norm = raw.trim().toLowerCase();
                    let cls = 'slf-score-empty';
                    let pts = '0';
                    if (norm && norm.startsWith(letter)) {
                        const same = players.filter(q => q !== p && catAnswers[q] === norm);
                        if (same.length === 0) { cls = 'slf-score-unique'; pts = '10'; }
                        else { cls = 'slf-score-duplicate'; pts = '5'; }
                    }
                    tableHTML += `<td>${raw || '—'} <span class="${cls}">(${pts})</span></td>`;
                });
                tableHTML += '</tr>';
            });
            tableHTML += '</tbody>';
            document.getElementById('slf-results-table').innerHTML = tableHTML;

            // Next round button (host only)
            const nextBtn = document.getElementById('slf-next-btn');
            nextBtn.style.display = isHost ? '' : 'none';

            // Host: update total scores
            if (isHost && !roomData._scoresUpdated) {
                const updatedPlayers = { ...roomData.players };
                players.forEach(p => {
                    updatedPlayers[p] = { ...updatedPlayers[p], score: (updatedPlayers[p].score || 0) + (roundScores[p] || 0) };
                });
                updateDoc(roomDocRef(roomCode), { players: updatedPlayers, _scoresUpdated: true });
            }
        }
    }

    // ── Drawer ──
    window.slfOpenDrawer = () => {
        const sidebar = document.getElementById('slf-sidebar');
        const overlay = document.getElementById('slf-drawer-overlay');
        const handle = document.getElementById('slf-drawer-handle');
        if (sidebar) { sidebar.classList.add('open-drawer'); sidebar.style.transform = ''; }
        if (overlay) overlay.classList.add('open');
        if (handle) handle.style.display = 'block';
    };
    window.slfCloseDrawer = () => {
        const sidebar = document.getElementById('slf-sidebar');
        const overlay = document.getElementById('slf-drawer-overlay');
        const handle = document.getElementById('slf-drawer-handle');
        if (sidebar) sidebar.classList.remove('open-drawer');
        if (overlay) overlay.classList.remove('open');
        if (handle) handle.style.display = 'none';
    };

    // ── Swipe gestures ──
    {
        let swStartX = 0, swStartY = 0, swTracking = false;
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length !== 1) return;
            swStartX = e.touches[0].clientX;
            swStartY = e.touches[0].clientY;
            swTracking = true;
        }, { passive: true });
        document.addEventListener('touchend', (e) => {
            if (!swTracking) return;
            swTracking = false;
            const t = e.changedTouches[0];
            const dx = t.clientX - swStartX;
            const dy = t.clientY - swStartY;
            if (Math.abs(dx) < 60) return;
            if (Math.abs(dy) / Math.abs(dx) > 0.6) return;
            if (e.target.closest('#slf-sidebar, #slf-drawer-overlay, input, select, button')) return;
            if (dx > 0) slfOpenDrawer();
        }, { passive: true });
    }

    // ── Zoom prevention ──
    let lastTouchEnd = 0;
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault());

    // ── Theme ──
    const savedTheme = localStorage.getItem('wolfle_theme') || '';
    if (savedTheme) document.documentElement.className = savedTheme;

    // ── Saved name ──
    const savedName = localStorage.getItem('wolfle_user_name') || '';
    if (savedName) document.getElementById('slf-name-input').value = savedName;
    document.getElementById('slf-name-input').addEventListener('change', (e) => {
        localStorage.setItem('wolfle_user_name', e.target.value.trim());
    });

    // ── Init ──
    lucide.createIcons();
    renderRoom();
</script>
