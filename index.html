<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wolfle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="words.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animations */
        .flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0%   { transform: rotateX(0deg); }
            50%  { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-5px); }
            40%,80% { transform: translateX(5px); }
        }

        /* Tile colours */
        .bg-correct { background-color: #22c55e !important; border-color: #22c55e !important; color: white; }
        .bg-present { background-color: #eab308 !important; border-color: #eab308 !important; color: white; }
        .bg-absent  { background-color: #3f3f46 !important; border-color: #3f3f46 !important; color: white; }

        /* Grid: scales to available space */
        #grid-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            padding: 8px;
        }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: clamp(4px, 1vw, 8px);
            height: 100%;
            aspect-ratio: 5/6;
            max-height: 100%;
            max-width: 100%;
        }
        .grid-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(4px, 1vw, 8px);
        }
        .cell {
            border: 2px solid #334155;
            border-radius: 6px;
            background: rgba(30,41,59,0.5);
            color: white;
            font-weight: bold;
            font-size: clamp(14px, 3vw, 22px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: border-color 0.15s;
            width: 100%;
            height: 100%;
        }

        /* Keyboard */
        #keyboard {
            padding: 4px 6px max(8px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            flex-shrink: 0;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: clamp(3px, 0.8vw, 6px);
        }
        .kb-key {
            flex: 1;
            height: clamp(36px, 5.5vh, 52px);
            background: #334155;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: clamp(10px, 2vw, 13px);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .kb-key:active { filter: brightness(0.75); }

        /* Desktop layout */
        #app {
            display: flex;
            flex-direction: row;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #sidebar-left  { width: 280px; min-width: 280px; }
        #sidebar-right { width: 240px; min-width: 240px; }
        #game-center   { flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; min-width: 0; }

        /* Mobile header */
        #mobile-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 16px 8px;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
        }

        /* Drawer */
        #drawer-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(2,6,23,0.75);
            z-index: 40;
            backdrop-filter: blur(4px);
        }
        #drawer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px max(20px, env(safe-area-inset-bottom));
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            max-height: 88dvh;
            overflow-y: auto;
        }
        #drawer.open { transform: translateY(0); }
        #drawer-overlay.open { display: block; }

        /* Bottom nav */
        #bottom-nav {
            display: none;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1e293b;
            background: #0f172a;
            padding: 4px 0 max(4px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #64748b;
            font-size: 10px;
            padding: 6px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background: none;
            border: none;
            transition: color 0.15s;
        }
        .nav-btn.active { color: #818cf8; }

        /* Modal */
        #end-modal { backdrop-filter: blur(6px); }
        #end-modal-box {
            transition: transform 0.25s ease, opacity 0.25s ease;
            transform: scale(0.9);
            opacity: 0;
        }
        #end-modal-box.visible { transform: scale(1); opacity: 1; }
        .end-letter {
            width: 2.5rem; height: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: bold; border-radius: 6px;
            border: 2px solid #3f3f46; color: white; text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        button:focus { outline: none; }
        input:focus { border-color: #6366f1 !important; outline: none; }

        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar-left, #sidebar-right { display: none !important; }
            #mobile-header { display: flex; }
            #bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none items-center"></div>

    <!-- END GAME MODAL -->
    <div id="end-modal" class="hidden fixed inset-0 bg-slate-900/80 z-[90] flex items-center justify-center p-4">
        <div id="end-modal-box" class="w-full max-w-sm bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl text-center">
            <div id="end-emoji" class="text-5xl mb-2"></div>
            <h2 id="end-title" class="text-2xl font-bold text-white mb-1"></h2>
            <p id="end-subtitle" class="text-slate-400 text-sm mb-4"></p>
            <div id="end-word" class="flex justify-center gap-2 mb-4"></div>
            <div id="end-points" class="hidden mb-4 inline-block bg-indigo-900/50 border border-indigo-500/40 text-indigo-300 text-sm font-semibold px-4 py-1.5 rounded-full"></div>
            <div class="flex flex-col gap-3 mt-2">
                <button onclick="window.playAgain()"
                    class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Nochmal spielen
                </button>
                <button onclick="window.closeModal()"
                    class="w-full text-slate-400 hover:text-slate-200 py-2 text-sm transition-colors">
                    Board ansehen
                </button>
            </div>
        </div>
    </div>

    <!-- MOBILE HEADER -->
    <div id="mobile-header">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-1.5">
            <i data-lucide="paw-print" class="w-5 h-5 text-indigo-400"></i> Wolfle
        </h1>
        <button onclick="window.playAgain()" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Neu
        </button>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="drawer-overlay" onclick="window.closeDrawer()"></div>

    <!-- DRAWER -->
    <div id="drawer">
        <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-5"></div>
        <div id="drawer-content"></div>
    </div>

    <!-- MAIN APP -->
    <div id="app">

        <!-- LEFT SIDEBAR (desktop) -->
        <div id="sidebar-left" class="bg-slate-900/50 border-r border-slate-800 p-5 flex flex-col gap-5 overflow-y-auto">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-2">
                <i data-lucide="paw-print"></i> Wolfle
            </h1>
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Dein Name</label>
                <input type="text" id="playerName" maxlength="15" placeholder="Name für Bestenliste..."
                    class="name-input w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white transition-colors">
                <p class="text-xs text-slate-500 mt-2"><i data-lucide="info" class="inline w-3 h-3 mr-1"></i>Mit Name → Punkte werden veröffentlicht</p>
            </div>
            <button onclick="window.startSolo()"
                class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl border border-slate-700 transition-all">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Neues Spiel
            </button>
            <div>
                <div class="relative flex items-center py-1 mb-3">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="mx-3 text-slate-500 text-xs uppercase">Multiplayer</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>
                <button onclick="window.createRoom()"
                    class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-xl mb-2 transition-colors">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Raum erstellen
                </button>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="roomInput" placeholder="CODE" maxlength="5"
                        class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-center uppercase tracking-widest text-white transition-colors">
                    <button onclick="window.joinRoom()"
                        class="w-1/2 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl transition-colors text-sm">Beitreten</button>
                </div>
                <button class="share-btn hidden w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl transition-colors text-sm" onclick="window.shareRoom()">
                    <i data-lucide="share-2" class="w-4 h-4"></i> Link kopieren
                </button>
            </div>
            <div class="room-status hidden bg-indigo-900/20 p-3 rounded-xl border border-indigo-500/30">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-indigo-300">Raum: <span class="room-code-display text-white font-mono"></span></h3>
                    <button onclick="window.leaveRoom()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
                <ul class="room-players-list space-y-1.5 text-sm"></ul>
            </div>
        </div>

        <!-- GAME CENTER -->
        <div id="game-center">
            <div id="grid-wrapper"><div id="grid"></div></div>
            <div id="keyboard"></div>
        </div>

        <!-- RIGHT SIDEBAR (desktop) -->
        <div id="sidebar-right" class="bg-slate-900/50 border-l border-slate-800 p-5 flex flex-col">
            <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-200">
                <i data-lucide="trophy" class="text-yellow-500 w-5 h-5"></i> Top Liste
            </h2>
            <ul id="leaderboard" class="leaderboard-list space-y-2 overflow-y-auto flex-1">
                <li class="text-slate-500 text-sm italic">Gib einen Namen ein...</li>
            </ul>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <div id="bottom-nav">
        <button class="nav-btn" onclick="window.openDrawer('menu')" id="nav-menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
            <span>Menü</span>
        </button>
        <button class="nav-btn active" id="nav-game" onclick="window.closeDrawer()">
            <i data-lucide="grid-2x2" class="w-5 h-5"></i>
            <span>Spiel</span>
        </button>
        <button class="nav-btn" onclick="window.openDrawer('leaderboard')" id="nav-lb">
            <i data-lucide="trophy" class="w-5 h-5"></i>
            <span>Top Liste</span>
        </button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const FALLBACK = ["APFEL","STADT","STUHL","TISCH","VOGEL"];
    const WORDS = (window.WOLFLE_WORDS?.length > 0) ? window.WOLFLE_WORDS : FALLBACK;
    const appId = 'wolfle-v1';
    const firebaseConfig = {
        apiKey: "AIzaSyDTPO-01gusabZGy-TthEWZWntwct6LrEQ",
        authDomain: "wolfle.firebaseapp.com",
        projectId: "wolfle",
        storageBucket: "wolfle.firebasestorage.app",
        messagingSenderId: "286289741614",
        appId: "1:286289741614:web:14e5faad1616fe75755cbf"
    };

    let targetWord = "";
    let currentRow = 0, currentCol = 0, cells = [], gameOver = false, letterStates = {};
    let currentRoomCode = null, roomUnsubscribe = null, db = null;

    // ── Firebase ──────────────────────────────────────────────
    async function getDB() {
        if (db) return db;
        if (!getPlayerName()) return null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            return db;
        } catch(e) { console.error(e); return null; }
    }

    function getPlayerName() {
        return (document.getElementById('playerName')?.value || '').trim();
    }

    // Sync all name inputs (desktop sidebar + mobile drawer)
    document.addEventListener('input', async (e) => {
        if (!e.target.classList.contains('name-input')) return;
        const val = e.target.value;
        document.querySelectorAll('.name-input').forEach(el => { if (el !== e.target) el.value = val; });
        const trimmed = val.trim();
        if (trimmed) {
            localStorage.setItem('wolfle_user_name', trimmed);
            await getDB();
            loadLeaderboard();
        }
    });

    // ── Grid ──────────────────────────────────────────────────
    function createGrid() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = ''; cells = [];
        for (let i = 0; i < 6; i++) {
            cells[i] = [];
            const row = document.createElement("div");
            row.className = "grid-row";
            for (let j = 0; j < 5; j++) {
                const d = document.createElement("div");
                d.className = "cell";
                row.appendChild(d); cells[i][j] = d;
            }
            gridEl.appendChild(row);
        }
    }

    // ── Keyboard ──────────────────────────────────────────────
    function createKeyboard() {
        const kb = document.getElementById("keyboard");
        const layout = [
            ['Q','W','E','R','T','Z','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['ENTER','Y','X','C','V','B','N','M','⌫']
        ];
        kb.innerHTML = '';
        layout.forEach(row => {
            const rDiv = document.createElement("div");
            rDiv.className = "kb-row";
            row.forEach(key => {
                const b = document.createElement("button");
                b.textContent = key;
                b.className = "kb-key";
                if (key === 'ENTER') { b.style.flex = '1.6'; b.onclick = () => submitGuess(); }
                else if (key === '⌫') { b.style.flex = '1.6'; b.onclick = () => backspace(); }
                else { b.id = `key-${key}`; b.onclick = () => typeLetter(key); }
                rDiv.appendChild(b);
            });
            kb.appendChild(rDiv);
        });
    }

    function typeLetter(l) { if (currentCol < 5 && !gameOver) cells[currentRow][currentCol++].textContent = l; }
    function backspace()   { if (currentCol > 0 && !gameOver) cells[currentRow][--currentCol].textContent = ""; }

    // ── Submit ────────────────────────────────────────────────
    async function submitGuess() {
        if (currentCol < 5 || gameOver) return;
        let guess = "";
        for (let i = 0; i < 5; i++) guess += cells[currentRow][i].textContent;

        try {
            const res = await fetch(`https://de.wiktionary.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${guess.toLowerCase()}&srlimit=1`);
            const data = await res.json();
            if (!data.query.search.some(r => r.title.toLowerCase() === guess.toLowerCase())) {
                showToast("Kein deutsches Wort!", "error");
                cells[currentRow][0].parentElement.classList.add("shake");
                setTimeout(() => cells[currentRow][0].parentElement.classList.remove("shake"), 400);
                return;
            }
        } catch(e) {}

        const evaluation = new Array(5).fill('absent');
        let tT = targetWord.split(''), tG = guess.split('');
        for (let i = 0; i < 5; i++) if (tG[i]===tT[i]) { evaluation[i]='correct'; tT[i]=tG[i]=null; }
        for (let i = 0; i < 5; i++) if (tG[i]) { const idx=tT.indexOf(tG[i]); if(idx!==-1){ evaluation[i]='present'; tT[idx]=null; } }

        for (let i = 0; i < 5; i++) {
            const cell = cells[currentRow][i];
            setTimeout(() => {
                cell.classList.add("flip");
                setTimeout(() => {
                    cell.classList.add(`bg-${evaluation[i]}`);
                    updateKeyColor(guess[i], evaluation[i]);
                }, 300);
            }, i * 100);
        }

        const win = guess === targetWord;
        const lastRow = currentRow;
        currentRow++; currentCol = 0;

        setTimeout(async () => {
            if (win) await endGame(true);
            else if (lastRow === 5) await endGame(false);
            else if (currentRoomCode) updateRoomProgress(currentRow, false, false);
        }, 800);
    }

    function updateKeyColor(l, s) {
        const b = document.getElementById(`key-${l}`);
        if (!b || letterStates[l] === 'correct') return;
        letterStates[l] = s;
        b.className = 'kb-key bg-' + s;
    }

    // ── End Game ──────────────────────────────────────────────
    async function endGame(win) {
        gameOver = true;
        let points = 0;
        if (win) {
            points = (7 - currentRow) * 10;
            const name = getPlayerName();
            if (name) {
                const firestore = await getDB();
                if (firestore) {
                    try {
                        const ref = doc(firestore,'artifacts',appId,'public','data','scores',name.toLowerCase());
                        const snap = await getDoc(ref);
                        const total = (snap.exists() ? (snap.data().score||0) : 0) + points;
                        await setDoc(ref, { name, score: total }, { merge: true });
                        loadLeaderboard();
                    } catch(e) {}
                }
            }
        }
        if (currentRoomCode) updateRoomProgress(currentRow, true, win);
        setTimeout(() => showEndModal(win, points), 400);
    }

    function showEndModal(win, points) {
        document.getElementById('end-emoji').textContent = win ? '🎉' : '😔';
        document.getElementById('end-title').textContent = win ? 'Gewonnen!' : 'Verloren!';
        document.getElementById('end-subtitle').textContent = win
            ? `In ${currentRow} ${currentRow===1?'Versuch':'Versuchen'}`
            : 'Kein Versuch mehr übrig';

        const wordEl = document.getElementById('end-word');
        wordEl.innerHTML = '';
        targetWord.split('').forEach(l => {
            const d = document.createElement('div');
            d.className = 'end-letter ' + (win ? 'bg-correct' : 'bg-absent');
            d.textContent = l;
            wordEl.appendChild(d);
        });

        const pts = document.getElementById('end-points');
        if (win && points > 0) { pts.textContent = `+${points} Punkte`; pts.classList.remove('hidden'); pts.classList.add('inline-block'); }
        else pts.classList.add('hidden');

        document.getElementById('end-modal').classList.remove('hidden');
        requestAnimationFrame(() => requestAnimationFrame(() =>
            document.getElementById('end-modal-box').classList.add('visible')
        ));
    }

    window.closeModal = () => {
        document.getElementById('end-modal-box').classList.remove('visible');
        setTimeout(() => document.getElementById('end-modal').classList.add('hidden'), 250);
    };

    window.playAgain = () => {
        window.closeModal();
        setTimeout(() => {
            resetGame();
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
            showToast("Neues Spiel!", "success");
        }, 260);
    };

    // ── Leaderboard ───────────────────────────────────────────
    async function loadLeaderboard() {
        const firestore = await getDB(); if (!firestore) return;
        document.querySelectorAll('.leaderboard-list').forEach(l =>
            l.innerHTML = '<li class="text-slate-500 text-sm italic">Lade...</li>');
        try {
            const snap = await getDocs(collection(firestore,'artifacts',appId,'public','data','scores'));
            let d = [];
            snap.forEach(doc => { if (doc.data().score) d.push(doc.data()); });
            d.sort((a,b) => b.score - a.score);
            const me = getPlayerName().toLowerCase();
            const html = d.length === 0
                ? '<li class="text-slate-500 text-sm italic">Noch keine Einträge.</li>'
                : d.slice(0,10).map((s,i) => {
                    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
                    const isMe = s.name.toLowerCase() === me;
                    return `<li class="flex justify-between ${isMe?'bg-indigo-900/40 border border-indigo-500/30':'bg-slate-800/40'} p-2 rounded text-sm">
                        <span>${medal} ${s.name}</span><span class="text-indigo-400 font-bold">${s.score}</span></li>`;
                }).join('');
            document.querySelectorAll('.leaderboard-list').forEach(l => l.innerHTML = html);
        } catch(e) {}
    }

    // ── Multiplayer ───────────────────────────────────────────
    window.createRoom = async () => {
        const name = getPlayerName();
        if (!name) { showToast("Bitte zuerst Namen eingeben!", "warning"); return; }
        const firestore = await getDB(); if (!firestore) return;
        const code = Math.random().toString(36).substring(2,7).toUpperCase();
        const word = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
        await setDoc(doc(firestore,'artifacts',appId,'public','data','rooms',code),
            { word, players: { [name]: { name, guesses:0, finished:false, won:false } } });
        joinInternal(code, word);
        document.querySelectorAll('.share-btn').forEach(b => b.classList.remove('hidden'));
    };

    window.joinRoom = async () => {
        const name = getPlayerName();
        if (!name) { showToast("Bitte zuerst Namen eingeben!", "warning"); return; }
        const firestore = await getDB(); if (!firestore) return;
        const input = document.getElementById("roomInput");
        const code = (input?.value||'').toUpperCase().trim();
        if (!code) { showToast("Bitte Raumcode eingeben!", "warning"); return; }
        const snap = await getDoc(doc(firestore,'artifacts',appId,'public','data','rooms',code));
        if (snap.exists()) {
            await setDoc(doc(firestore,'artifacts',appId,'public','data','rooms',code),
                { players: { [name]: { name, guesses:0, finished:false, won:false } } }, { merge:true });
            joinInternal(code, snap.data().word);
        } else { showToast("Raum nicht gefunden!", "error"); }
    };

    function joinInternal(code, word) {
        resetGame(); targetWord = word; currentRoomCode = code;
        document.querySelectorAll('.room-code-display').forEach(el => el.textContent = code);
        document.querySelectorAll('.room-status').forEach(el => el.classList.remove('hidden'));
        listenToRoom(code);
        showToast("Raum " + code + " beigetreten", "success");
        window.closeDrawer();
    }

    async function listenToRoom(code) {
        const firestore = await getDB(); if (!firestore) return;
        if (roomUnsubscribe) roomUnsubscribe();
        roomUnsubscribe = onSnapshot(doc(firestore,'artifacts',appId,'public','data','rooms',code), snap => {
            if (!snap.exists()) return;
            const html = Object.values(snap.data().players).map(p =>
                `<li class="flex justify-between bg-slate-800/50 p-2 rounded text-xs">
                    <span class="font-medium">${p.name||'Spieler'}</span>
                    <span>${p.finished?(p.won?'🏆':'💀'):'⌨️'} ${p.guesses}/6</span>
                </li>`).join('');
            document.querySelectorAll('.room-players-list').forEach(el => el.innerHTML = html);
        });
    }

    async function updateRoomProgress(g, f, w) {
        if (!currentRoomCode) return;
        const firestore = await getDB(); if (!firestore) return;
        const name = getPlayerName();
        await setDoc(doc(firestore,'artifacts',appId,'public','data','rooms',currentRoomCode),
            { players: { [name]: { name, guesses:g, finished:f, won:w } } }, { merge:true });
    }

    window.leaveRoom = () => {
        if (roomUnsubscribe) roomUnsubscribe();
        currentRoomCode = null; roomUnsubscribe = null;
        document.querySelectorAll('.room-status').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.share-btn').forEach(b => b.classList.add('hidden'));
    };

    window.shareRoom = () => {
        const url = `${location.origin}${location.pathname}?room=${currentRoomCode}`;
        navigator.clipboard.writeText(url).then(() => showToast("Link kopiert!", "success"));
    };

    window.startSolo = () => {
        window.leaveRoom(); resetGame();
        targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
        showToast("Neues Spiel!", "success");
        window.closeDrawer();
    };

    function resetGame() {
        createGrid(); createKeyboard();
        currentRow = 0; currentCol = 0; gameOver = false; letterStates = {};
    }

    function showToast(m, type) {
        const c = document.getElementById("toast-container");
        const t = document.createElement("div");
        const colors = { success:'border-green-500/50', error:'border-red-500/50', warning:'border-yellow-500/50' };
        t.className = `px-4 py-2 rounded-full border shadow-lg text-sm bg-slate-800 ${colors[type]||'border-slate-600'}`;
        t.textContent = m; c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ── Drawer ────────────────────────────────────────────────
    window.openDrawer = (tab) => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab === 'menu' ? 'nav-menu' : 'nav-lb')?.classList.add('active');

        const savedName = localStorage.getItem('wolfle_user_name') || '';
        const drawerContent = document.getElementById('drawer-content');

        if (tab === 'menu') {
            drawerContent.innerHTML = `
            <div class="flex flex-col gap-4">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Dein Name</label>
                    <input type="text" class="name-input w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"
                        maxlength="15" placeholder="Name für Bestenliste..." value="${savedName}">
                    <p class="text-xs text-slate-500 mt-2">Mit Name → Punkte werden veröffentlicht</p>
                </div>
                <button onclick="window.startSolo()"
                    class="w-full flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl transition-colors">
                    Neues Solo-Spiel
                </button>
                <div class="relative flex items-center py-1">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="mx-3 text-slate-500 text-xs uppercase">Multiplayer</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>
                <button onclick="window.createRoom()"
                    class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl transition-colors">
                    Raum erstellen
                </button>
                <div class="flex gap-2">
                    <input type="text" id="roomInput" placeholder="CODE" maxlength="5"
                        class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl px-2 py-2.5 text-center uppercase tracking-widest text-white">
                    <button onclick="window.joinRoom()"
                        class="w-1/2 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl transition-colors">Beitreten</button>
                </div>
                <button class="share-btn hidden w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl transition-colors" onclick="window.shareRoom()">
                    Link kopieren
                </button>
                <div class="room-status hidden bg-indigo-900/20 p-3 rounded-xl border border-indigo-500/30">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-sm font-semibold text-indigo-300">Raum: <span class="room-code-display text-white font-mono"></span></h3>
                        <button onclick="window.leaveRoom()" class="text-red-400 text-sm">Verlassen</button>
                    </div>
                    <ul class="room-players-list space-y-1.5 text-sm"></ul>
                </div>
            </div>`;
            // Restore room state in drawer if active
            if (currentRoomCode) {
                drawerContent.querySelectorAll('.room-status').forEach(el => el.classList.remove('hidden'));
                drawerContent.querySelectorAll('.room-code-display').forEach(el => el.textContent = currentRoomCode);
                drawerContent.querySelectorAll('.share-btn').forEach(b => b.classList.remove('hidden'));
            }
        } else {
            drawerContent.innerHTML = `
            <div>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-200">
                    🏆 Top Liste
                </h2>
                <ul class="leaderboard-list space-y-2">
                    <li class="text-slate-500 text-sm italic">Lade...</li>
                </ul>
            </div>`;
            if (db) loadLeaderboard();
            else drawerContent.querySelector('.leaderboard-list').innerHTML =
                '<li class="text-slate-500 text-sm italic">Gib einen Namen ein...</li>';
        }

        document.getElementById('drawer').classList.add('open');
        document.getElementById('drawer-overlay').classList.add('open');
    };

    window.closeDrawer = () => {
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawer-overlay').classList.remove('open');
        document.getElementById('nav-game').classList.add('active');
        document.getElementById('nav-menu').classList.remove('active');
        document.getElementById('nav-lb').classList.remove('active');
    };

    // ── Keyboard events ───────────────────────────────────────
    document.addEventListener("keydown", (e) => {
        if (document.activeElement.tagName === "INPUT") return;
        if (e.key === "Enter") { e.preventDefault(); submitGuess(); }
        else if (e.key === "Backspace") backspace();
        else if (/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
    });

    // ── Init ──────────────────────────────────────────────────
    lucide.createIcons();
    createGrid();
    createKeyboard();
    targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();

    const savedName = localStorage.getItem('wolfle_user_name');
    if (savedName) {
        document.getElementById('playerName').value = savedName;
        getDB().then(() => loadLeaderboard());
    }

    const roomFromURL = new URLSearchParams(location.search).get('room');
    if (roomFromURL) {
        const inp = document.getElementById('roomInput');
        if (inp) inp.value = roomFromURL;
        if (savedName) window.joinRoom();
        else showToast("Gib deinen Namen ein um beizutreten", "warning");
    }
</script>
</body>
</html>
