<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfle</title>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{ margin-top:20px; }

.grid{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:60px;
height:60px;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
text-transform:uppercase;
}

.green{ background:#22c55e; }
.yellow{ background:#eab308; }
.gray{ background:#374151; }

.key{
display:inline-block;
margin:4px;
padding:10px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

button{
margin:10px;
padding:10px 20px;
background:#06b6d4;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.leaderboard{
margin-top:20px;
}
</style>
</head>

<body>

<h1>🐺 Wolfle</h1>

<div>
<button onclick="startSolo()">Solo</button>
<button onclick="startMulti()">Multiplayer</button>
</div>

<div id="grid" class="grid"></div>
<div id="keyboard"></div>

<p id="message"></p>

<button onclick="resetGame()">Neues Spiel</button>

<div class="leaderboard">
<h3>Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

<!-- 🔥 Firebase laden -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// 🔥 DEINE FIREBASE CONFIG (schon richtig eingesetzt)
const firebaseConfig = {
  apiKey: "AIzaSyDTPO-01gusaBZGy-TthEWZWntwct6LrEQ",
  authDomain: "wolfle.firebaseapp.com",
  projectId: "wolfle",
  storageBucket: "wolfle.firebasestorage.app",
  messagingSenderId: "286289741614",
  appId: "1:286289741614:web:14e5faad1616fe75755cbf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 Wörter (500+ kannst du später erweitern)
const words = [
"apple","table","chair","light","plant","stone","water","house","mouse","sound",
"video","audio","power","train","brain","clock","paper","glass","phone","cable",
"screen","track","click","press","shift","enter","space","drive","wheel","panel",
"model","array","stack","debug","logic","input","error","event","frame","pixel",
"index","level","score","timer","reset","start","block","class","style","color",
"green","white","black","brown","sweet","spice","sugar","bread","fruit","drink",
"smile","laugh","dream","sleep","night","storm","cloud","rainy","sunny","windy",
"river","ocean","beach","shore","earth","space","stars","planet","orbit","music"
];

let word;
let currentRow=0;
let currentCol=0;
let grid=[];
let gameOver=false;

const gridEl=document.getElementById("grid");
const msg=document.getElementById("message");

// GRID erstellen
for(let i=0;i<6;i++){
grid[i]=[];
for(let j=0;j<5;j++){
let d=document.createElement("div");
d.classList.add("cell");
gridEl.appendChild(d);
grid[i][j]=d;
}
}

// KEYBOARD
const letters="QWERTZUIOPASDFGHJKLYXCVBNM";
const kb=document.getElementById("keyboard");

letters.split("").forEach(l=>{
let k=document.createElement("div");
k.textContent=l;
k.classList.add("key");
k.onclick=()=>input(l);
kb.appendChild(k);
});

let enter=document.createElement("div");
enter.textContent="ENTER";
enter.classList.add("key");
enter.onclick=submit;
kb.appendChild(enter);

let del=document.createElement("div");
del.textContent="⌫";
del.classList.add("key");
del.onclick=back;
kb.appendChild(del);

// INPUT
document.addEventListener("keydown",(e)=>{
if(gameOver)return;
if(e.key==="Enter") submit();
else if(e.key==="Backspace") back();
else if(/[a-zA-Z]/.test(e.key)) input(e.key.toUpperCase());
});

function input(l){
if(currentCol<5){
grid[currentRow][currentCol].textContent=l;
currentCol++;
}
}

function back(){
if(currentCol>0){
currentCol--;
grid[currentRow][currentCol].textContent="";
}
}

function submit(){
if(currentCol<5) return;

let guess="";
for(let i=0;i<5;i++){
guess+=grid[currentRow][i].textContent.toLowerCase();
}

let wArr=word.split("");
let gArr=guess.split("");

// grün
for(let i=0;i<5;i++){
if(gArr[i]===wArr[i]){
grid[currentRow][i].classList.add("green");
wArr[i]=null;
gArr[i]=null;
}
}

// gelb
for(let i=0;i<5;i++){
if(gArr[i] && wArr.includes(gArr[i])){
grid[currentRow][i].classList.add("yellow");
wArr[wArr.indexOf(gArr[i])]=null;
}else if(gArr[i]){
grid[currentRow][i].classList.add("gray");
}
}

// win
if(guess===word){
msg.textContent="🎉 Gewonnen!";
saveScore(true);
return;
}

currentRow++;
currentCol=0;

if(currentRow===6){
msg.textContent="❌ Wort war: "+word;
saveScore(false);
}
}

// MODES
function startSolo(){
word = words[Math.floor(Math.random()*words.length)];
}

function startMulti(){
word = "apple"; // gleich für alle
}

// SCORE speichern
function saveScore(win){
gameOver=true;

let name = prompt("Dein Name?");
if(!name) return;

db.collection("scores").add({
name:name,
win:win,
time:Date.now()
});

loadLeaderboard();
}

// LEADERBOARD laden
function loadLeaderboard(){
db.collection("scores")
.orderBy("time","desc")
.limit(10)
.get()
.then(snapshot=>{
let list=document.getElementById("leaderboard");
list.innerHTML="";
snapshot.forEach(doc=>{
let li=document.createElement("li");
li.textContent = doc.data().name + " - " + (doc.data().win?"Win":"Lose");
list.appendChild(li);
});
});
}

function resetGame(){
location.reload();
}

loadLeaderboard();
startSolo();

</script>

</body>
</html>
