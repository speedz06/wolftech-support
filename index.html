<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfle</title>

<style>
body{
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(5,65px);
gap:12px;
justify-content:center;
margin-top:30px;
}

.cell{
width:65px;
height:65px;
border:2px solid #334155;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:600;
border-radius:12px;
}

.flip{ animation:flip 0.6s ease; }

@keyframes flip{
0%{transform:rotateX(0);}
50%{transform:rotateX(90deg);}
100%{transform:rotateX(0);}
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.shake{ animation:shake 0.4s; }

.green{ background:#22c55e; }
.yellow{ background:#eab308; }
.gray{ background:#374151; }

.key{
display:inline-block;
margin:4px;
padding:12px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
}

button{
margin:10px;
padding:12px 25px;
background:linear-gradient(135deg,#6366f1,#06b6d4);
border:none;
border-radius:25px;
color:white;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
}
</style>
</head>

<body>

<h1>🐺 Wolfle</h1>

<div>
<button onclick="startSolo()">Solo</button>
<button onclick="createRoom()">Room erstellen</button>
</div>

<div>
<input id="roomInput" placeholder="Room Code">
<button onclick="joinRoom()">Beitreten</button>
</div>

<p id="roomInfo"></p>

<div id="grid" class="grid"></div>
<div id="keyboard"></div>

<p id="message"></p>

<div class="leaderboard">
<h3>🏆 Top Spieler</h3>
<ul id="leaderboard"></ul>
</div>

<script src="words.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDTPO-01gusaBZGy-TthEWZWntwct6LrEQ",
  authDomain: "wolfle.firebaseapp.com",
  projectId: "wolfle"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Wörter
const words = WORDS;
const validWords = new Set(words);

let word;
let currentRow=0;
let currentCol=0;
let grid=[];
let gameOver=false;

const gridEl=document.getElementById("grid");

// GRID
for(let i=0;i<6;i++){
grid[i]=[];
for(let j=0;j<5;j++){
let d=document.createElement("div");
d.classList.add("cell");
gridEl.appendChild(d);
grid[i][j]=d;
}
}

// KEYBOARD
const letters="QWERTZUIOPASDFGHJKLYXCVBNM";
const kb=document.getElementById("keyboard");

letters.split("").forEach(l=>{
let k=document.createElement("div");
k.textContent=l;
k.classList.add("key");
k.onclick=()=>input(l);
kb.appendChild(k);
});

let enter=document.createElement("div");
enter.textContent="ENTER";
enter.classList.add("key");
enter.onclick=submit;
kb.appendChild(enter);

let del=document.createElement("div");
del.textContent="⌫";
del.classList.add("key");
del.onclick=back;
kb.appendChild(del);

// INPUT
document.addEventListener("keydown",(e)=>{
if(gameOver)return;

if(e.key==="Enter") submit();
else if(e.key==="Backspace") back();
else if(/^[a-zA-Z]$/.test(e.key)){
input(e.key.toUpperCase());
}
});

function input(l){
if(currentCol<5){
grid[currentRow][currentCol].textContent=l;
currentCol++;
}
}

function back(){
if(currentCol>0){
currentCol--;
grid[currentRow][currentCol].textContent="";
}
}

// SUBMIT
function submit(){
if(currentCol<5) return;

let guess="";
for(let i=0;i<5;i++){
guess+=grid[currentRow][i].textContent.toLowerCase();
}

if(!validWords.has(guess)){
showError("Kein gültiges Wort!");
shakeRow();
return;
}

let guessArr = guess.split("");
let wordArr = word.split("");

colorRow(guessArr, wordArr);

if(guess===word){
document.getElementById("message").textContent="🎉 Gewonnen!";
saveScore(true);
return;
}

currentRow++;
currentCol=0;

if(currentRow===6){
document.getElementById("message").textContent="❌ Wort war: "+word;
saveScore(false);
}
}

// Farben
function colorRow(guessArr, wordArr){
for(let i=0;i<5;i++){
let cell = grid[currentRow][i];

setTimeout(()=>{
cell.classList.add("flip");

if(guessArr[i]===wordArr[i]){
cell.classList.add("green");
}else if(wordArr.includes(guessArr[i])){
cell.classList.add("yellow");
}else{
cell.classList.add("gray");
}

}, i * 300);
}
}

// Ranking speichern
function saveScore(win){
gameOver=true;

let name = prompt("Dein Name?");
if(!name) return;

let score = win ? 100 - (currentRow * 10) : 0;
if(score < 10 && win) score = 10;

db.collection("scores").add({
name:name,
score:score,
win:win,
date:Date.now()
});

loadLeaderboard();
}

// Leaderboard
function loadLeaderboard(){
db.collection("scores")
.orderBy("score","desc")
.limit(10)
.get()
.then(snapshot=>{
let list=document.getElementById("leaderboard");
list.innerHTML="";

snapshot.forEach(doc=>{
let d = doc.data();
let li=document.createElement("li");
li.textContent = d.name+" | 🏆 "+d.score+" Punkte";
list.appendChild(li);
});
});
}

// Fehler UI
function showError(text){
const msg = document.getElementById("message");
msg.textContent = text;
setTimeout(()=>msg.textContent="",2000);
}

function shakeRow(){
for(let i=0;i<5;i++){
grid[currentRow][i].classList.add("shake");
setTimeout(()=>{
grid[currentRow][i].classList.remove("shake");
},500);
}
}

// Modes
function startSolo(){
word = words[Math.floor(Math.random()*words.length)];
}

function createRoom(){
let code = Math.random().toString(36).substring(2,7).toUpperCase();
word = words[Math.floor(Math.random()*words.length)];

db.collection("rooms").doc(code).set({word: word});
document.getElementById("roomInfo").textContent = "Code: "+code;
}

function joinRoom(){
let code = document.getElementById("roomInput").value.toUpperCase();

db.collection("rooms").doc(code).get().then(doc=>{
if(doc.exists){
word = doc.data().word;
document.getElementById("roomInfo").textContent = "Beigetreten: "+code;
}else{
alert("Room nicht gefunden");
}
});
}

startSolo();
loadLeaderboard();

</script>

</body>
</html>
