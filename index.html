<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wolfle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="words.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        /* BLOCK ZOOM GESTURES */
        html {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* Animations */
        .flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0%   { transform: rotateX(0deg); }
            50%  { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-5px); }
            40%,80% { transform: translateX(5px); }
        }
        .bounce { animation: bounce 0.5s; }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Tile colours */
        .bg-correct { background-color: #22c55e !important; border-color: #22c55e !important; color: white; }
        .bg-present { background-color: #eab308 !important; border-color: #eab308 !important; color: white; }
        .bg-absent  { background-color: #3f3f46 !important; border-color: #3f3f46 !important; color: white; }

        /* Grid: scales to available space */
        #grid-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            padding: 8px;
        }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: clamp(4px, 1vw, 8px);
            height: 100%;
            aspect-ratio: 5/6;
            max-height: 100%;
            max-width: 100%;
        }
        .grid-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(4px, 1vw, 8px);
        }
        .cell {
            border: 2px solid #334155;
            border-radius: 6px;
            background: rgba(30,41,59,0.5);
            color: white;
            font-weight: bold;
            font-size: clamp(14px, 3vw, 22px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: border-color 0.15s;
            width: 100%;
            height: 100%;
        }

        /* Keyboard with improved hints */
        #keyboard {
            padding: 4px 6px max(8px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            flex-shrink: 0;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: clamp(3px, 0.8vw, 6px);
        }
        .kb-key {
            flex: 1;
            height: clamp(36px, 5.5vh, 52px);
            background: #334155;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: clamp(10px, 2vw, 13px);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
        }
        .kb-key:active { filter: brightness(0.75); transform: scale(0.95); }
        
        /* Keyboard hints indicator */
        .kb-key.hint-correct::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }
        .kb-key.hint-present::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #eab308;
            border-radius: 50%;
        }
        
        /* Tooltip for keyboard */
        .kb-key[data-tooltip]:hover::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid #334155;
        }

        /* Desktop layout */
        #app {
            display: flex;
            flex-direction: row;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #sidebar-left  { width: 280px; min-width: 280px; }
        #sidebar-right { width: 240px; min-width: 240px; }
        #game-center   { flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; min-width: 0; }

        /* Global header */
        #mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 16px 8px;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(12px);
        }
        @media (min-width: 901px) {
            .header-mobile-only { display: none !important; }
        }

        /* Drawer */
        #drawer-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(2,6,23,0.75);
            z-index: 40;
            backdrop-filter: blur(4px);
        }
        #drawer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px max(20px, env(safe-area-inset-bottom));
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            max-height: 88dvh;
            overflow-y: auto;
        }
        #drawer.open { transform: translateY(0); }
        #drawer-overlay.open { display: block; }

        /* Bottom nav */
        #bottom-nav {
            display: none;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1e293b;
            background: #0f172a;
            padding: 4px 0 max(4px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #64748b;
            font-size: 10px;
            padding: 6px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background: none;
            border: none;
            transition: color 0.15s;
        }
        .nav-btn.active { color: #818cf8; }

        /* Modal */
        #end-modal { backdrop-filter: blur(6px); }
        #end-modal-box {
            transition: transform 0.25s ease, opacity 0.25s ease;
            transform: scale(0.9);
            opacity: 0;
        }
        #end-modal-box.visible { transform: scale(1); opacity: 1; }
        .end-letter {
            width: 2.5rem; height: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: bold; border-radius: 6px;
            border: 2px solid #3f3f46; color: white; text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        button:focus { outline: none; }
        input:focus { border-color: #6366f1 !important; outline: none; }

        /* Confetti */
        #confetti-canvas {
            position: fixed; inset: 0; pointer-events: none;
            z-index: 200; display: none;
        }

        /* Light mode overrides */
        html.light body { background: linear-gradient(135deg, #dde3ed, #f0f4f8); color: #1e293b; }
        html.light #sidebar-left,
        html.light #sidebar-right { background: rgba(248,250,252,0.97) !important; border-color: #cbd5e1 !important; }
        html.light #bottom-nav { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        html.light #mobile-header { border-color: #cbd5e1 !important; background: #f1f5f9; }
        html.light #drawer { background: #f8fafc !important; border-color: #cbd5e1 !important; }
        html.light .kb-key { background: #cbd5e1 !important; color: #1e293b !important; }
        html.light .cell { border-color: #94a3b8 !important; background: rgba(241,245,249,0.8) !important; color: #1e293b !important; }
        html.light #end-modal-box { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        html.light .text-white { color: #0f172a !important; }
        html.light .text-slate-200 { color: #1e293b !important; }
        html.light .text-slate-300 { color: #334155 !important; }
        html.light .text-slate-400 { color: #475569 !important; }
        html.light .text-slate-500 { color: #64748b !important; }
        html.light .bg-slate-800\/50,
        html.light .bg-slate-800\/40 { background-color: rgba(226,232,240,0.8) !important; }
        html.light .bg-slate-800 { background-color: #e2e8f0 !important; }
        html.light .bg-slate-900 { background-color: #f1f5f9 !important; }
        html.light .bg-slate-700 { background-color: #cbd5e1 !important; }
        html.light .border-slate-700 { border-color: #cbd5e1 !important; }
        html.light .border-slate-800 { border-color: #e2e8f0 !important; }
        html.light .bg-indigo-900\/20 { background-color: rgba(199,210,254,0.25) !important; }
        html.light .bg-indigo-900\/40 { background-color: rgba(199,210,254,0.45) !important; }
        html.light .nav-btn { color: #94a3b8; }
        html.light .nav-btn.active { color: #6366f1; }

        /* Light mode: colored cells must stay visible */
        html.light .cell.bg-correct { background-color: #16a34a !important; border-color: #16a34a !important; color: white !important; }
        html.light .cell.bg-present { background-color: #b45309 !important; border-color: #b45309 !important; color: white !important; }
        html.light .cell.bg-absent  { background-color: #64748b !important; border-color: #64748b !important; color: white !important; }

        /* Light mode: colored keyboard keys must stay visible */
        html.light .kb-key.bg-correct { background-color: #16a34a !important; color: white !important; }
        html.light .kb-key.bg-present { background-color: #b45309 !important; color: white !important; }
        html.light .kb-key.bg-absent  { background-color: #64748b !important; color: white !important; }

        /* ── GAME TABS ── */
        #game-tabs {
            display: flex;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            padding: 0 12px;
        }
        .tab-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-link.active { color: #818cf8; border-bottom-color: #818cf8; }
        .tab-link:hover:not(.active) { color: #94a3b8; }
        html.light #game-tabs { background: #f1f5f9; border-color: #cbd5e1; }
        html.light .tab-link { color: #94a3b8; }
        html.light .tab-link.active { color: #6366f1; border-bottom-color: #6366f1; }
        html.retro #game-tabs { background: #000 !important; border-color: #00ff41 !important; }
        html.retro .tab-link { color: #007a1f; }
        html.retro .tab-link.active { color: #00ff41; border-bottom-color: #00ff41; }
        html.ocean #game-tabs { background: #05101f !important; border-color: #1d4e6e !important; }
        html.ocean .tab-link { color: #4d89ac; }
        html.ocean .tab-link.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        html.pastel #game-tabs { background: #fce7f3 !important; border-color: #f0abdb !important; }
        html.pastel .tab-link { color: #c084db; }
        html.pastel .tab-link.active { color: #9333ea; border-bottom-color: #9333ea; }

        /* ── RETRO THEME (terminal green) ── */
        html.retro body { background: #000 !important; color: #00ff41; font-family: 'Courier New', monospace !important; }
        html.retro * { font-family: 'Courier New', monospace !important; }
        html.retro #sidebar-left, html.retro #sidebar-right { background: #0a0a0a !important; border-color: #00ff41 !important; }
        html.retro #bottom-nav { background: #000 !important; border-color: #00ff41 !important; }
        html.retro #mobile-header { border-color: #00ff41 !important; background: #000 !important; }
        html.retro #drawer { background: #0a0a0a !important; border-color: #00ff41 !important; }
        html.retro .kb-key { background: #001a00 !important; color: #00ff41 !important; border: 1px solid #00ff41 !important; }
        html.retro .kb-key:active { background: #00ff41 !important; color: #000 !important; }
        html.retro .cell { border-color: #00ff41 !important; background: #001a00 !important; color: #00ff41 !important; }
        html.retro .bg-correct { background-color: #00ff41 !important; border-color: #00ff41 !important; color: #000 !important; }
        html.retro .bg-present { background-color: #ffff00 !important; border-color: #ffff00 !important; color: #000 !important; }
        html.retro .bg-absent  { background-color: #1a1a1a !important; border-color: #00ff41 !important; color: #666 !important; }
        html.retro .text-white, html.retro .text-slate-200, html.retro .text-slate-300 { color: #00ff41 !important; }
        html.retro .text-slate-400, html.retro .text-slate-500 { color: #007a1f !important; }
        html.retro .bg-slate-800\/50, html.retro .bg-slate-800\/40, html.retro .bg-slate-800 { background-color: #0a0a0a !important; border-color: #00ff41 !important; }
        html.retro .bg-slate-900 { background-color: #000 !important; }
        html.retro .bg-slate-700 { background-color: #111 !important; }
        html.retro .border-slate-700, html.retro .border-slate-800 { border-color: #00ff41 !important; }
        html.retro .bg-indigo-600, html.retro .bg-indigo-600:hover { background-color: #003300 !important; border: 1px solid #00ff41 !important; color: #00ff41 !important; }
        html.retro .bg-purple-600, html.retro .bg-purple-600:hover { background-color: #001a00 !important; border: 1px solid #00ff41 !important; color: #00ff41 !important; }
        html.retro .bg-cyan-600, html.retro .bg-cyan-600:hover { background-color: #001a1a !important; border: 1px solid #00ffff !important; color: #00ffff !important; }
        html.retro .bg-emerald-600 { background-color: #003300 !important; color: #00ff41 !important; }
        html.retro #end-modal-box { background: #0a0a0a !important; border-color: #00ff41 !important; }
        html.retro .nav-btn { color: #007a1f !important; }
        html.retro .nav-btn.active { color: #00ff41 !important; }
        html.retro h1 { background: none !important; -webkit-background-clip: unset !important; -webkit-text-fill-color: #00ff41 !important; }
        html.retro input, html.retro select { background: #001a00 !important; color: #00ff41 !important; border-color: #00ff41 !important; }

        /* ── OCEAN THEME (deep teal) ── */
        html.ocean body { background: radial-gradient(circle at top, #0c2340, #020d1a) !important; color: #e0f4ff; }
        html.ocean #sidebar-left, html.ocean #sidebar-right { background: rgba(5,20,40,0.95) !important; border-color: #1d4e6e !important; }
        html.ocean #bottom-nav { background: #05101f !important; border-color: #1d4e6e !important; }
        html.ocean #mobile-header { border-color: #1d4e6e !important; background: #05101f !important; }
        html.ocean #drawer { background: #05101f !important; border-color: #1d4e6e !important; }
        html.ocean .kb-key { background: #0a2540 !important; color: #a0d8f0 !important; border: 1px solid #1d4e6e !important; }
        html.ocean .cell { border-color: #1d4e6e !important; background: rgba(10,37,64,0.6) !important; color: #e0f4ff !important; }
        html.ocean .bg-correct { background-color: #0ea5e9 !important; border-color: #0ea5e9 !important; color: white !important; }
        html.ocean .bg-present { background-color: #06b6d4 !important; border-color: #06b6d4 !important; color: white !important; }
        html.ocean .bg-absent  { background-color: #0c2340 !important; border-color: #1d4e6e !important; }
        html.ocean .text-white { color: #e0f4ff !important; }
        html.ocean .text-slate-200, html.ocean .text-slate-300 { color: #a0d8f0 !important; }
        html.ocean .text-slate-400, html.ocean .text-slate-500 { color: #4d89ac !important; }
        html.ocean .bg-slate-800\/50, html.ocean .bg-slate-800\/40, html.ocean .bg-slate-800 { background-color: rgba(10,37,64,0.8) !important; border-color: #1d4e6e !important; }
        html.ocean .bg-slate-900 { background-color: #05101f !important; }
        html.ocean .bg-slate-700 { background-color: #0a2540 !important; }
        html.ocean .border-slate-700, html.ocean .border-slate-800 { border-color: #1d4e6e !important; }
        html.ocean .bg-indigo-600 { background-color: #0369a1 !important; }
        html.ocean .bg-indigo-600:hover { background-color: #0284c7 !important; }
        html.ocean .bg-purple-600 { background-color: #0e7490 !important; }
        html.ocean .bg-purple-600:hover { background-color: #0891b2 !important; }
        html.ocean .bg-cyan-600 { background-color: #0e7490 !important; }
        html.ocean #end-modal-box { background: #05101f !important; border-color: #1d4e6e !important; }
        html.ocean .nav-btn { color: #4d89ac !important; }
        html.ocean .nav-btn.active { color: #38bdf8 !important; }
        html.ocean input, html.ocean select { background: #05101f !important; color: #e0f4ff !important; border-color: #1d4e6e !important; }

        /* ── PASTEL THEME (soft rose/lavender) ── */
        html.pastel body { background: linear-gradient(135deg, #fce7f3, #ede9fe) !important; color: #4a1d52; }
        html.pastel #sidebar-left, html.pastel #sidebar-right { background: rgba(255,240,250,0.97) !important; border-color: #f0abdb !important; }
        html.pastel #bottom-nav { background: #fce7f3 !important; border-color: #f0abdb !important; }
        html.pastel #mobile-header { border-color: #f0abdb !important; background: #fce7f3 !important; }
        html.pastel #drawer { background: #fce7f3 !important; border-color: #f0abdb !important; }
        html.pastel .kb-key { background: #fad1e8 !important; color: #6b21a8 !important; border: 1px solid #e879b0 !important; }
        html.pastel .cell { border-color: #e879b0 !important; background: rgba(252,231,243,0.7) !important; color: #4a1d52 !important; }
        html.pastel .bg-correct { background-color: #86efac !important; border-color: #86efac !important; color: #14532d !important; }
        html.pastel .bg-present { background-color: #fde68a !important; border-color: #fde68a !important; color: #78350f !important; }
        html.pastel .bg-absent  { background-color: #e2d3f0 !important; border-color: #c4b5d8 !important; color: #6b21a8 !important; }
        html.pastel .text-white { color: #4a1d52 !important; }
        html.pastel .text-slate-200, html.pastel .text-slate-300 { color: #6b21a8 !important; }
        html.pastel .text-slate-400, html.pastel .text-slate-500 { color: #a78bba !important; }
        html.pastel .bg-slate-800\/50, html.pastel .bg-slate-800\/40, html.pastel .bg-slate-800 { background-color: rgba(240,200,230,0.7) !important; border-color: #f0abdb !important; }
        html.pastel .bg-slate-900 { background-color: #fce7f3 !important; }
        html.pastel .bg-slate-700 { background-color: #f5d0e8 !important; }
        html.pastel .border-slate-700, html.pastel .border-slate-800 { border-color: #f0abdb !important; }
        html.pastel .bg-indigo-600 { background-color: #9333ea !important; }
        html.pastel .bg-indigo-600:hover { background-color: #7e22ce !important; }
        html.pastel .bg-purple-600 { background-color: #c026d3 !important; }
        html.pastel .bg-purple-600:hover { background-color: #a21caf !important; }
        html.pastel .bg-cyan-600 { background-color: #0891b2 !important; }
        html.pastel #end-modal-box { background: #fce7f3 !important; border-color: #f0abdb !important; }
        html.pastel .nav-btn { color: #c084db !important; }
        html.pastel .nav-btn.active { color: #9333ea !important; }
        html.pastel h1 { background: linear-gradient(to right, #9333ea, #ec4899) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; }
        html.pastel input, html.pastel select { background: #fce7f3 !important; color: #4a1d52 !important; border-color: #f0abdb !important; }

        /* ── THEME SWATCHES (settings modal) ── */
        .theme-swatch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
        .theme-swatch {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }
        .theme-swatch.active { border-color: #6366f1; box-shadow: 0 0 0 2px #6366f1; }
        .theme-swatch span { position: absolute; bottom: 3px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
        .theme-swatch-dark { background: linear-gradient(135deg, #1e293b, #020617); }
        .theme-swatch-dark span { color: #94a3b8; }
        .theme-swatch-light { background: linear-gradient(135deg, #dde3ed, #f0f4f8); }
        .theme-swatch-light span { color: #475569; }

        return translations[currentLanguage]?.[key] || translations['de']?.[key] || key;
    }

        currentLanguage = lang;
        localStorage.setItem('wolfle_language', lang);
        applyTranslations();
        lucide.createIcons();

    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.textContent = t(key);
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {

    // ═══════════════════════════════════════════════════════════
    // GAME STATE
    // ═══════════════════════════════════════════════════════════
    let targetWord = "";
    let currentRow = 0, currentCol = 0, cells = [], gameOver = false, letterStates = {};
    let currentRoomCode = null, roomUnsubscribe = null, db = null;
    let currentRound = 1, maxRounds = 3, playerTotalScore = 0, playerRoundsWon = 0;
    let leaderboardTab = 'total';
    
    // New settings
    let hardMode = localStorage.getItem('wolfle_hardMode') === 'true';
    let dailyMode = false;
    let timerEnabled = localStorage.getItem('wolfle_timerEnabled') === 'true';
    let timeLimit = parseInt(localStorage.getItem('wolfle_timeLimit')) || 120;
    let timerInterval = null;
    let timeRemaining = 0;
    let requiredLetters = []; // For hard mode
    let maxAttempts = 6;
    let hostMaxRounds = 3;
    let hostRoundTime = 120;

    function getWeekKey() {
        const d = new Date();
        const start = new Date(d.getFullYear(), 0, 1);
        const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
        return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    // ═══════════════════════════════════════════════════════════
    // DAILY WORDLE
    // ═══════════════════════════════════════════════════════════
    function getDailyWord() {
        const today = new Date();
        const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
        // Use seeded random for consistent daily word
        const random = seededRandom(seed);
        const wordIndex = Math.floor(random * WORDS.length);
        return WORDS[wordIndex].toUpperCase();
    }
    
    function seededRandom(seed) {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }
    
    function getDailyKey() {
        const today = new Date();
        return `wolfle_daily_${today.getFullYear()}_${today.getMonth() + 1}_${today.getDate()}`;
    }
    
    function hasPlayedDaily() {
        return localStorage.getItem(getDailyKey()) !== null;
    }
    
    function markDailyPlayed(won, attempts) {
        localStorage.setItem(getDailyKey(), JSON.stringify({ won, attempts, date: new Date().toISOString() }));
    }
    
    window.startDaily = () => {
        if (hasPlayedDaily()) {
            showToast(t('dailyAlreadyPlayed'), "warning");
            return;
        }
        window.leaveRoom();
        resetGame();
        targetWord = getDailyWord();
        dailyMode = true;
        updateModeBadges();
        showToast(t('dailyWordle'), "success");
        window.closeDrawer();
        if (timerEnabled) startTimer();
    };

    window.toggleDailyMode = (enabled) => {
        if (enabled) {
            if (hasPlayedDaily()) {
                document.getElementById('daily-mode-toggle').checked = false;
                showToast(t('dailyAlreadyPlayed'), "warning");
                return;
            }
            window.startDaily();
        } else if (dailyMode) {
            dailyMode = false;
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
            resetGame();
            updateModeBadges();
            showToast(t('newGameStarted'), "info");
            if (timerEnabled) startTimer();
        }
    };

    // ═══════════════════════════════════════════════════════════
    // HARD MODE
    // ═══════════════════════════════════════════════════════════
    window.toggleHardMode = (enabled) => {
        hardMode = enabled;
        localStorage.setItem('wolfle_hardMode', enabled);
        updateModeBadges();
        if (enabled && !gameOver) {
            showToast(t('hardModeHint'), "info");
        }
    };
    
    function updateRequiredLetters() {
        requiredLetters = [];
        if (!hardMode) return;
        
        // Collect all correct and present letters from previous rows
        for (let r = 0; r < currentRow; r++) {
            for (let c = 0; c < 5; c++) {
                const cell = cells[r][c];
                const letter = cell.textContent;
                if (cell.classList.contains('bg-correct') || cell.classList.contains('bg-present')) {
                    if (!requiredLetters.includes(letter)) {
                        requiredLetters.push(letter);
                    }
                }
            }
        }
    }
    
    function checkHardModeCompliance(guess) {
        if (!hardMode || requiredLetters.length === 0) return { valid: true };
        
        const guessLetters = guess.split('');
        for (const letter of requiredLetters) {
            if (!guessLetters.includes(letter)) {
                return { valid: false, letter };
            }
        }
        return { valid: true };
    }

    // ═══════════════════════════════════════════════════════════
    // TIMER
    // ═══════════════════════════════════════════════════════════
    window.toggleTimer = (enabled) => {
        timerEnabled = enabled;
        localStorage.setItem('wolfle_timerEnabled', enabled);
        if (enabled && !gameOver) {
            startTimer();
        } else {
            stopTimer();
        }
        updateModeBadges();
    };
    
    window.updateTimeLimit = (seconds) => {
        timeLimit = parseInt(seconds) || 120;
        localStorage.setItem('wolfle_timeLimit', timeLimit);
    };
    
    function startTimer() {
        stopTimer();
        timeRemaining = timeLimit;
        updateTimerDisplay();
        
        document.getElementById('desktop-timer-container')?.classList.remove('hidden');
        document.getElementById('mobile-timer')?.classList.remove('hidden');
        
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            
            if (timeRemaining <= 0) {
                stopTimer();
                if (!gameOver) {
                    gameOver = true;
                    showToast(t('timesUp'), "error");
                    setTimeout(() => endGame(false), 500);
                }
            }
        }, 1000);
    }
    
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    
    function updateTimerDisplay() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        const display = `${minutes}:${String(seconds).padStart(2, '0')}`;
        
        const desktopTimer = document.getElementById('desktop-timer');
        const mobileTimer = document.getElementById('mobile-timer');
        
        if (desktopTimer) {
            desktopTimer.textContent = display;
            desktopTimer.className = 'timer-display';
            if (timeRemaining <= 30) desktopTimer.classList.add('danger');
            else if (timeRemaining <= 60) desktopTimer.classList.add('warning');
        }
        if (mobileTimer) {
            mobileTimer.textContent = display;
            mobileTimer.className = 'timer-display text-sm';
            if (timeRemaining <= 30) mobileTimer.classList.add('danger');
            else if (timeRemaining <= 60) mobileTimer.classList.add('warning');
        }
    }

    // MODE BADGES
    // ═══════════════════════════════════════════════════════════
    function updateModeBadges() {
        const badges = [];
        if (hardMode) badges.push(`<span class="mode-badge hard"><i data-lucide="flame" class="w-3 h-3"></i> ${t('hardBadge')}</span>`);
        if (dailyMode) badges.push(`<span class="mode-badge daily"><i data-lucide="calendar" class="w-3 h-3"></i> ${t('dailyBadge')}</span>`);
        if (timerEnabled) badges.push(`<span class="mode-badge timed"><i data-lucide="timer" class="w-3 h-3"></i> ${t('timedBadge')}</span>`);
        
        const html = badges.join('');
        document.getElementById('mode-badges').innerHTML = html;
        document.getElementById('desktop-mode-badges').innerHTML = html;
        lucide.createIcons();
    }

        const modal = document.getElementById(modalId);
        if (!modal) return;

        document.getElementById('round-time-input').value = hostRoundTime;

    function clampSetting(value, min, max, fallback) {
        const parsed = parseInt(value, 10);
        if (Number.isNaN(parsed)) return fallback;
        return Math.min(max, Math.max(min, parsed));
    }

    function getCreateRoomSettings() {
        return {
            maxRounds: clampSetting(document.getElementById('create-room-rounds-input')?.value, 1, 10, 3),
            maxAttempts: clampSetting(document.getElementById('create-room-attempts-input')?.value, 4, 8, 6),
            timeLimit: clampSetting(document.getElementById('create-room-time-input')?.value, 30, 300, 120)
        };
    }

    window.openCreateRoomModal = () => {
        const name = getPlayerName();
        if (!name) { showToast(t('enterNameFirst'), 'warning'); return; }
        document.getElementById('create-room-rounds-input').value = hostMaxRounds;

    };

    };

    // GRID
    // ═══════════════════════════════════════════════════════════
    function createGrid() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = ''; cells = [];
        const rows = maxAttempts;
        for (let i = 0; i < rows; i++) {
            cells[i] = [];
            const row = document.createElement("div");
            row.className = "grid-row";
            for (let j = 0; j < 5; j++) {
                const d = document.createElement("div");
                d.className = "cell";
                row.appendChild(d); cells[i][j] = d;
            }
            gridEl.appendChild(row);
        }
    }

    // ═══════════════════════════════════════════════════════════
    // KEYBOARD with improved hints
    // ═══════════════════════════════════════════════════════════
    function createKeyboard() {
        const kb = document.getElementById("keyboard");
        const layout = [
            ['Q','W','E','R','T','Z','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['ENTER','Y','X','C','V','B','N','M','⌫']
        ];
        kb.innerHTML = '';
        layout.forEach(row => {
            const rDiv = document.createElement("div");
            rDiv.className = "kb-row";
            row.forEach(key => {
                const b = document.createElement("button");
                b.textContent = key;
                b.className = "kb-key";
                if (key === 'ENTER') { 
                    b.style.flex = '1.6'; 
                    b.onclick = () => submitGuess();
                    b.setAttribute('data-tooltip', t('keyboardHintEnter'));
                }
                else if (key === '⌫') { 
                    b.style.flex = '1.6'; 
                    b.onclick = () => backspace();
                    b.setAttribute('data-tooltip', t('keyboardHintBackspace'));
                }
                else { 
                    b.id = `key-${key}`; 
                    b.onclick = () => typeLetter(key);
                }
                rDiv.appendChild(b);
            });
            kb.appendChild(rDiv);
        });
    }

    function typeLetter(l) { 
        if (currentCol < 5 && !gameOver) { 
            cells[currentRow][currentCol++].textContent = l; 
            playSound('type'); 
        } 
    }
    
    function backspace() { 
        if (currentCol > 0 && !gameOver) { 
            cells[currentRow][--currentCol].textContent = ""; 
            playSound('type'); 
        } 
    }

    // ═══════════════════════════════════════════════════════════
    // SUBMIT
    // ═══════════════════════════════════════════════════════════
    async function submitGuess() {
        if (currentCol < 5 || gameOver) return;
        let guess = "";
        for (let i = 0; i < 5; i++) guess += cells[currentRow][i].textContent;

        // Hard mode check
        const hardModeCheck = checkHardModeCompliance(guess);
        if (!hardModeCheck.valid) {
            showToast(t('mustUseHint').replace('{letter}', hardModeCheck.letter), "warning");
            cells[currentRow][0].parentElement.classList.add("shake");
            setTimeout(() => cells[currentRow][0].parentElement.classList.remove("shake"), 400);
            return;
        }

        // Word validation (German dictionary)
        try {
            const res = await fetch(`https://de.wiktionary.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${guess.toLowerCase()}&srlimit=1`);
            const data = await res.json();
            if (!data.query.search.some(r => r.title.toLowerCase() === guess.toLowerCase())) {
                showToast(t('notAGermanWord'), "error");
                cells[currentRow][0].parentElement.classList.add("shake");
                setTimeout(() => cells[currentRow][0].parentElement.classList.remove("shake"), 400);
                return;
            }
        } catch(e) {}

        const evaluation = new Array(5).fill('absent');
        let tT = targetWord.split(''), tG = guess.split('');
        for (let i = 0; i < 5; i++) if (tG[i]===tT[i]) { evaluation[i]='correct'; tT[i]=tG[i]=null; }
        for (let i = 0; i < 5; i++) if (tG[i]) { const idx=tT.indexOf(tG[i]); if(idx!==-1){ evaluation[i]='present'; tT[idx]=null; } }

        for (let i = 0; i < 5; i++) {
            const cell = cells[currentRow][i];
            setTimeout(() => {
                cell.classList.add("flip");
                setTimeout(() => {
                    cell.classList.add(`bg-${evaluation[i]}`);
                    updateKeyColor(guess[i], evaluation[i]);
                    playSound(evaluation[i]);
                }, 300);
            }, i * 100);
        }

        const win = guess === targetWord;
        const lastRow = currentRow;
        currentRow++; currentCol = 0;
        
        // Update required letters for hard mode
        updateRequiredLetters();

        setTimeout(async () => {
            if (win) await endGame(true);
            else if (lastRow === maxAttempts - 1) await endGame(false);
            else if (currentRoomCode) updateRoomProgress(currentRow, false, false);
        }, 800);
    }

    function updateKeyColor(l, s) {
        const b = document.getElementById(`key-${l}`);
        if (!b || letterStates[l] === 'correct') return;
        letterStates[l] = s;
        b.className = 'kb-key bg-' + s;

        const tooltipMap = {
            correct: t('keyboardHintCorrect'),
            present: t('keyboardHintPresent'),
            absent: t('keyboardHintAbsent')
        };
        b.setAttribute('data-tooltip', tooltipMap[s] || l);
        
        // Add hint indicator
        if (s === 'correct') b.classList.add('hint-correct');
        else if (s === 'present') b.classList.add('hint-present');
    }

    // ═══════════════════════════════════════════════════════════
    // END GAME
    // ═══════════════════════════════════════════════════════════
    async function endGame(win) {
        gameOver = true;
        stopTimer();
        
        // Daily mode: mark as played
        if (dailyMode && win) {
            markDailyPlayed(true, currentRow);
            showToast(t('dailyComplete'), "success");
        } else if (dailyMode && !win) {
            markDailyPlayed(false, 6);
        }
        
        let points = 0;
        if (win) {
            launchConfetti();
            playWinSound();
            points = (7 - currentRow) * 10;
            if (currentRoomCode) {
                playerTotalScore += points;
                playerRoundsWon += 1;
            }
            const name = getPlayerName();
            if (name) {
                const firestore = await getDB();
                if (firestore) {
                    try {
                        const ref = doc(firestore,'artifacts',appId,'public','data','scores',name.toLowerCase());
                        const snap = await getDoc(ref);
                        const existing = snap.exists() ? snap.data() : {};
                        const weekKey = getWeekKey();
                        const total = (existing.score || 0) + points;
                        const weekScore = (existing.weekKey === weekKey ? (existing.weekScore || 0) : 0) + points;
                        await setDoc(ref, { name, score: total, weekScore, weekKey }, { merge: true });
                        loadLeaderboard();
                    } catch(e) {}
                }
            }
        }
        if (!win) playSound('lose');
        if (currentRoomCode) updateRoomProgress(currentRow, true, win, playerTotalScore, playerRoundsWon);
        setTimeout(() => showEndModal(win, points), 400);
    }

    function showEndModal(win, points) {
        document.getElementById('end-emoji').textContent = win ? '🎉' : '😔';
        document.getElementById('end-title').textContent = win ? t('won') : t('lost');
        const roundInfo = currentRoomCode ? ` · ${t('round')} ${currentRound}/${maxRounds}` : '';
        document.getElementById('end-subtitle').textContent = win
            ? `In ${currentRow} ${currentRow===1?t('attempts'):t('attemptsPlural')}${roundInfo}`
            : `${t('noAttemptsLeft')}${roundInfo}`;

        const wordEl = document.getElementById('end-word');
        wordEl.innerHTML = '';
        targetWord.split('').forEach(l => {
            const d = document.createElement('div');
            d.className = 'end-letter ' + (win ? 'bg-correct' : 'bg-absent');
            d.textContent = l;
            wordEl.appendChild(d);
        });

        const pts = document.getElementById('end-points');
        if (win && points > 0) { pts.textContent = `+${points} ${t('points')}`; pts.classList.remove('hidden'); pts.classList.add('inline-block'); }
        else pts.classList.add('hidden');

        const playAgainBtn = document.getElementById('modal-play-again-btn');
        if (currentRoomCode) {
            playAgainBtn.innerHTML = t('viewBoard');
        } else {
            playAgainBtn.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4"></i> ${t('playAgain')}`;
        }

        document.getElementById('end-modal').classList.remove('hidden');
        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.getElementById('end-modal-box').classList.add('visible');

        });
        document.querySelectorAll('.leaderboard-list').forEach(l =>
            l.innerHTML = `<li class="text-slate-500 text-sm italic">${t('loading')}</li>`);

            const snap = await getDocs(collection(firestore,'artifacts',appId,'public','data','scores'));
            let d = [];
            snap.forEach(doc => { if (doc.data().score) d.push(doc.data()); });
            const weekKey = getWeekKey();
            if (leaderboardTab === 'week') {
                d = d.filter(s => s.weekKey === weekKey && (s.weekScore || 0) > 0);
                d.sort((a,b) => (b.weekScore||0) - (a.weekScore||0));
            } else {
                d.sort((a,b) => b.score - a.score);
            }
            const me = getPlayerName().toLowerCase();
            const html = d.length === 0
                ? `<li class="text-slate-500 text-sm italic">${t('noEntries')}</li>`
                : d.slice(0,10).map((s,i) => {
                    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
                    const isMe = s.name.toLowerCase() === me;
                    const pts = leaderboardTab === 'week' ? (s.weekScore||0) : s.score;
                    return `<li class="flex justify-between ${isMe?'bg-indigo-900/40 border border-indigo-500/30':'bg-slate-800/40'} p-2 rounded text-sm">
                        <span>${medal} ${s.name}</span><span class="text-indigo-400 font-bold">${pts}</span></li>`;
                }).join('');
            document.querySelectorAll('.leaderboard-list').forEach(l => l.innerHTML = html);
        } catch(e) {}

    async function listenToRoom(code) {
        const firestore = await getDB(); if (!firestore) return;
        if (roomUnsubscribe) roomUnsubscribe();
        roomUnsubscribe = onSnapshot(doc(firestore,'artifacts',appId,'public','data','rooms',code), snap => {
            if (!snap.exists()) return;
            const data = snap.data();
            const players = data.players || {};
            const newRound = data.round || 1;
            const mRounds = data.maxRounds || 3;
            const mAttempts = data.maxAttempts || 6;
            const timeLim = data.timeLimit || 120;

            if (newRound !== currentRound) {
                const isRematch = newRound < currentRound || (newRound === 1 && currentRound > 1);
                currentRound = newRound;
                maxRounds = mRounds;
                maxAttempts = mAttempts;
                timeLimit = timeLim;
                targetWord = data.word;
                resetGame();
                window.closeModal();
                if (isRematch) {
                    playerTotalScore = 0; playerRoundsWon = 0;
                    showToast(`Rematch! ${t('round')} 1/${mRounds} 🔄`, "success");
                } else {
                    showToast(`${t('round')} ${newRound} ${t('of')} ${mRounds}!`, "success");
                }
                updateRoundDisplay();
                if (timerEnabled) startTimer();
            } else {
                maxRounds = mRounds;
                maxAttempts = mAttempts;
                timeLimit = timeLim;
            }

            const playerList = Object.values(players);
            const allFinished = playerList.length > 0 && playerList.every(p => p.finished);
            const roundsDone = newRound >= mRounds;

            const html = playerList.map(p =>
                `<li class="flex justify-between bg-slate-800/50 p-2 rounded text-xs">
                    <span class="font-medium">${p.name||'Spieler'}</span>
                    <span class="flex items-center gap-1.5">
                        ${p.finished?(p.won?'🏆':'💀'):'⌨️'} ${p.guesses}/${maxAttempts}
                        ${(p.roundsWon||0)>0?`<span class="text-yellow-400 font-bold">${p.roundsWon}W</span>`:''}
                        ${(p.totalScore||0)>0?`<span class="text-indigo-400">${p.totalScore}P</span>`:''}
                    </span>
                </li>`).join('');
            document.querySelectorAll('.room-players-list').forEach(el => el.innerHTML = html);

            document.querySelectorAll('.next-round-btn').forEach(btn => {
                btn.classList.toggle('hidden', !(allFinished && !roundsDone));
            });
            document.querySelectorAll('.game-ended-notice').forEach(el => {
                el.classList.toggle('hidden', !(allFinished && roundsDone));
            });
            document.querySelectorAll('.rematch-btn').forEach(btn => {
                btn.classList.toggle('hidden', !(allFinished && roundsDone));
            });

            const chatHtml = (data.chat || []).slice(-20).map(c =>
                `<div><span class="font-semibold text-indigo-400">${c.n}:</span> <span class="text-slate-300">${c.m}</span></div>`
            ).join('');
            document.querySelectorAll('.chat-messages').forEach(el => {
                el.innerHTML = chatHtml;
                el.scrollTop = el.scrollHeight;
            });
        });
    }

    let soundEnabled = localStorage.getItem('wolfle_sound') !== 'false';
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playTone(freq, type, duration, volume = 0.25) {
        if (!soundEnabled) return;
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
        } catch(e) {}
    }

    function playSound(type) {
        const sounds = {
            type:    [440, 'sine', 0.05, 0.1],
            correct: [523, 'sine', 0.18],
            present: [392, 'sine', 0.18],
            absent:  [220, 'square', 0.1, 0.15],
            lose:    [165, 'sawtooth', 0.5],
        };
        const s = sounds[type]; if (!s) return;
        playTone(...s);
    }

    function playWinSound() {
        if (!soundEnabled) return;
        [523, 659, 784, 1047].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'sine', 0.4), i * 110);
        });
    }

            y: Math.random() * -canvas.height,
            w: Math.random() * 10 + 5,
            h: Math.random() * 5 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 3,
            vy: Math.random() * 3 + 2,
            vr: (Math.random() - 0.5) * 0.15,
        }));
        let frame = 0;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rotation += p.vr;
                if (p.y > canvas.height) p.y = -20;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
            frame++;
            if (frame < 200) requestAnimationFrame(draw);
            else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = 'none'; }
        }
        draw();
    }

    // ═══════════════════════════════════════════════════════════
    // THEME
    // ═══════════════════════════════════════════════════════════
    const THEMES = ['dark', 'light', 'retro', 'ocean', 'pastel'];

    function applyTheme(theme) {
        const html = document.documentElement;
        THEMES.forEach(t => html.classList.remove(t));
        if (theme && theme !== 'dark') html.classList.add(theme);
        // Update header buttons icon
        const icon = (theme === 'light' || theme === 'pastel') ? 'moon' : 'sun';
        document.querySelectorAll('[id^="theme-btn"]').forEach(btn => {
            btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        });
        lucide.createIcons();
        // Update swatch active state
        THEMES.forEach(t => {
            const sw = document.getElementById('swatch-' + t);
            if (sw) sw.classList.toggle('active', t === (theme || 'dark'));
        });
    }

    window.setTheme = (theme) => {
        localStorage.setItem('wolfle_theme', theme);
        applyTheme(theme);
    };

    // Keep old toggleTheme for the header button — cycles through themes
    window.toggleTheme = () => {
        const current = localStorage.getItem('wolfle_theme') || 'dark';
        const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
        window.setTheme(next);
    };

    // Hangman is now a separate game – see hangman.html

    // ═══════════════════════════════════════════════════════════
    // KEYBOARD EVENTS
    // ═══════════════════════════════════════════════════════════
    document.addEventListener("keydown", (e) => {
        if (e.key === 'Escape') {
            window.closeSettingsModal();
            window.closeCreateRoomModal();
            return;
        }
        if (e.target.classList.contains('chat-input') && e.key === 'Enter') {
            e.preventDefault();
            window.sendChat(e.target.nextElementSibling);
            return;
        }
        if (document.activeElement.tagName === "INPUT") return;
        if (e.key === "Enter") { e.preventDefault(); submitGuess(); }
        else if (e.key === "Backspace") backspace();
        else if (/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
    });

    // ═══════════════════════════════════════════════════════════
    // PREVENT ZOOM GESTURES
    // ═══════════════════════════════════════════════════════════
    let lastTouchEnd = 0;
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) {
            e.preventDefault();
        }
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) {
            e.preventDefault();
        }
    }, { passive: false });

    document.addEventListener('gesturestart', (e) => {
        e.preventDefault();
    });

    document.addEventListener('gesturechange', (e) => {
        e.preventDefault();
    });

    document.addEventListener('gestureend', (e) => {
        e.preventDefault();
    });

    document.addEventListener('dblclick', (e) => {
        e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('wheel', (e) => {
        if (e.ctrlKey) e.preventDefault();
    }, { passive: false });


    document.getElementById('settings-modal')?.addEventListener('click', (e) => {
        if (e.target.id === 'settings-modal') window.closeSettingsModal();
    });

    document.getElementById('create-room-modal')?.addEventListener('click', (e) => {
        if (e.target.id === 'create-room-modal') window.closeCreateRoomModal();
    });

    // ═══════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════
    applyTheme(localStorage.getItem('wolfle_theme') || 'dark');
    lucide.createIcons();
    updateSoundBtn();
    createGrid();
    createKeyboard();
    targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
    updateModeBadges();
    applyTranslations();
    syncHostSettingsUI();

    // Load saved settings
    if (hardMode) {
        document.getElementById('hard-mode-toggle').checked = true;
    }
    if (timerEnabled) {
        document.getElementById('timer-toggle').checked = true;
    }

    const savedName = localStorage.getItem('wolfle_user_name');
    if (savedName) {
        document.getElementById('playerName').value = savedName;
        getDB().then(() => loadLeaderboard());
    }

    const roomFromURL = new URLSearchParams(location.search).get('room');
    if (roomFromURL) {
        const inp = document.getElementById('roomInput');
        if (inp) inp.value = roomFromURL;
        if (savedName) window.joinRoom();
        else showToast(t('enterNameFirst'), "warning");
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                await registration.update();
            } catch (error) {}
        });

        // Automatically switch to mobile layout when sidebars would overlap the game field
        (function () {
            const SIDEBAR_LEFT_W  = 280;
            const SIDEBAR_RIGHT_W = 240;
            // Switch TO mobile when game-center would be below this
            const ENTER_MOBILE_GAME_W = 500;
            // Switch BACK to desktop when game-center would exceed this (hysteresis)
            const EXIT_MOBILE_GAME_W  = 580;

            const THRESHOLD_ENTER = SIDEBAR_LEFT_W + SIDEBAR_RIGHT_W + ENTER_MOBILE_GAME_W; // 1020
            const THRESHOLD_EXIT  = SIDEBAR_LEFT_W + SIDEBAR_RIGHT_W + EXIT_MOBILE_GAME_W;  // 1100

            let isMobile = false;

            function checkLayout() {
                const app = document.getElementById('app');
                if (!app) return;
                const w = app.offsetWidth;
                if (!isMobile && w < THRESHOLD_ENTER) {
                    isMobile = true;
                    document.documentElement.classList.add('mobile-forced');
                } else if (isMobile && w >= THRESHOLD_EXIT) {
                    isMobile = false;
                    document.documentElement.classList.remove('mobile-forced');
                }
            }

            const ro = new ResizeObserver(checkLayout);
            const app = document.getElementById('app');
            if (app) ro.observe(app);
            checkLayout();
        })();
    }
</script>
