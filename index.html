<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfle - Multiplayer Wordle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .cell { transition: transform 0.15s ease, border-color 0.15s ease; }
        .flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .bg-correct { background-color: #22c55e !important; border-color: #22c55e !important; color: white; }
        .bg-present { background-color: #eab308 !important; border-color: #eab308 !important; color: white; }
        .bg-absent { background-color: #3f3f46 !important; border-color: #3f3f46 !important; color: white; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Sidebar -->
    <div class="w-full md:w-80 bg-slate-900/50 border-r border-slate-800 p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-2">
                <i data-lucide="paw-print"></i> Wolfle
            </h1>
        </div>

        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Dein Name</label>
            <input type="text" id="playerName" maxlength="15" placeholder="Name..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 text-white">
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="window.startSolo()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl border border-slate-700 transition-all">
                <i data-lucide="user"></i> Solo Modus
            </button>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="mx-4 text-slate-500 text-xs uppercase">Multiplayer</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <button id="btnCreateRoom" onclick="window.createRoom()" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl shadow-lg disabled:opacity-50">
                <i data-lucide="plus-circle"></i> Raum erstellen
            </button>

            <div class="flex gap-2">
                <input type="text" id="roomInput" placeholder="CODE" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl px-2 text-center uppercase tracking-widest text-white">
                <button onclick="window.joinRoom()" class="w-1/2 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl">Beitreten</button>
            </div>
        </div>

        <div id="roomStatus" class="hidden bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-semibold text-indigo-300">Raum: <span id="currentRoomCode" class="text-white font-mono"></span></h3>
                <button onclick="window.leaveRoom()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
            <ul id="roomPlayers" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <!-- Game -->
    <div class="flex-1 flex flex-col items-center justify-between p-4 h-full overflow-hidden">
        <div id="grid-container" class="flex-1 flex items-center justify-center w-full min-h-0">
            <div id="grid" class="grid grid-rows-6 gap-2"></div>
        </div>
        <div id="keyboard" class="w-full max-w-lg mt-4 flex flex-col gap-2 pb-6"></div>
    </div>

    <!-- Leaderboard -->
    <div class="w-full md:w-72 bg-slate-900/50 border-l border-slate-800 p-6 hidden lg:flex flex-col">
        <h2 class="text-xl font-bold flex items-center gap-2 mb-4 text-slate-200">
            <i data-lucide="trophy" class="text-yellow-500"></i> Top Liste
        </h2>
        <ul id="leaderboard" class="space-y-3 overflow-y-auto">
            <li class="text-slate-500 text-sm italic">Lade Daten...</li>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Data ---
        const WORDS = ["APFEL", "STADT", "STUHL", "TISCH", "VOGEL", "STERN", "LICHT", "NACHT", "SPIEL", "FEUER", "KATZE", "HUNDE", "BAUME", "BLUME", "KREIS", "WOLFE", "RADIO", "LAMPE", "GLAUB", "TRAUM"];
        
        let targetWord = "";
        let currentRow = 0;
        let currentCol = 0;
        let cells = [];
        let gameOver = false;
        let letterStates = {};
        
        let currentRoomCode = null;
        let roomUnsubscribe = null;
        let user = null;
        let db = null;
        let auth = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wolfle-v1';

        // --- Init ---
        async function init() {
            lucide.createIcons();
            
            // Firebase Config safe access
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo" };
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);

            // Auth mit verbesserter Namensprüfung
            onAuthStateChanged(auth, (u) => {
                user = u;
                if(u) {
                    loadLeaderboard();
                    document.getElementById('btnCreateRoom').disabled = false;
                }
            });

            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth failed", e);
            }

            // Namen aus dem Speicher laden
            const savedName = localStorage.getItem("wolfle_user_name");
            if(savedName) {
                document.getElementById('playerName').value = savedName;
            }

            // WICHTIG: Erst hier das Spiel initialisieren
            resetGame(); 
            selectNewTargetWord();
        }

        function selectNewTargetWord() {
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            console.log("Neues Wort gewählt"); // Nur zum Debuggen
        }

        window.startSolo = () => {
            const name = document.getElementById("playerName").value.trim();
            if(!name) {
                showToast("Bitte gib zuerst einen Namen ein!", "warning");
                document.getElementById("playerName").focus();
                return;
            }
            localStorage.setItem("wolfle_user_name", name);
            window.leaveRoom();
            resetGame();
            selectNewTargetWord();
            showToast("Neues Spiel gestartet", "success");
        };

        // --- Game Logic ---
        function createGrid() {
            const gridEl = document.getElementById("grid");
            gridEl.innerHTML = '';
            cells = [];
            for (let i = 0; i < 6; i++) {
                cells[i] = [];
                let row = document.createElement("div");
                row.className = "grid grid-cols-5 gap-2";
                for (let j = 0; j < 5; j++) {
                    let d = document.createElement("div");
                    d.className = "cell w-12 h-12 md:w-16 md:h-16 border-2 border-slate-700 flex items-center justify-center text-2xl font-bold rounded-lg uppercase bg-slate-800/50 text-white";
                    row.appendChild(d);
                    cells[i][j] = d;
                }
                gridEl.appendChild(row);
            }
        }

        function createKeyboard() {
            const kb = document.getElementById("keyboard");
            const layout = [
                ['Q','W','E','R','T','Z','U','I','O','P'],
                ['A','S','D','F','G','H','J','K','L'],
                ['ENTER','Y','X','C','V','B','N','M','⌫']
            ];
            kb.innerHTML = '';
            layout.forEach(row => {
                let rDiv = document.createElement("div");
                rDiv.className = "flex justify-center gap-1 md:gap-2";
                row.forEach(key => {
                    let b = document.createElement("button");
                    b.textContent = key;
                    b.className = "flex-1 h-12 md:h-14 bg-slate-700 text-white font-bold rounded flex items-center justify-center text-sm transition-colors uppercase";
                    if(key === 'ENTER') b.onclick = () => submitGuess();
                    else if(key === '⌫') b.onclick = () => backspace();
                    else {
                        b.id = `key-${key}`;
                        b.onclick = () => typeLetter(key);
                    }
                    rDiv.appendChild(b);
                });
                kb.appendChild(rDiv);
            });
        }

        function typeLetter(l) {
            if (currentCol < 5 && !gameOver) {
                cells[currentRow][currentCol].textContent = l;
                cells[currentRow][currentCol].classList.add("border-slate-400");
                currentCol++;
            }
        }

        function backspace() {
            if (currentCol > 0 && !gameOver) {
                currentCol--;
                cells[currentRow][currentCol].textContent = "";
                cells[currentRow][currentCol].classList.remove("border-slate-400");
            }
        }

        async function submitGuess() {
            if (currentCol < 5 || gameOver) return;
            
            let guess = "";
            for (let i = 0; i < 5; i++) guess += cells[currentRow][i].textContent;

            // --- Wort-Validierung ---
            try {
                // Suche im deutschen Wiktionary
                const response = await fetch(`https://de.wiktionary.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${guess.toLowerCase()}&srlimit=1`);
                const data = await response.json();
                
                // Prüfen, ob das Wort existiert
                const exists = data.query.search.some(result => result.title.toLowerCase() === guess.toLowerCase());

                if (!exists) {
                    showToast("Kein deutsches Wort!", "error");
                    const rowEl = cells[currentRow][0].parentElement;
                    rowEl.classList.add("shake");
                    setTimeout(() => rowEl.classList.remove("shake"), 400);
                    return; // Abbrechen, bevor die Farben berechnet werden
                }
            } catch (e) {
                console.error("Validierungsfehler", e);
                // Bei Netzwerkfehler lassen wir es durchgehen, um das Spiel nicht zu blockieren
            }

            // --- Farblogik (Zurück auf Original-Logik) ---
            const evaluation = new Array(5).fill('absent');
            let tempTarget = targetWord.split('');
            let tempGuess = guess.split('');

            // 1. Durchgang: Korrekte Position (Grün)
            for(let i = 0; i < 5; i++) {
                if(tempGuess[i] === tempTarget[i]) {
                    evaluation[i] = 'correct';
                    tempTarget[i] = null;
                    tempGuess[i] = null;
                }
            }
            
            // 2. Durchgang: Enthalten (Gelb)
            for(let i = 0; i < 5; i++) {
                if(tempGuess[i] !== null) { // Noch nicht als grün markiert
                    const indexInTarget = tempTarget.indexOf(tempGuess[i]);
                    if(indexInTarget !== -1) {
                        evaluation[i] = 'present';
                        tempTarget[indexInTarget] = null; // Buchstabe "verbrauchen"
                    }
                }
            }

            // --- Animation & UI Update ---
            for (let i = 0; i < 5; i++) {
                const cell = cells[currentRow][i];
                const status = evaluation[i];
                const letter = guess[i];
                
                setTimeout(() => {
                    cell.classList.add("flip");
                    setTimeout(() => {
                        cell.classList.remove("bg-slate-800/50", "border-slate-400", "border-slate-700");
                        cell.classList.add(`bg-${status}`);
                        updateKeyColor(letter, status);
                    }, 300);
                }, i * 100);
            }

            const isWin = guess === targetWord;
            const finalRow = currentRow; // Fixieren für Timeout
            
            currentRow++;
            currentCol = 0;

            setTimeout(() => {
                if (isWin) {
                    showToast("Gewonnen!", "success");
                    endGame(true);
                } else if (finalRow === 5) { // 5 ist der Index der 6. Reihe
                    showToast(`Wort war: ${targetWord}`, "error");
                    endGame(false);
                } else if(currentRoomCode) {
                    updateRoomProgress(currentRow, false, false);
                }
            }, 800);
        }

        function updateKeyColor(letter, status) {
            const btn = document.getElementById(`key-${letter}`);
            if(!btn) return;
            if(letterStates[letter] === 'correct') return;
            if(letterStates[letter] === 'present' && status === 'absent') return;
            letterStates[letter] = status;
            btn.className = btn.className.replace(/bg-correct|bg-present|bg-absent|bg-slate-700/g, '');
            btn.classList.add(`bg-${status}`);
        }

        // --- Room Management ---
        window.startSolo = () => {
            window.leaveRoom();
            resetGame();
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        };

        function resetGame() {
            createGrid();
            createKeyboard();
            currentRow = 0;
            currentCol = 0;
            gameOver = false;
            letterStates = {};
        }

        window.createRoom = async () => {
            if(!user) return showToast("Authentifizierung...", "warning");
            const name = document.getElementById("playerName").value.trim() || "Unbekannt";
            localStorage.setItem("wolfle_user_name", name);
            
            const code = Math.random().toString(36).substring(2,7).toUpperCase();
            const word = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            try {
                // Rule 1: Correct Path
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                await setDoc(roomRef, {
                    word: word,
                    players: {
                        [user.uid]: { name, guesses: 0, finished: false, won: false }
                    }
                });
                joinInternal(code, word);
                showToast(`Raum ${code} erstellt`, "success");
            } catch(e) {
                console.error(e);
                showToast("Fehler beim Erstellen", "error");
            }
        };

        window.joinRoom = async () => {
            const code = document.getElementById("roomInput").value.toUpperCase();
            if(!code || !user) return;
            
            const name = document.getElementById("playerName").value.trim() || "Gast";
            localStorage.setItem("wolfle_user_name", name);

            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                const snap = await getDoc(roomRef);
                if(snap.exists()) {
                    await setDoc(roomRef, {
                        players: { [user.uid]: { name, guesses: 0, finished: false, won: false } }
                    }, { merge: true });
                    joinInternal(code, snap.data().word);
                } else {
                    showToast("Raum nicht gefunden", "error");
                }
            } catch(e) { console.error(e); }
        };

        function joinInternal(code, word) {
            resetGame();
            targetWord = word;
            currentRoomCode = code;
            document.getElementById("roomStatus").classList.remove("hidden");
            document.getElementById("currentRoomCode").textContent = code;
            listenToRoom(code);
        }

        window.leaveRoom = () => {
            currentRoomCode = null;
            if(roomUnsubscribe) roomUnsubscribe();
            document.getElementById("roomStatus").classList.add("hidden");
        };

        function listenToRoom(code) {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            roomUnsubscribe = onSnapshot(roomRef, (snap) => {
                if(snap.exists()) {
                    const players = snap.data().players;
                    const list = document.getElementById("roomPlayers");
                    list.innerHTML = "";
                    Object.values(players).forEach(p => {
                        let icon = p.finished ? (p.won ? '🏆' : '💀') : '⌨️';
                        list.innerHTML += `<li class="flex justify-between bg-slate-800/50 p-2 rounded text-xs">
                            <span>${p.name}</span>
                            <span>${icon} ${p.guesses}/6</span>
                        </li>`;
                    });
                }
            }, (err) => console.error(err));
        }

        async function updateRoomProgress(g, f, w) {
            if(!currentRoomCode || !user) return;
            const name = document.getElementById("playerName").value.trim() || "Spieler";
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
            await setDoc(roomRef, {
                players: { [user.uid]: { name, guesses: g, finished: f, won: w } }
            }, { merge: true });
        }

        async function endGame(win) {
            gameOver = true;
            if(currentRoomCode) updateRoomProgress(currentRow, true, win);
            
            // Save Score
            if(win && user) {
                const name = document.getElementById("playerName").value.trim() || "Anonym";
                const score = (7 - currentRow) * 10;
                try {
                    const ref = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                    await addDoc(ref, { name, score, date: Date.now() });
                    loadLeaderboard();
                } catch(e) {}
            }
        }

        async function loadLeaderboard() {
            if(!db) return;
            try {
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                const snap = await getDocs(ref);
                let data = [];
                snap.forEach(d => data.push(d.data()));
                data.sort((a,b) => b.score - a.score);
                
                const list = document.getElementById("leaderboard");
                list.innerHTML = "";
                data.slice(0, 8).forEach((s, i) => {
                    list.innerHTML += `<li class="flex justify-between bg-slate-800/40 p-2 rounded-lg border border-slate-700/50 text-sm">
                        <span>${i+1}. ${s.name}</span>
                        <span class="text-indigo-400 font-bold">${s.score}</span>
                    </li>`;
                });
            } catch(e) {}
        }

        function showToast(m, type) {
            const c = document.getElementById("toast-container");
            const t = document.createElement("div");
            t.className = `px-4 py-2 rounded-full border shadow-lg text-sm font-medium ${type === 'error' ? 'bg-red-900 border-red-700' : 'bg-slate-800 border-slate-600'}`;
            t.textContent = m;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        document.addEventListener("keydown", (e) => {
            if(document.activeElement.tagName === "INPUT") return;
            
            // Prüfen, ob ein Name gesetzt ist
            const name = document.getElementById("playerName").value.trim();
            if(!name) {
                if(/^[a-zA-Z]$/.test(e.key)) {
                    showToast("Bitte gib oben deinen Namen ein!", "warning");
                }
                return;
            }

            if(e.key === "Enter") submitGuess();
            else if(e.key === "Backspace") backspace();
            else if(/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
        });

        init();
    </script>
</body>
</html>
