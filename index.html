<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wolfle – Spieleauswahl</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; }
        html {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        .hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .hero-logo {
            width: 80px;
            height: auto;
            border-radius: 22px;
            margin: 0 auto 16px;
            display: block;
            box-shadow: 0 8px 32px rgba(99,102,241,0.4);
            object-fit: contain;
        }
        .hero h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .hero p {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 8px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 640px;
        }

        .game-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 28px 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            backdrop-filter: blur(12px);
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #6366f1;
            box-shadow: 0 12px 40px rgba(99,102,241,0.25);
        }
        .game-card:active { transform: translateY(-1px); }

        .game-card .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
        .game-card.wordle .icon-wrap { background: rgba(99,102,241,0.2); color: #818cf8; }
        .game-card.hangman .icon-wrap { background: rgba(244,63,94,0.15); color: #fb7185; }

        .game-card h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #e2e8f0;
        }
        .game-card p {
            font-size: 0.875rem;
            color: #94a3b8;
            line-height: 1.5;
        }
        .game-card .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 10px;
            align-self: flex-start;
            margin-top: 4px;
            transition: opacity 0.12s;
        }
        .game-card.wordle .play-btn { background: #4f46e5; color: white; }
        .game-card.hangman .play-btn { background: #e11d48; color: white; }
        .game-card:hover .play-btn { opacity: 0.88; }

        .footer {
            margin-top: 40px;
            color: #475569;
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="logo.png" alt="Wolfle Logo" class="hero-logo" onerror="this.style.display='none'">
        <h1>Wolfle</h1>
        <p>Wähle dein Spiel</p>
    </div>

    <div class="game-grid">
        <a href="wordle.html" class="game-card wordle">
            <div class="icon-wrap">
                <i data-lucide="grid-2x2" class="w-7 h-7"></i>
            </div>
            <h2>Wordle</h2>
            <p>Errate das geheime 5-Buchstaben-Wort in 6 Versuchen. Spiele täglich oder zufällig.</p>
            <span class="play-btn">
                <i data-lucide="play" class="w-4 h-4"></i> Spielen
            </span>
        </a>

        <a href="hangman.html" class="game-card hangman">
            <div class="icon-wrap">
                <i data-lucide="skull" class="w-7 h-7"></i>
            </div>
            <h2>Hangman</h2>
            <p>Das klassische Galgenspiel – errate das Wort, bevor die Zeit abläuft!</p>
            <span class="play-btn">
                <i data-lucide="play" class="w-4 h-4"></i> Spielen
            </span>
        </a>
    </div>

    <div class="footer">
        &copy; Wolfle – Alle Spiele
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
