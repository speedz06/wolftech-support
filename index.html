<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfle</title>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.cell{
width:60px;
height:60px;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
text-transform:uppercase;
}

.green{ background:#22c55e; }
.yellow{ background:#eab308; }
.gray{ background:#374151; }

.keyboard{
margin-top:30px;
}

.key{
display:inline-block;
margin:5px;
padding:10px 15px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#06b6d4;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🐺 Wolfle</h1>

<div id="grid" class="grid"></div>

<div id="keyboard" class="keyboard"></div>

<p id="message"></p>

<button onclick="resetGame()">Neues Spiel</button>

<script>

// Wörterliste (nur ohne ä ö ü)
const words = [
"apfel","tisch","stuhl","lampe","fenst","garten","sonne","wolke","fluss",
"stein","nacht","stern","farbe","licht","kabel","druck","radio","smart",
"cloud","laser","meter","strom","daten","server","login","input","cache",
"timer","reset","level","spiel","taste","mausx","sound","video","audio"
];

let word = words[Math.floor(Math.random()*words.length)];
let currentRow = 0;
let currentCol = 0;
let grid = [];
let gameOver = false;

const gridEl = document.getElementById("grid");
const messageEl = document.getElementById("message");

// GRID erstellen
for(let i=0;i<6;i++){
grid[i]=[];
for(let j=0;j<5;j++){
let div=document.createElement("div");
div.classList.add("cell");
gridEl.appendChild(div);
grid[i][j]=div;
}
}

// Tastatur
const letters = "QWERTZUIOPASDFGHJKLYXCVBNM";

const keyboardEl = document.getElementById("keyboard");

letters.split("").forEach(l=>{
let key=document.createElement("div");
key.textContent=l;
key.classList.add("key");
key.onclick=()=>handleKey(l);
keyboardEl.appendChild(key);
});

// Enter + Backspace
let enter=document.createElement("div");
enter.textContent="ENTER";
enter.classList.add("key");
enter.onclick=submitGuess;
keyboardEl.appendChild(enter);

let back=document.createElement("div");
back.textContent="⌫";
back.classList.add("key");
back.onclick=deleteLetter;
keyboardEl.appendChild(back);

// Eingabe via Tastatur
document.addEventListener("keydown",(e)=>{
if(gameOver) return;

if(e.key==="Enter") submitGuess();
else if(e.key==="Backspace") deleteLetter();
else{
let k=e.key.toUpperCase();
if(/[A-Z]/.test(k)) handleKey(k);
}
});

function handleKey(letter){
if(currentCol<5 && !gameOver){
grid[currentRow][currentCol].textContent=letter;
currentCol++;
}
}

function deleteLetter(){
if(currentCol>0){
currentCol--;
grid[currentRow][currentCol].textContent="";
}
}

function submitGuess(){
if(currentCol<5) return;

let guess="";
for(let i=0;i<5;i++){
guess+=grid[currentRow][i].textContent.toLowerCase();
}

let wordArr = word.split("");
let guessArr = guess.split("");

// Grün check
for(let i=0;i<5;i++){
if(guessArr[i]===wordArr[i]){
grid[currentRow][i].classList.add("green");
wordArr[i]=null;
guessArr[i]=null;
}
}

// Gelb check
for(let i=0;i<5;i++){
if(guessArr[i] && wordArr.includes(guessArr[i])){
grid[currentRow][i].classList.add("yellow");
wordArr[wordArr.indexOf(guessArr[i])] = null;
}else if(guessArr[i]){
grid[currentRow][i].classList.add("gray");
}
}

// Gewinn
if(guess===word){
messageEl.textContent="🎉 Gewonnen!";
gameOver=true;
return;
}

// nächste Reihe
currentRow++;
currentCol=0;

if(currentRow===6){
messageEl.textContent="❌ Verloren! Wort war: "+word;
gameOver=true;
}
}

function resetGame(){
location.reload();
}

</script>

</body>
</html>
