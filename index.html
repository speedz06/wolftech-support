<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfle - Multiplayer Wordle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="words.js"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .cell { transition: transform 0.15s ease, border-color 0.15s ease; }
        .flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .bg-correct { background-color: #22c55e !important; border-color: #22c55e !important; color: white; }
        .bg-present { background-color: #eab308 !important; border-color: #eab308 !important; color: white; }
        .bg-absent { background-color: #3f3f46 !important; border-color: #3f3f46 !important; color: white; }
        
        button:focus { outline: none; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <div id="cookie-banner" class="fixed inset-0 bg-slate-900/95 z-[100] flex items-center justify-center p-4 hidden text-center">
        <div class="max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl">
            <i data-lucide="shield-check" class="w-12 h-12 text-indigo-400 mx-auto mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Datenschutz & Cookies</h2>
            <p class="text-slate-400 text-sm mb-6">
                Wir nutzen Cookies und lokalen Speicher, um deinen Namen und Punktestand sicher in der Cloud zu speichern. Akzeptiere, um die Bestenliste und Multiplayer zu nutzen.
            </p>
            <div class="flex flex-col gap-3">
                <button onclick="window.acceptCookies()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold">Akzeptieren & Spielen</button>
                <button onclick="window.location.href='https://google.de'" class="text-slate-500 text-xs hover:underline">Ablehnen (Verlassen)</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="w-full md:w-80 bg-slate-900/50 border-r border-slate-800 p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-2">
                <i data-lucide="paw-print"></i> Wolfle
            </h1>
        </div>

        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Dein Name</label>
            <input type="text" id="playerName" maxlength="15" placeholder="Name..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-indigo-500 outline-none">
        </div>

        <div class="flex flex-col gap-3">
            <button id="btnSolo" onclick="window.startSolo()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl border border-slate-700 transition-all">
                <i data-lucide="user"></i> Solo Modus
            </button>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="mx-4 text-slate-500 text-xs uppercase">Multiplayer</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <button id="btnCreateRoom" onclick="window.createRoom()" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl shadow-lg disabled:opacity-50">
                <i data-lucide="plus-circle"></i> Raum erstellen
            </button>

            <div class="flex gap-2">
                <input type="text" id="roomInput" placeholder="CODE" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl px-2 text-center uppercase tracking-widest text-white outline-none">
                <button onclick="window.joinRoom()" class="w-1/2 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl">Beitreten</button>
            </div>
            
            <button id="btnShareRoom" onclick="window.shareRoom()" class="hidden w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl">
                <i data-lucide="share-2" class="w-4 h-4"></i> Link kopieren
            </button>
        </div>

        <div id="roomStatus" class="hidden bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-semibold text-indigo-300">Raum: <span id="currentRoomCode" class="text-white font-mono"></span></h3>
                <button onclick="window.leaveRoom()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
            <ul id="roomPlayers" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-between p-4 h-full overflow-hidden">
        <div id="grid-container" class="flex-1 flex items-center justify-center w-full min-h-0">
            <div id="grid" class="grid grid-rows-6 gap-2"></div>
        </div>
        <div id="keyboard" class="w-full max-w-lg mt-4 flex flex-col gap-2 pb-6"></div>
    </div>

    <div class="w-full md:w-72 bg-slate-900/50 border-l border-slate-800 p-6 hidden lg:flex flex-col">
        <h2 class="text-xl font-bold flex items-center gap-2 mb-4 text-slate-200">
            <i data-lucide="trophy" class="text-yellow-500"></i> Top Liste
        </h2>
        <ul id="leaderboard" class="space-y-3 overflow-y-auto">
            <li class="text-slate-500 text-sm italic">Lade Daten...</li>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // FALLBACK-WÖRTER (falls words.js nicht lädt)
        const FALLBACK = ["APFEL", "STADT", "STUHL", "TISCH", "VOGEL"];
        
        // Logik: Nutze window.WOLFLE_WORDS aus words.js, falls vorhanden
        const WORDS = (window.WOLFLE_WORDS && window.WOLFLE_WORDS.length > 0) ? window.WOLFLE_WORDS : FALLBACK;

        let targetWord = "";
        let currentRow = 0, currentCol = 0, cells = [], gameOver = false, letterStates = {};
        let currentRoomCode = null, roomUnsubscribe = null, user = null, db = null, auth = null;
        const appId = 'wolfle-v1';

        async function init() {
            lucide.createIcons();
            
            if (!localStorage.getItem('wolfle_consent')) {
                document.getElementById('cookie-banner').classList.remove('hidden');
                return;
            }

            createGrid();
            createKeyboard();
            
            const config = {
                apiKey: "AIzaSyDTPO-01gusabZGy-TthEWZWntwct6LrEQ",
                authDomain: "wolfle.firebaseapp.com",
                projectId: "wolfle",
                storageBucket: "wolfle.firebasestorage.app",
                messagingSenderId: "286289741614",
                appId: "1:286289741614:web:14e5faad1616fe75755cbf"
            };

            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if(u) {
                        loadLeaderboard();
                        const urlParams = new URLSearchParams(window.location.search);
                        const r = urlParams.get('room');
                        if(r) { document.getElementById('roomInput').value = r; window.joinRoom(); }
                    }
                });
                await signInAnonymously(auth);
            } catch (e) { console.error(e); }

            const savedName = localStorage.getItem("wolfle_user_name");
            if(savedName) document.getElementById('playerName').value = savedName;
            window.startSolo();
        }

        window.acceptCookies = () => {
            localStorage.setItem('wolfle_consent', 'true');
            window.location.reload();
        };

        window.startSolo = () => {
            const name = document.getElementById("playerName").value.trim();
            if(!name) { showToast("Bitte gib einen Namen ein!", "warning"); return; }
            document.activeElement.blur(); 
            localStorage.setItem("wolfle_user_name", name);
            window.leaveRoom();
            resetGame();
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
            showToast("Neues Spiel gestartet", "success");
        };

        function createGrid() {
            const gridEl = document.getElementById("grid");
            gridEl.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                cells[i] = [];
                let row = document.createElement("div");
                row.className = "grid grid-cols-5 gap-2";
                for (let j = 0; j < 5; j++) {
                    let d = document.createElement("div");
                    d.className = "cell w-12 h-12 md:w-16 md:h-16 border-2 border-slate-700 flex items-center justify-center text-2xl font-bold rounded-lg uppercase bg-slate-800/50 text-white";
                    row.appendChild(d);
                    cells[i][j] = d;
                }
                gridEl.appendChild(row);
            }
        }

        function createKeyboard() {
            const kb = document.getElementById("keyboard");
            const layout = [['Q','W','E','R','T','Z','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Y','X','C','V','B','N','M','⌫']];
            kb.innerHTML = '';
            layout.forEach(row => {
                let rDiv = document.createElement("div");
                rDiv.className = "flex justify-center gap-1 md:gap-2";
                row.forEach(key => {
                    let b = document.createElement("button");
                    b.textContent = key;
                    b.className = "flex-1 h-12 md:h-14 bg-slate-700 text-white font-bold rounded flex items-center justify-center text-sm transition-colors uppercase";
                    if(key === 'ENTER') b.onclick = () => submitGuess();
                    else if(key === '⌫') b.onclick = () => backspace();
                    else { b.id = `key-${key}`; b.onclick = () => typeLetter(key); }
                    rDiv.appendChild(b);
                });
                kb.appendChild(rDiv);
            });
        }

        function typeLetter(l) { if (currentCol < 5 && !gameOver) cells[currentRow][currentCol++].textContent = l; }
        function backspace() { if (currentCol > 0 && !gameOver) cells[currentRow][--currentCol].textContent = ""; }

        async function submitGuess() {
            if (currentCol < 5 || gameOver) return;
            let guess = "";
            for (let i = 0; i < 5; i++) guess += cells[currentRow][i].textContent;

            // Wort-Validierung via Wiktionary
            try {
                const response = await fetch(`https://de.wiktionary.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${guess.toLowerCase()}&srlimit=1`);
                const data = await response.json();
                const exists = data.query.search.some(result => result.title.toLowerCase() === guess.toLowerCase());
                if (!exists) {
                    showToast("Kein deutsches Wort!", "error");
                    cells[currentRow][0].parentElement.classList.add("shake");
                    setTimeout(() => cells[currentRow][0].parentElement.classList.remove("shake"), 400);
                    return;
                }
            } catch (e) {}

            const evaluation = new Array(5).fill('absent');
            let tT = targetWord.split(''), tG = guess.split('');
            for(let i=0; i<5; i++) if(tG[i]===tT[i]) { evaluation[i]='correct'; tT[i]=tG[i]=null; }
            for(let i=0; i<5; i++) if(tG[i]) { let idx=tT.indexOf(tG[i]); if(idx!==-1){ evaluation[i]='present'; tT[idx]=null; } }

            for (let i = 0; i < 5; i++) {
                const cell = cells[currentRow][i];
                const status = evaluation[i];
                setTimeout(() => {
                    cell.classList.add("flip");
                    setTimeout(() => {
                        cell.classList.remove("bg-slate-800/50", "border-slate-700");
                        cell.classList.add(`bg-${status}`);
                        updateKeyColor(guess[i], status);
                    }, 300);
                }, i * 100);
            }

            const win = guess === targetWord;
            const lastRow = currentRow;
            currentRow++; currentCol = 0;

            setTimeout(() => {
                if (win) endGame(true);
                else if (lastRow === 5) endGame(false);
                else if(currentRoomCode) updateRoomProgress(currentRow, false, false);
            }, 800);
        }

        function updateKeyColor(l, s) {
            const b = document.getElementById(`key-${l}`);
            if(!b || letterStates[l] === 'correct') return;
            letterStates[l] = s;
            b.className = b.className.replace(/bg-correct|bg-present|bg-absent|bg-slate-700/g, '') + ` bg-${s}`;
        }

        async function endGame(win) {
            gameOver = true;
            const name = localStorage.getItem("wolfle_user_name") || "Anonym";
            if(win) {
                showToast("Gewonnen!", "success");
                if(user) {
                    const points = (7 - currentRow) * 10;
                    const scoreRef = doc(db, 'artifacts', appId, 'public', 'data', 'scores', user.uid);
                    const snap = await getDoc(scoreRef);
                    const total = (snap.exists() ? (snap.data().score || 0) : 0) + points;
                    await setDoc(scoreRef, { name, score: total, uid: user.uid }, { merge: true });
                    showToast(`+${points} Punkte!`, "info");
                    loadLeaderboard();
                }
            } else { showToast("Wort: " + targetWord, "error"); }
            if(currentRoomCode) updateRoomProgress(currentRow, true, win);
        }

        async function loadLeaderboard() {
            const list = document.getElementById("leaderboard");
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'scores'));
                let d = []; snap.forEach(doc => { if(doc.data().score) d.push(doc.data()); });
                d.sort((a,b) => b.score - a.score);
                list.innerHTML = d.slice(0,10).map((s,i) => `<li class="flex justify-between bg-slate-800/40 p-2 rounded text-sm"><span>${i+1}. ${s.name}</span><span class="text-indigo-400 font-bold">${s.score}</span></li>`).join('');
            } catch(e) {}
        }

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2,7).toUpperCase();
            const word = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), { word, players: { [user.uid]: { name: localStorage.getItem("wolfle_user_name"), guesses: 0, finished: false, won: false } } });
            joinInternal(code, word);
            document.getElementById('btnShareRoom').classList.remove('hidden');
        };

        window.joinRoom = async () => {
            const code = document.getElementById("roomInput").value.toUpperCase();
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code));
            if(snap.exists()) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), { players: { [user.uid]: { name: localStorage.getItem("wolfle_user_name"), guesses: 0, finished: false, won: false } } }, { merge: true });
                joinInternal(code, snap.data().word);
            }
        };

        function joinInternal(code, word) {
            resetGame(); targetWord = word; currentRoomCode = code;
            document.getElementById("roomStatus").classList.remove("hidden");
            document.getElementById("currentRoomCode").textContent = code;
            listenToRoom(code);
        }

        function listenToRoom(code) {
            roomUnsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), (snap) => {
                if(snap.exists()) {
                    const list = document.getElementById("roomPlayers");
                    list.innerHTML = Object.values(snap.data().players).map(p => `<li class="flex justify-between bg-slate-800/50 p-2 rounded text-xs"><span>${p.name || 'Spieler'}</span><span>${p.finished?(p.won?'🏆':'💀'):'⌨️'} ${p.guesses}/6</span></li>`).join('');
                }
            });
        }

        async function updateRoomProgress(g, f, w) {
            if(!currentRoomCode) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode), { players: { [user.uid]: { guesses: g, finished: f, won: w } } }, { merge: true });
        }

        window.leaveRoom = () => { if(roomUnsubscribe) roomUnsubscribe(); currentRoomCode = null; document.getElementById("roomStatus").classList.add("hidden"); };
        
        window.shareRoom = () => {
            const url = `${window.location.origin}${window.location.pathname}?room=${currentRoomCode}`;
            navigator.clipboard.writeText(url).then(() => showToast("Link kopiert!", "success"));
        };

        function resetGame() { createGrid(); createKeyboard(); currentRow = 0; currentCol = 0; gameOver = false; letterStates = {}; }
        function showToast(m, type) {
            const c = document.getElementById("toast-container");
            const t = document.createElement("div");
            t.className = `px-4 py-2 rounded-full border shadow-lg text-sm bg-slate-800 border-slate-600`;
            t.textContent = m; c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        document.addEventListener("keydown", (e) => {
            if(document.activeElement.tagName === "INPUT") return;
            if(e.key === "Enter") { e.preventDefault(); submitGuess(); }
            else if(e.key === "Backspace") backspace();
            else if(/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
        });

        init();
    </script>
</body>
</html>
