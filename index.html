<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wolfle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="words.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animations */
        .flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0%   { transform: rotateX(0deg); }
            50%  { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-5px); }
            40%,80% { transform: translateX(5px); }
        }

        /* Tile colours */
        .bg-correct { background-color: #22c55e !important; border-color: #22c55e !important; color: white; }
        .bg-present { background-color: #eab308 !important; border-color: #eab308 !important; color: white; }
        .bg-absent  { background-color: #3f3f46 !important; border-color: #3f3f46 !important; color: white; }

        /* Grid: scales to available space */
        #grid-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            padding: 8px;
        }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: clamp(4px, 1vw, 8px);
            height: 100%;
            aspect-ratio: 5/6;
            max-height: 100%;
            max-width: 100%;
        }
        .grid-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(4px, 1vw, 8px);
        }
        .cell {
            border: 2px solid #334155;
            border-radius: 6px;
            background: rgba(30,41,59,0.5);
            color: white;
            font-weight: bold;
            font-size: clamp(14px, 3vw, 22px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: border-color 0.15s;
            width: 100%;
            height: 100%;
        }

        /* Keyboard */
        #keyboard {
            padding: 4px 6px max(8px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            flex-shrink: 0;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: clamp(3px, 0.8vw, 6px);
        }
        .kb-key {
            flex: 1;
            height: clamp(36px, 5.5vh, 52px);
            background: #334155;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: clamp(10px, 2vw, 13px);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .kb-key:active { filter: brightness(0.75); }

        /* Desktop layout */
        #app {
            display: flex;
            flex-direction: row;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #sidebar-left  { width: 280px; min-width: 280px; }
        #sidebar-right { width: 240px; min-width: 240px; }
        #game-center   { flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; min-width: 0; }

        /* Mobile header */
        #mobile-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 16px 8px;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
        }

        /* Drawer */
        #drawer-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(2,6,23,0.75);
            z-index: 40;
            backdrop-filter: blur(4px);
        }
        #drawer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px max(20px, env(safe-area-inset-bottom));
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            max-height: 88dvh;
            overflow-y: auto;
        }
        #drawer.open { transform: translateY(0); }
        #drawer-overlay.open { display: block; }

        /* Bottom nav */
        #bottom-nav {
            display: none;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1e293b;
            background: #0f172a;
            padding: 4px 0 max(4px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #64748b;
            font-size: 10px;
            padding: 6px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background: none;
            border: none;
            transition: color 0.15s;
        }
        .nav-btn.active { color: #818cf8; }

        /* Modal */
        #end-modal { backdrop-filter: blur(6px); }
        #end-modal-box {
            transition: transform 0.25s ease, opacity 0.25s ease;
            transform: scale(0.9);
            opacity: 0;
        }
        #end-modal-box.visible { transform: scale(1); opacity: 1; }
        .end-letter {
            width: 2.5rem; height: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: bold; border-radius: 6px;
            border: 2px solid #3f3f46; color: white; text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        button:focus { outline: none; }
        input:focus { border-color: #6366f1 !important; outline: none; }

        /* Confetti */
        #confetti-canvas {
            position: fixed; inset: 0; pointer-events: none;
            z-index: 200; display: none;
        }

        /* Light mode overrides */
        html.light body { background: linear-gradient(135deg, #dde3ed, #f0f4f8); color: #1e293b; }
        html.light #sidebar-left,
        html.light #sidebar-right { background: rgba(248,250,252,0.97) !important; border-color: #cbd5e1 !important; }
        html.light #bottom-nav { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        html.light #mobile-header { border-color: #cbd5e1 !important; background: #f1f5f9; }
        html.light #drawer { background: #f8fafc !important; border-color: #cbd5e1 !important; }
        html.light .kb-key { background: #cbd5e1 !important; color: #1e293b !important; }
        html.light .cell { border-color: #94a3b8 !important; background: rgba(241,245,249,0.8) !important; color: #1e293b !important; }
        html.light #end-modal-box { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        html.light .text-white { color: #0f172a !important; }
        html.light .text-slate-200 { color: #1e293b !important; }
        html.light .text-slate-300 { color: #334155 !important; }
        html.light .text-slate-400 { color: #475569 !important; }
        html.light .text-slate-500 { color: #64748b !important; }
        html.light .bg-slate-800\/50,
        html.light .bg-slate-800\/40 { background-color: rgba(226,232,240,0.8) !important; }
        html.light .bg-slate-800 { background-color: #e2e8f0 !important; }
        html.light .bg-slate-900 { background-color: #f1f5f9 !important; }
        html.light .bg-slate-700 { background-color: #cbd5e1 !important; }
        html.light .border-slate-700 { border-color: #cbd5e1 !important; }
        html.light .border-slate-800 { border-color: #e2e8f0 !important; }
        html.light .bg-indigo-900\/20 { background-color: rgba(199,210,254,0.25) !important; }
        html.light .bg-indigo-900\/40 { background-color: rgba(199,210,254,0.45) !important; }
        html.light .nav-btn { color: #94a3b8; }
        html.light .nav-btn.active { color: #6366f1; }

        /* Chat */
        .chat-messages { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
        .chat-messages::-webkit-scrollbar { width: 2px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar-left, #sidebar-right { display: none !important; }
            #mobile-header { display: flex; }
            #bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none items-center"></div>

    <!-- END GAME MODAL -->
    <div id="end-modal" class="hidden fixed inset-0 bg-slate-900/80 z-[90] flex items-center justify-center p-4">
        <div id="end-modal-box" class="w-full max-w-sm bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl text-center">
            <div id="end-emoji" class="text-5xl mb-2"></div>
            <h2 id="end-title" class="text-2xl font-bold text-white mb-1"></h2>
            <p id="end-subtitle" class="text-slate-400 text-sm mb-4"></p>
            <div id="end-word" class="flex justify-center gap-2 mb-4"></div>
            <div id="end-points" class="hidden mb-4 inline-block bg-indigo-900/50 border border-indigo-500/40 text-indigo-300 text-sm font-semibold px-4 py-1.5 rounded-full"></div>
            <div class="flex flex-col gap-3 mt-2">
                <button id="modal-play-again-btn" onclick="window.playAgain()"
                    class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Nochmal spielen
                </button>
                <button onclick="window.closeModal()"
                    class="w-full text-slate-400 hover:text-slate-200 py-2 text-sm transition-colors">
                    Board ansehen
                </button>
            </div>
        </div>
    </div>

    <!-- MOBILE HEADER -->
    <div id="mobile-header">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-1.5">
            <i data-lucide="paw-print" class="w-5 h-5 text-indigo-400"></i> Wolfle
        </h1>
        <div class="flex items-center gap-1.5">
            <button id="theme-btn-mobile" onclick="window.toggleTheme()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Design wechseln">
                <i data-lucide="sun" class="w-4 h-4"></i>
            </button>
            <button id="sound-btn-mobile" onclick="window.toggleSound()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Ton">
                <i data-lucide="volume-2" class="w-4 h-4"></i>
            </button>
            <button onclick="window.playAgain()" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> Neu
            </button>
        </div>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="drawer-overlay" onclick="window.closeDrawer()"></div>

    <!-- DRAWER -->
    <div id="drawer">
        <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-5"></div>
        <div id="drawer-content"></div>
    </div>

    <!-- MAIN APP -->
    <div id="app">

        <!-- LEFT SIDEBAR (desktop) -->
        <div id="sidebar-left" class="bg-slate-900/50 border-r border-slate-800 p-5 flex flex-col gap-5 overflow-y-auto">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-2">
                    <i data-lucide="paw-print"></i> Wolfle
                </h1>
                <div class="flex gap-1">
                    <button id="theme-btn-desktop" onclick="window.toggleTheme()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Design wechseln">
                        <i data-lucide="sun" class="w-4 h-4"></i>
                    </button>
                    <button id="sound-btn-desktop" onclick="window.toggleSound()" class="text-slate-400 hover:text-slate-200 p-1.5 rounded-lg transition-colors" title="Ton">
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Dein Name</label>
                <input type="text" id="playerName" maxlength="15" placeholder="Name für Bestenliste..."
                    class="name-input w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white transition-colors">
                <p class="text-xs text-slate-500 mt-2"><i data-lucide="info" class="inline w-3 h-3 mr-1"></i>Mit Name → Punkte werden veröffentlicht</p>
            </div>
            <button onclick="window.startSolo()"
                class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl border border-slate-700 transition-all">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Neues Spiel
            </button>
            <div>
                <div class="relative flex items-center py-1 mb-3">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="mx-3 text-slate-500 text-xs uppercase">Multiplayer</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>
                <button onclick="window.createRoom()"
                    class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-xl mb-2 transition-colors">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Raum erstellen
                </button>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="roomInput" placeholder="CODE" maxlength="5"
                        class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-center uppercase tracking-widest text-white transition-colors">
                    <button onclick="window.joinRoom()"
                        class="w-1/2 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded-xl transition-colors text-sm">Beitreten</button>
                </div>
                <button class="share-btn hidden w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl transition-colors text-sm" onclick="window.shareRoom()">
                    <i data-lucide="share-2" class="w-4 h-4"></i> Link kopieren
                </button>
            </div>
            <div class="room-status hidden bg-indigo-900/20 p-3 rounded-xl border border-indigo-500/30">
                <div class="flex justify-between items-center mb-3">
                    <div>
                        <h3 class="text-sm font-semibold text-indigo-300">Raum: <span class="room-code-display text-white font-mono"></span></h3>
                        <span class="round-display hidden text-xs text-slate-400"></span>
                    </div>
                    <button onclick="window.leaveRoom()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
                <ul class="room-players-list space-y-1.5 text-sm"></ul>
                <button onclick="window.nextRound()" class="next-round-btn hidden mt-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-sm font-semibold transition-colors">Nächste Runde →</button>
                <div class="game-ended-notice hidden mt-2 text-center text-sm text-yellow-400 font-semibold">Spiel beendet! 🏆</div>
                <button onclick="window.rematch()" class="rematch-btn hidden mt-2 w-full bg-purple-600 hover:bg-purple-500 text-white py-2 rounded-lg text-sm font-semibold transition-colors">Rematch! 🔄</button>
                <div class="chat-section mt-3 border-t border-slate-700/50 pt-2">
                    <div class="chat-messages h-20 overflow-y-auto flex flex-col gap-0.5 mb-1.5 text-xs"></div>
                    <div class="flex gap-1">
                        <input type="text" class="chat-input flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white" placeholder="Nachricht..." maxlength="80">
                        <button onclick="window.sendChat(this)" class="bg-indigo-600 hover:bg-indigo-500 px-2.5 py-1 rounded text-xs text-white font-bold">→</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAME CENTER -->
        <div id="game-center">
            <div id="grid-wrapper"><div id="grid"></div></div>
            <div id="keyboard"></div>
        </div>

        <!-- RIGHT SIDEBAR (desktop) -->
        <div id="sidebar-right" class="bg-slate-900/50 border-l border-slate-800 p-5 flex flex-col">
            <h2 class="text-lg font-bold flex items-center gap-2 mb-3 text-slate-200">
                <i data-lucide="trophy" class="text-yellow-500 w-5 h-5"></i> Top Liste
            </h2>
            <div class="flex gap-1 mb-3 bg-slate-800/50 p-0.5 rounded-lg">
                <button onclick="window.setLeaderboardTab('total')" class="lb-tab-total flex-1 text-xs py-1.5 rounded-md bg-indigo-600 text-white font-semibold transition-colors">Gesamt</button>
                <button onclick="window.setLeaderboardTab('week')" class="lb-tab-week flex-1 text-xs py-1.5 rounded-md text-slate-400 transition-colors">Woche</button>
            </div>
            <ul id="leaderboard" class="leaderboard-list space-y-2 overflow-y-auto flex-1">
                <li class="text-slate-500 text-sm italic">Gib einen Namen ein...</li>
            </ul>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <div id="bottom-nav">
        <button class="nav-btn" onclick="window.openDrawer('menu')" id="nav-menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
            <span>Menü</span>
        </button>
        <button class="nav-btn active" id="nav-game" onclick="window.closeDrawer()">
            <i data-lucide="grid-2x2" class="w-5 h-5"></i>
            <span>Spiel</span>
        </button>
        <button class="nav-btn" onclick="window.openDrawer('leaderboard')" id="nav-lb">
            <i data-lucide="trophy" class="w-5 h-5"></i>
            <span>Top Liste</span>
        </button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const FALLBACK = ["APFEL","STADT","STUHL","TISCH","VOGEL"];
    const WORDS = (window.WOLFLE_WORDS?.length > 0) ? window.WOLFLE_WORDS : FALLBACK;
    const appId = 'wolfle-v1';
    const firebaseConfig = {
        apiKey: "AIzaSyDTPO-01gusabZGy-TthEWZWntwct6LrEQ",
        authDomain: "wolfle.firebaseapp.com",
        projectId: "wolfle",
        storageBucket: "wolfle.firebasestorage.app",
        messagingSenderId: "286289741614",
        appId: "1:286289741614:web:14e5faad1616fe75755cbf"
    };

    let targetWord = "";
    let currentRow = 0, currentCol = 0, cells = [], gameOver = false, letterStates = {};
    let currentRoomCode = null, roomUnsubscribe = null, db = null;
    let currentRound = 1, maxRounds = 3, playerTotalScore = 0, playerRoundsWon = 0;
    let leaderboardTab = 'total';

    function getWeekKey() {
        const d = new Date();
        const start = new Date(d.getFullYear(), 0, 1);
        const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
        return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    // ── Firebase ──────────────────────────────────────────────
    async function getDB() {
        if (db) return db;
        if (!getPlayerName()) return null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            return db;
        } catch(e) { console.error(e); return null; }
    }

    function getPlayerName() {
        return (document.getElementById('playerName')?.value || '').trim();
    }

    // Sync all name inputs (desktop sidebar + mobile drawer)
    document.addEventListener('input', async (e) => {
        if (!e.target.classList.contains('name-input')) return;
        const val = e.target.value;
        document.querySelectorAll('.name-input').forEach(el => { if (el !== e.target) el.value = val; });
        const trimmed = val.trim();
        if (trimmed) {
            localStorage.setItem('wolfle_user_name', trimmed);
            await getDB();
            loadLeaderboard();
        }
    });

    // ── Grid ──────────────────────────────────────────────────
    function createGrid() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = ''; cells = [];
        for (let i = 0; i < 6; i++) {
            cells[i] = [];
            const row = document.createElement("div");
            row.className = "grid-row";
            for (let j = 0; j < 5; j++) {
                const d = document.createElement("div");
                d.className = "cell";
                row.appendChild(d); cells[i][j] = d;
            }
            gridEl.appendChild(row);
        }
    }

    // ── Keyboard ──────────────────────────────────────────────
    function createKeyboard() {
        const kb = document.getElementById("keyboard");
        const layout = [
            ['Q','W','E','R','T','Z','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['ENTER','Y','X','C','V','B','N','M','⌫']
        ];
        kb.innerHTML = '';
        layout.forEach(row => {
            const rDiv = document.createElement("div");
            rDiv.className = "kb-row";
            row.forEach(key => {
                const b = document.createElement("button");
                b.textContent = key;
                b.className = "kb-key";
                if (key === 'ENTER') { b.style.flex = '1.6'; b.onclick = () => submitGuess(); }
                else if (key === '⌫') { b.style.flex = '1.6'; b.onclick = () => backspace(); }
                else { b.id = `key-${key}`; b.onclick = () => typeLetter(key); }
                rDiv.appendChild(b);
            });
            kb.appendChild(rDiv);
        });
    }

    function typeLetter(l) { if (currentCol < 5 && !gameOver) { cells[currentRow][currentCol++].textContent = l; playSound('type'); } }
    function backspace()   { if (currentCol > 0 && !gameOver) { cells[currentRow][--currentCol].textContent = ""; playSound('type'); } }

    // ── Submit ────────────────────────────────────────────────
    async function submitGuess() {
        if (currentCol < 5 || gameOver) return;
        let guess = "";
        for (let i = 0; i < 5; i++) guess += cells[currentRow][i].textContent;

        try {
            const res = await fetch(`https://de.wiktionary.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${guess.toLowerCase()}&srlimit=1`);
            const data = await res.json();
            if (!data.query.search.some(r => r.title.toLowerCase() === guess.toLowerCase())) {
                showToast("Kein deutsches Wort!", "error");
                cells[currentRow][0].parentElement.classList.add("shake");
                setTimeout(() => cells[currentRow][0].parentElement.classList.remove("shake"), 400);
                return;
            }
        } catch(e) {}

        const evaluation = new Array(5).fill('absent');
        let tT = targetWord.split(''), tG = guess.split('');
        for (let i = 0; i < 5; i++) if (tG[i]===tT[i]) { evaluation[i]='correct'; tT[i]=tG[i]=null; }
        for (let i = 0; i < 5; i++) if (tG[i]) { const idx=tT.indexOf(tG[i]); if(idx!==-1){ evaluation[i]='present'; tT[idx]=null; } }

        for (let i = 0; i < 5; i++) {
            const cell = cells[currentRow][i];
            setTimeout(() => {
                cell.classList.add("flip");
                setTimeout(() => {
                    cell.classList.add(`bg-${evaluation[i]}`);
                    updateKeyColor(guess[i], evaluation[i]);
                    playSound(evaluation[i]);
                }, 300);
            }, i * 100);
        }

        const win = guess === targetWord;
        const lastRow = currentRow;
        currentRow++; currentCol = 0;

        setTimeout(async () => {
            if (win) await endGame(true);
            else if (lastRow === 5) await endGame(false);
            else if (currentRoomCode) updateRoomProgress(currentRow, false, false);
        }, 800);
    }

    function updateKeyColor(l, s) {
        const b = document.getElementById(`key-${l}`);
        if (!b || letterStates[l] === 'correct') return;
        letterStates[l] = s;
        b.className = 'kb-key bg-' + s;
    }

    // ── End Game ──────────────────────────────────────────────
    async function endGame(win) {
        gameOver = true;
        let points = 0;
        if (win) {
            launchConfetti();
            playWinSound();
            points = (7 - currentRow) * 10;
            if (currentRoomCode) {
                playerTotalScore += points;
                playerRoundsWon += 1;
            }
            const name = getPlayerName();
            if (name) {
                const firestore = await getDB();
                if (firestore) {
                    try {
                        const ref = doc(firestore,'artifacts',appId,'public','data','scores',name.toLowerCase());
                        const snap = await getDoc(ref);
                        const existing = snap.exists() ? snap.data() : {};
                        const weekKey = getWeekKey();
                        const total = (existing.score || 0) + points;
                        const weekScore = (existing.weekKey === weekKey ? (existing.weekScore || 0) : 0) + points;
                        await setDoc(ref, { name, score: total, weekScore, weekKey }, { merge: true });
                        loadLeaderboard();
                    } catch(e) {}
                }
            }
        }
        if (!win) playSound('lose');
        if (currentRoomCode) updateRoomProgress(currentRow, true, win, playerTotalScore, playerRoundsWon);
        setTimeout(() => showEndModal(win, points), 400);
    }

        document.getElementById('end-subtitle').textContent = win
            ? `In ${currentRow} ${currentRow===1?'Versuch':'Versuchen'}${roundInfo}`
            : `Kein Versuch mehr übrig${roundInfo}`;

        const wordEl = document.getElementById('end-word');
        wordEl.innerHTML = '';
        targetWord.split('').forEach(l => {
            const d = document.createElement('div');
            d.className = 'end-letter ' + (win ? 'bg-correct' : 'bg-absent');
            d.textContent = l;
            wordEl.appendChild(d);
        });

        const pts = document.getElementById('end-points');
        if (win && points > 0) { pts.textContent = `+${points} Punkte`; pts.classList.remove('hidden'); pts.classList.add('inline-block'); }
        else pts.classList.add('hidden');

        const playAgainBtn = document.getElementById('modal-play-again-btn');

            playAgainBtn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Nochmal spielen';

        }));

        const firestore = await getDB(); if (!firestore) return;
        // Update tab button styles
        document.querySelectorAll('.lb-tab-total').forEach(b => {
            b.classList.toggle('bg-indigo-600', leaderboardTab === 'total');

        document.querySelectorAll('.lb-tab-week').forEach(b => {
            b.classList.toggle('bg-indigo-600', leaderboardTab === 'week');

        });
        document.querySelectorAll('.leaderboard-list').forEach(l =>
            l.innerHTML = '<li class="text-slate-500 text-sm italic">Lade...</li>');

            }
            const me = getPlayerName().toLowerCase();
            const html = d.length === 0
                ? '<li class="text-slate-500 text-sm italic">Noch keine Einträge.</li>'
                : d.slice(0,10).map((s,i) => {
                    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
                    const isMe = s.name.toLowerCase() === me;
                    const pts = leaderboardTab === 'week' ? (s.weekScore||0) : s.score;
                    return `<li class="flex justify-between ${isMe?'bg-indigo-900/40 border border-indigo-500/30':'bg-slate-800/40'} p-2 rounded text-sm">
                        <span>${medal} ${s.name}</span><span class="text-indigo-400 font-bold">${pts}</span></li>`;

        if (!name) { showToast("Bitte zuerst Namen eingeben!", "warning"); return; }

                { players: { [name]: { name, guesses:0, finished:false, won:false, totalScore:0, roundsWon:0 } } }, { merge:true });

    function joinInternal(code, word, round = 1, mRounds = 3) {
        resetGame(); targetWord = word; currentRoomCode = code;
        currentRound = round; maxRounds = mRounds;
        playerTotalScore = 0; playerRoundsWon = 0;
        document.querySelectorAll('.room-code-display').forEach(el => el.textContent = code);
        document.querySelectorAll('.room-status').forEach(el => el.classList.remove('hidden'));
        listenToRoom(code);
        updateRoundDisplay();
        showToast("Raum " + code + " beigetreten", "success");
        window.closeDrawer();
    }

    async function listenToRoom(code) {
        const firestore = await getDB(); if (!firestore) return;
        if (roomUnsubscribe) roomUnsubscribe();
        roomUnsubscribe = onSnapshot(doc(firestore,'artifacts',appId,'public','data','rooms',code), snap => {
            if (!snap.exists()) return;
            const data = snap.data();
            const players = data.players || {};
            const newRound = data.round || 1;
            const mRounds = data.maxRounds || 3;

            // Detect round change or rematch → auto-start new round locally
            if (newRound !== currentRound) {
                const isRematch = newRound < currentRound || (newRound === 1 && currentRound > 1);
                currentRound = newRound;
                maxRounds = mRounds;
                targetWord = data.word;
                resetGame();
                window.closeModal();
                if (isRematch) {
                    playerTotalScore = 0; playerRoundsWon = 0;
                    showToast(`Rematch! Runde 1/${mRounds} 🔄`, "success");
                } else {
                    showToast(`Runde ${newRound} von ${mRounds} startet!`, "success");
                }
                updateRoundDisplay();
            } else {
                maxRounds = mRounds;
            }

            const playerList = Object.values(players);
            const allFinished = playerList.length > 0 && playerList.every(p => p.finished);
            const roundsDone = newRound >= mRounds;

            // Render players list with per-round and cumulative info
            const html = playerList.map(p =>
                `<li class="flex justify-between bg-slate-800/50 p-2 rounded text-xs">
                    <span class="font-medium">${p.name||'Spieler'}</span>
                    <span class="flex items-center gap-1.5">
                        ${p.finished?(p.won?'🏆':'💀'):'⌨️'} ${p.guesses}/6
                        ${(p.roundsWon||0)>0?`<span class="text-yellow-400 font-bold">${p.roundsWon}W</span>`:''}
                        ${(p.totalScore||0)>0?`<span class="text-indigo-400">${p.totalScore}P</span>`:''}
                    </span>
                </li>`).join('');
            document.querySelectorAll('.room-players-list').forEach(el => el.innerHTML = html);

            // Show/hide next-round button and game-ended notice
            document.querySelectorAll('.next-round-btn').forEach(btn => {
                btn.classList.toggle('hidden', !(allFinished && !roundsDone));
            });
            document.querySelectorAll('.game-ended-notice').forEach(el => {
                el.classList.toggle('hidden', !(allFinished && roundsDone));
            });
            document.querySelectorAll('.rematch-btn').forEach(btn => {
                btn.classList.toggle('hidden', !(allFinished && roundsDone));
            });

            // Render chat messages
            const chatHtml = (data.chat || []).slice(-20).map(c =>
                `<div><span class="font-semibold text-indigo-400">${c.n}:</span> <span class="text-slate-300">${c.m}</span></div>`
            ).join('');
            document.querySelectorAll('.chat-messages').forEach(el => {
                el.innerHTML = chatHtml;
                el.scrollTop = el.scrollHeight;
            });
        });
    }

    // ── Sound ─────────────────────────────────────────────────
    let soundEnabled = localStorage.getItem('wolfle_sound') !== 'false';
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playTone(freq, type, duration, volume = 0.25) {
        if (!soundEnabled) return;
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
        } catch(e) {}
    }

    function playSound(type) {
        const sounds = {
            type:    [440, 'sine', 0.05, 0.1],
            correct: [523, 'sine', 0.18],
            present: [392, 'sine', 0.18],
            absent:  [220, 'square', 0.1, 0.15],
            lose:    [165, 'sawtooth', 0.5],
        };
        const s = sounds[type]; if (!s) return;
        playTone(...s);
    }

    function playWinSound() {
        if (!soundEnabled) return;
        [523, 659, 784, 1047].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'sine', 0.4), i * 110);
        });
    }

    function updateSoundBtn() {
        const icon = soundEnabled ? 'volume-2' : 'volume-x';
        document.querySelectorAll('[id^="sound-btn"]').forEach(btn => {
            btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        });
        lucide.createIcons();
    }

    window.toggleSound = () => {
        soundEnabled = !soundEnabled;
        localStorage.setItem('wolfle_sound', soundEnabled);
        updateSoundBtn();
        if (soundEnabled) playTone(523, 'sine', 0.15);
    };

    // ── Confetti ──────────────────────────────────────────────
    function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.display = 'block';
        const colors = ['#6366f1','#22c55e','#eab308','#06b6d4','#f43f5e','#a78bfa'];
        const pieces = Array.from({ length: 120 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * -canvas.height,
            w: Math.random() * 10 + 5,
            h: Math.random() * 5 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 3,
            vy: Math.random() * 3 + 2,
            vr: (Math.random() - 0.5) * 0.15,
        }));
        let frame = 0;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rotation += p.vr;
                if (p.y > canvas.height) p.y = -20;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
            frame++;
            if (frame < 200) requestAnimationFrame(draw);
            else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = 'none'; }
        }
        draw();
    }

    // ── Theme ─────────────────────────────────────────────────
    function applyTheme(light) {
        document.documentElement.classList.toggle('light', light);
        const icon = light ? 'moon' : 'sun';
        document.querySelectorAll('[id^="theme-btn"]').forEach(btn => {
            btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
        });
        lucide.createIcons();
    }

    window.toggleTheme = () => {
        const isLight = document.documentElement.classList.toggle('light');
        localStorage.setItem('wolfle_theme', isLight ? 'light' : 'dark');
        applyTheme(isLight);
    };

    // ── Keyboard events ───────────────────────────────────────
    document.addEventListener("keydown", (e) => {
        if (e.target.classList.contains('chat-input') && e.key === 'Enter') {
            e.preventDefault();
            window.sendChat(e.target.nextElementSibling);
            return;
        }
        if (document.activeElement.tagName === "INPUT") return;
        if (e.key === "Enter") { e.preventDefault(); submitGuess(); }
        else if (e.key === "Backspace") backspace();
        else if (/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
    });

    // ── Init ──────────────────────────────────────────────────
    applyTheme(localStorage.getItem('wolfle_theme') === 'light');
    lucide.createIcons();
    updateSoundBtn();
    createGrid();
    createKeyboard();
    targetWord = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();

    const savedName = localStorage.getItem('wolfle_user_name');
    if (savedName) {
        document.getElementById('playerName').value = savedName;
        getDB().then(() => loadLeaderboard());
    }

    const roomFromURL = new URLSearchParams(location.search).get('room');
    if (roomFromURL) {
        const inp = document.getElementById('roomInput');
        if (inp) inp.value = roomFromURL;
        if (savedName) window.joinRoom();
        else showToast("Gib deinen Namen ein um beizutreten", "warning");
    }
</script>

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
    }
</script>
