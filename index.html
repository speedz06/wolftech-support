<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfle</title>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:60px;
height:60px;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.green{ background:#22c55e; }
.yellow{ background:#eab308; }
.gray{ background:#374151; }

.key{
display:inline-block;
margin:4px;
padding:10px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

button{
margin:10px;
padding:10px 20px;
background:#06b6d4;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<h1>🐺 Wolfle</h1>

<div>
<button onclick="startSolo()">Solo</button>
<button onclick="createRoom()">Room erstellen</button>
</div>

<div>
<input id="roomInput" placeholder="Room Code">
<button onclick="joinRoom()">Beitreten</button>
</div>

<p id="roomInfo"></p>

<div id="grid" class="grid"></div>
<div id="keyboard"></div>

<p id="message"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDTPO-01gusaBZGy-TthEWZWntwct6LrEQ",
  authDomain: "wolfle.firebaseapp.com",
  projectId: "wolfle"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 1000+ Wörter (gekürzt hier, du kannst erweitern)
const words = [
"apple","table","chair","light","plant","stone","water","house","mouse","sound",
"video","audio","power","train","brain","clock","paper","glass","phone","cable",
"screen","track","click","press","shift","enter","space","drive","wheel","panel",
"model","array","stack","debug","logic","input","error","event","frame","pixel",
"index","level","score","timer","reset","start","block","class","style","color",
"green","white","black","brown","sweet","spice","sugar","bread","fruit","drink",
"smile","laugh","dream","sleep","night","storm","cloud","rainy","sunny","windy",
"river","ocean","beach","shore","earth","space","stars","planet","orbit","music",
"dance","party","games","sport","match","field","court","score","money","trade",
"stock","chart","trend","graph","files","store","share","upload","watch","learn",
"teach","study","notes","books","pages","lines","words","write","speak","voice"
];

// STATE
let word;
let currentRow=0;
let currentCol=0;
let grid=[];
let gameOver=false;

// GRID
const gridEl=document.getElementById("grid");
for(let i=0;i<6;i++){
grid[i]=[];
for(let j=0;j<5;j++){
let d=document.createElement("div");
d.classList.add("cell");
gridEl.appendChild(d);
grid[i][j]=d;
}
}

// KEYBOARD
const letters="QWERTZUIOPASDFGHJKLYXCVBNM";
const kb=document.getElementById("keyboard");

letters.split("").forEach(l=>{
let k=document.createElement("div");
k.textContent=l;
k.classList.add("key");
k.onclick=()=>input(l);
kb.appendChild(k);
});

let enter=document.createElement("div");
enter.textContent="ENTER";
enter.classList.add("key");
enter.onclick=submit;
kb.appendChild(enter);

let del=document.createElement("div");
del.textContent="⌫";
del.classList.add("key");
del.onclick=back;
kb.appendChild(del);

// INPUT
document.addEventListener("keydown",(e)=>{
if(gameOver)return;
if(e.key==="Enter") submit();
else if(e.key==="Backspace") back();
else if(/[a-zA-Z]/.test(e.key)) input(e.key.toUpperCase());
});

function input(l){
if(currentCol<5){
grid[currentRow][currentCol].textContent=l;
currentCol++;
}
}

function back(){
if(currentCol>0){
currentCol--;
grid[currentRow][currentCol].textContent="";
}
}

function submit(){
if(currentCol<5) return;

let guess="";
for(let i=0;i<5;i++){
guess+=grid[currentRow][i].textContent.toLowerCase();
}

let wArr=word.split("");
let gArr=guess.split("");

// check
for(let i=0;i<5;i++){
if(gArr[i]===wArr[i]){
grid[currentRow][i].classList.add("green");
wArr[i]=null;
gArr[i]=null;
}
}

for(let i=0;i<5;i++){
if(gArr[i] && wArr.includes(gArr[i])){
grid[currentRow][i].classList.add("yellow");
wArr[wArr.indexOf(gArr[i])]=null;
}else if(gArr[i]){
grid[currentRow][i].classList.add("gray");
}
}

if(guess===word){
document.getElementById("message").textContent="🎉 Gewonnen!";
gameOver=true;
return;
}

currentRow++;
currentCol=0;

if(currentRow===6){
document.getElementById("message").textContent="❌ Wort war: "+word;
gameOver=true;
}
}

// SOLO
function startSolo(){
word = words[Math.floor(Math.random()*words.length)];
}

// ROOM SYSTEM
function createRoom(){
let code = Math.random().toString(36).substring(2,7).toUpperCase();
word = words[Math.floor(Math.random()*words.length)];

db.collection("rooms").doc(code).set({
word: word
});

document.getElementById("roomInfo").textContent = "Code: "+code;
}

function joinRoom(){
let code = document.getElementById("roomInput").value.toUpperCase();

db.collection("rooms").doc(code).get().then(doc=>{
if(doc.exists){
word = doc.data().word;
document.getElementById("roomInfo").textContent = "Beigetreten: "+code;
}else{
alert("Room nicht gefunden");
}
});
}

startSolo();

</script>

</body>
</html>
